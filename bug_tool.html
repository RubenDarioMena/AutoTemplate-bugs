<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Report Tool</title>
  <style>
    /* ---------- Base ---------- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "SF Pro Text", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #1d2129;
      background: #f5f6f7;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    button {
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #c7ccd1;
      background: #fff;
      padding: 4px 10px;
      border-radius: 3px;
      color: #1d2129;
    }
    button:hover { background: #f0f2f5; }
    button:active { background: #e4e6eb; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    button.primary {
      background: #2563eb;
      color: #fff;
      border-color: #1d4ed8;
    }
    button.primary:hover { background: #1d4ed8; }
    button.danger {
      background: #fff;
      color: #b91c1c;
      border-color: #fca5a5;
    }
    button.danger:hover { background: #fee2e2; }
    input[type="text"], input[type="number"], textarea, select {
      font-family: inherit;
      font-size: 12px;
      padding: 4px 6px;
      border: 1px solid #c7ccd1;
      border-radius: 3px;
      background: #fff;
      color: #1d2129;
      width: 100%;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    textarea {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      resize: vertical;
      min-height: 60px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    label .req { color: #dc2626; font-size: 10px; font-weight: 700; }
    .field { margin-bottom: 8px; position: relative; }
    .field.invalid input,
    .field.invalid textarea,
    .field.invalid select {
      border-color: #dc2626;
      box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.18);
    }
    .field-error {
      display: none;
      position: absolute;
      left: 100%;
      top: 0;
      margin-left: 6px;
      background: #1d2129;
      color: #fff;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 11px;
      max-width: 240px;
      white-space: normal;
      z-index: 100;
      pointer-events: none;
    }
    .field.invalid:hover .field-error,
    .field.invalid:focus-within .field-error { display: block; }
    .field-help {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 2px;
      line-height: 1.3;
    }

    /* ---------- Barra superior (pestañas de formularios + Data + Rules) ---------- */
    .top-tabs {
      display: flex;
      background: #1f2937;
      padding: 0 8px;
      height: 34px;
      align-items: stretch;
      user-select: none;
      flex: 0 0 auto;
    }
    .top-tab {
      padding: 0 16px;
      display: flex;
      align-items: center;
      color: #d1d5db;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-weight: 500;
      white-space: nowrap;
    }
    .top-tab:hover { color: #fff; }
    .top-tab.active {
      color: #fff;
      background: #111827;
      border-bottom-color: #2563eb;
    }
    .top-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #9ca3af;
      font-size: 11px;
    }
    .top-right button { font-size: 11px; padding: 3px 8px; }
    .save-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      white-space: nowrap;
    }
    .save-indicator .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .save-indicator.saved { background: #064e3b; color: #a7f3d0; }
    .save-indicator.saved .dot { background: #10b981; }
    .save-indicator.saving { background: #78350f; color: #fde68a; }
    .save-indicator.saving .dot { background: #f59e0b; }
    .save-indicator.unsaved { background: #7f1d1d; color: #fecaca; }
    .save-indicator.unsaved .dot { background: #ef4444; }
    /* Aviso de que la configuración local difiere del HTML distribuido */
    .config-chip {
      background: #7c2d12;
      color: #fed7aa;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      white-space: nowrap;
      display: none;
    }
    .config-chip.visible { display: inline-block; }

    /* ---------- Menús desplegables de la barra superior ---------- */
    .menu-wrap { position: relative; }
    .menu-pop {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      background: #fff;
      border: 1px solid #c7ccd1;
      border-radius: 4px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
      z-index: 300;
      min-width: 230px;
      display: none;
      padding: 4px;
    }
    .menu-wrap.open .menu-pop { display: block; }
    .menu-pop button {
      display: block;
      width: 100%;
      text-align: left;
      border: none;
      background: none;
      padding: 6px 10px;
      border-radius: 3px;
      font-size: 12px;
    }
    .menu-pop button:hover { background: #f0f2f5; }
    .menu-pop button.danger:hover { background: #fee2e2; }
    .menu-pop .sep { border-top: 1px solid #e5e7eb; margin: 4px 0; }

    /* ---------- Tiles de estado (validación) ---------- */
    .tiles-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px 8px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      flex: 0 0 auto;
    }
    .tiles-bar.hidden { display: none; }
    .tile {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid;
      cursor: pointer;
      user-select: none;
    }
    .tile.ok {
      background: #ecfdf5; color: #065f46; border-color: #a7f3d0;
      cursor: default;
    }
    .tile.err { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
    .tile.err:hover { background: #fee2e2; }
    .tile.more { background: #f3f4f6; color: #4b5563; border-color: #d1d5db; cursor: default; }

    /* ---------- Sub-pestañas (instancias) ---------- */
    .sub-tabs {
      display: flex;
      background: #e5e7eb;
      border-bottom: 1px solid #c7ccd1;
      padding: 0 4px;
      align-items: stretch;
      min-height: 28px;
      user-select: none;
      flex: 0 0 auto;
    }
    .sub-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px 4px 12px;
      background: #f3f4f6;
      border: 1px solid #c7ccd1;
      border-bottom: none;
      border-radius: 3px 3px 0 0;
      margin-right: 2px;
      margin-top: 3px;
      cursor: pointer;
      font-size: 12px;
      color: #4b5563;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
    }
    .sub-tab.active {
      background: #fff;
      color: #1d2129;
      font-weight: 600;
    }
    .sub-tab .label { overflow: hidden; text-overflow: ellipsis; }
    .sub-tab .close {
      width: 16px; height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      font-size: 14px;
      line-height: 1;
      color: #6b7280;
    }
    .sub-tab .close:hover { background: #fee2e2; color: #b91c1c; }
    .sub-tab .dirty-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f59e0b;
      display: none;
    }
    .sub-tab.dirty .dirty-dot { display: inline-block; }
    .sub-tab-new {
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 16px;
      color: #4b5563;
      cursor: pointer;
      align-self: center;
      margin-top: 3px;
      height: 22px;
    }
    .sub-tab-new:hover { color: #1d2129; }

    /* ---------- Split principal ---------- */
    #subTabsAndMain {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .form-col {
      width: 50%;
      min-width: 380px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #d1d5db;
      min-height: 0;
    }
    .form-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
      flex: 0 0 auto;
    }
    .form-toolbar h3 {
      font-size: 12px;
      font-weight: 600;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-toolbar .edit-toggle { margin-left: auto; }
    .form-toolbar .edit-toggle.active {
      background: #2563eb;
      color: #fff;
      border-color: #1d4ed8;
    }
    .form-panel {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      min-height: 0;
    }
    .output-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fafbfc;
      overflow: hidden;
      min-height: 0;
    }
    /* El textarea crece a lo alto; los botones van en una columna
       pegada al borde derecho para no robarle espacio vertical. */
    .output-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .output-textarea-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px 8px 12px 16px;
      min-width: 0;
    }
    .output-textarea-wrap textarea { flex: 1; }
    .output-side {
      flex: 0 0 148px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 24px 12px 12px 4px;
    }
    .output-side button { width: 100%; }

    /* ---------- Panel de nombres de media ---------- */
    .media-panel {
      border-top: 1px solid #d1d5db;
      background: #f9fafb;
      padding: 8px 16px 10px 16px;
      flex: 0 0 auto;
    }
    .media-panel-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }
    .media-panel-header h4 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #4b5563;
      letter-spacing: 0.4px;
    }
    .media-panel-header .hint {
      font-size: 10px;
      color: #9ca3af;
      font-style: italic;
    }
    .media-row {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 4px;
    }
    .media-row:last-child { margin-bottom: 0; }
    .media-row .media-type {
      font-size: 11px;
      font-weight: 700;
      color: #1d4ed8;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .media-row input[type="text"] {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      padding: 3px 6px;
    }
    .media-row button { font-size: 11px; padding: 2px 8px; }
    .media-preview {
      margin-top: 6px;
      padding: 4px 6px;
      background: #fff;
      border: 1px dashed #d1d5db;
      border-radius: 3px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 10px;
      color: #4b5563;
      min-height: 14px;
      line-height: 1.4;
      word-break: break-all;
    }
    .media-preview:empty { display: none; }

    /* ---------- Secciones del formulario ---------- */
    .form-section { margin-bottom: 16px; }
    .form-section h4 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #6b7280;
      letter-spacing: 0.5px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e5e7eb;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* ---------- Controles del modo edición ---------- */
    /* Ocultos por defecto; body.editing los muestra. */
    .sec-tools, .fld-tools, .add-section-btn, .mirror-field,
    #addSectionTopBtn { display: none; }
    body.editing #addSectionTopBtn { display: inline-block; margin-left: auto; }
    body.editing .form-toolbar .edit-toggle { margin-left: 0; }
    body.editing .sec-tools { display: inline-flex; gap: 2px; margin-left: auto; }
    body.editing .fld-tools { display: inline-flex; gap: 2px; margin-left: auto; }
    body.editing .add-section-btn { display: block; width: 100%; margin-top: 8px; }
    body.editing .mirror-field { display: block; }
    .tool-btn {
      padding: 0 5px;
      font-size: 11px;
      line-height: 16px;
      height: 18px;
      border-radius: 2px;
      color: #6b7280;
    }
    .tool-btn:hover { color: #1d2129; }
    .tool-btn.del:hover { background: #fee2e2; color: #b91c1c; }
    .mirror-note {
      font-size: 11px;
      color: #6b7280;
      font-style: italic;
      padding: 4px 6px;
      background: #f3f4f6;
      border: 1px dashed #d1d5db;
      border-radius: 3px;
    }
    /* Etiqueta junto al label cuando una condición oculta/bloquea el campo */
    .hidden-tag {
      color: #9ca3af;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 10px;
    }
    /* Tabla de condiciones entre campos (pestaña RULES) */
    .cond-table select, .cond-table input[type="text"] {
      font-size: 11px;
      padding: 3px 4px;
    }
    .cond-table td { white-space: nowrap; }
    .cond-then { color: #1d4ed8; font-weight: 700; font-size: 10px; text-transform: uppercase; }

    /* ---------- Autocomplete ---------- */
    .autocomplete { position: relative; }
    .autocomplete-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .autocomplete-input-wrap input { padding-right: 22px; }
    .autocomplete-arrow {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
      border-radius: 2px;
      font-size: 9px;
      line-height: 1;
    }
    .autocomplete-arrow:hover { background: #f0f2f5; color: #1d2129; }
    .autocomplete.open .autocomplete-arrow { color: #2563eb; }
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      max-height: 200px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #c7ccd1;
      border-top: none;
      border-radius: 0 0 3px 3px;
      z-index: 50;
      display: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    }
    .autocomplete.open .autocomplete-list { display: block; }
    .autocomplete-empty {
      padding: 4px 8px;
      color: #9ca3af;
      font-size: 11px;
      font-style: italic;
    }
    .autocomplete-item {
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .autocomplete-item:hover,
    .autocomplete-item.active { background: #eff6ff; color: #1d4ed8; }
    .autocomplete-item mark {
      background: #fef08a;
      color: inherit;
      font-weight: 600;
    }
    /* Botón para borrar una opción de la lista (aparece al pasar el mouse) */
    .ac-del {
      visibility: hidden;
      color: #9ca3af;
      padding: 0 4px;
      border-radius: 2px;
      font-size: 12px;
      line-height: 1;
      flex: 0 0 auto;
    }
    .autocomplete-item:hover .ac-del { visibility: visible; }
    .ac-del:hover { background: #fee2e2; color: #b91c1c; }
    /* Fila "+ Agregar..." al final del dropdown */
    .autocomplete-add {
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      color: #1d4ed8;
      border-top: 1px dashed #e5e7eb;
    }
    .autocomplete-add:hover { background: #eff6ff; }

    /* ---------- Chips de palabras clave ---------- */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px;
      border: 1px solid #c7ccd1;
      border-radius: 3px;
      background: #fff;
      min-height: 30px;
      cursor: text;
    }
    .chips.invalid { border-color: #dc2626; box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.18); }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #dbeafe;
      color: #1e40af;
      padding: 2px 4px 2px 8px;
      border-radius: 12px;
      font-size: 11px;
    }
    .chip button {
      border: none;
      background: transparent;
      color: #1e40af;
      cursor: pointer;
      padding: 0 4px;
      font-size: 13px;
      line-height: 1;
    }
    .chip button:hover { color: #b91c1c; }
    .chips input {
      border: none;
      outline: none;
      flex: 1;
      min-width: 80px;
      font-size: 12px;
      padding: 2px;
      background: transparent;
      width: auto;
    }
    .chips-error {
      display: block;
      margin-top: 4px;
      background: #fee2e2;
      color: #991b1b;
      padding: 4px 8px;
      border-radius: 3px;
      border-left: 3px solid #dc2626;
      font-size: 11px;
    }

    /* ---------- Pestaña DATA ---------- */
    .data-layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .data-sidebar {
      width: 200px;
      background: #fff;
      border-right: 1px solid #d1d5db;
      overflow-y: auto;
      flex: 0 0 auto;
    }
    .data-sidebar .item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
      color: #4b5563;
      border-bottom: 1px solid #f3f4f6;
    }
    .data-sidebar .item:hover { background: #f9fafb; }
    .data-sidebar .item.active {
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
      border-left: 3px solid #2563eb;
    }
    .data-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .data-toolbar {
      padding: 8px 12px;
      background: #f3f4f6;
      border-bottom: 1px solid #d1d5db;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .data-table-wrap {
      flex: 1;
      overflow: auto;
      padding: 12px;
    }
    table.data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    table.data-table th,
    table.data-table td {
      border: 1px solid #e5e7eb;
      padding: 4px 8px;
      text-align: left;
      vertical-align: top;
    }
    table.data-table th {
      background: #f3f4f6;
      font-weight: 600;
      color: #4b5563;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.3px;
      position: sticky;
      top: -13px;
    }
    table.data-table input[type="text"] {
      border: none;
      padding: 2px;
      width: 100%;
      background: transparent;
    }
    table.data-table input[type="text"]:focus {
      background: #fff;
      outline: 1px solid #2563eb;
      box-shadow: none;
    }
    table.data-table tr:hover { background: #f9fafb; }
    .orphan { color: #dc2626; font-weight: 600; }
    .row-del {
      border: none;
      background: none;
      color: #9ca3af;
      font-size: 13px;
      padding: 0 6px;
    }
    .row-del:hover { background: #fee2e2; color: #b91c1c; }

    /* ---------- Pestaña RULES ---------- */
    .rules-layout {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      min-height: 0;
    }
    .rules-layout h3 {
      font-size: 13px;
      margin-bottom: 4px;
    }
    .rules-layout .rules-intro {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 12px;
      max-width: 760px;
      line-height: 1.5;
    }
    .rules-block { margin-bottom: 24px; }
    .rules-future {
      border: 1px dashed #c7ccd1;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 11px;
      color: #9ca3af;
      max-width: 760px;
    }
    td.rules-form-cell { color: #6b7280; white-space: nowrap; }

    /* ---------- Modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 6px;
      padding: 20px;
      min-width: 360px;
      max-width: 600px;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

<script>
"use strict";

/* ================================================================
   BUG REPORT TOOL v2 — schema-driven
   ================================================================
   Índice del código (buscar el número para saltar):
     [1] Captura prístina y constantes
     [2] Utilidades generales
     [3] Config (vanilla embebida + copia local editable)
     [4] Helpers de schema (formularios, secciones, campos)
     [5] Instancias (Bug 1, Bug 2, ...) y persistencia
     [6] Render: pestañas superiores y sub-pestañas
     [7] Render: formulario (normal + modo edición)
     [8] Widgets: autocomplete (+/borrar opción) y palabras clave
     [9] Edición de schema: secciones y campos (modales)
    [10] Validación y tiles de estado
    [11] Generador de output (usa el schema, no código fijo)
    [12] Panel de media
    [13] Pestaña DATA
    [14] Pestaña RULES
    [15] CSV: bug_data.csv y bug_fields.csv (importar/exportar)
    [16] Exportar herramienta (HTML autocontenido)
    [17] Sesión (guardar/cargar archivo), modales, banner, menús
    [18] Boot
   ================================================================ */

/* ================================================================
   [1] CAPTURA PRÍSTINA Y CONSTANTES
   ================================================================
   Guardamos el HTML del archivo TAL COMO ESTÁ EN DISCO antes de que
   el JS pinte nada. "Exportar herramienta" toma esta copia, le
   reemplaza el bloque JSON #vanillaConfig por la config actual y la
   descarga: así los cambios quedan DENTRO del nuevo .html. */
const PRISTINE_HTML = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
// Escrito en dos partes para que el parser HTML no corte el script aquí.
const SCRIPT_END = "</scr" + "ipt>";

const CONFIG_KEY  = "bug_tool_v2_config";   // schema + data (localStorage)
const SESSION_KEY = "bug_tool_v2_session";  // instancias y preferencias

const FIELD_TYPES = [
  { id: "text",         label: "Texto (una línea)" },
  { id: "textarea",     label: "Texto (varias líneas)" },
  { id: "autocomplete", label: "Texto + dropdown autocompletable" },
  { id: "keywords",     label: "Palabras clave (chips)" },
  { id: "mirror",       label: "Copia de otro campo (solo output)" }
];
const FIELD_SIZES = [
  { id: "full",  label: "Ancho completo" },
  { id: "half",  label: "1/2 de fila" },
  { id: "third", label: "1/3 de fila" }
];

/* ================================================================
   [2] UTILIDADES GENERALES
   ================================================================ */
function $(id) { return document.getElementById(id); }

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function newId() {
  return "i_" + Math.random().toString(36).slice(2, 10);
}

function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

// Convierte un nombre libre en un id seguro: "Posición de vista" -> "posicionDeVista"
function slugify(label) {
  const clean = String(label || "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")  // sin acentos
    .replace(/[^a-zA-Z0-9]+/g, " ").trim();
  if (!clean) return "campo";
  const parts = clean.split(" ");
  return parts[0].toLowerCase() +
    parts.slice(1).map(p => p[0].toUpperCase() + p.slice(1).toLowerCase()).join("");
}

// Los valores que empiezan con "@" son referencias a data.rules.
// Ej.: regex "@coord_re" usa la regla coord_re; default "@default_tz" usa CST.
function resolveRef(v) {
  if (typeof v === "string" && v.startsWith("@")) {
    const key = v.slice(1);
    return config.data.rules[key] != null ? config.data.rules[key] : "";
  }
  return v == null ? "" : v;
}

// En plantillas, separadores y encabezados se puede escribir \n o
// <br> para forzar un salto de línea en el output.
function unescapeNl(s) {
  return String(s == null ? "" : s)
    .replace(/<br\s*\/?>/gi, "\n")
    .replace(/\\n/g, "\n");
}

function isoStamp() {
  const d = new Date();
  return d.toISOString().replace(/[:.]/g, "-").slice(0, 19);
}

function downloadFile(name, content) {
  const blob = new Blob([content || ""], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text || "").then(() => {
    flashBanner("Copiado al portapapeles.");
  }).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = text || "";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); flashBanner("Copiado al portapapeles."); }
    catch (e) { flashBanner("No se pudo copiar. Selecciona y copia a mano.", true); }
    document.body.removeChild(ta);
  });
}

/* ================================================================
   [3] CONFIG (VANILLA EMBEBIDA + COPIA LOCAL EDITABLE)
   ================================================================
   - `vanilla`: lo que trae el archivo .html (bloque #vanillaConfig).
   - `config`:  la copia con la que se trabaja. Vive en localStorage
     para que los cambios sobrevivan al cerrar el navegador.
   Si config != vanilla se muestra el aviso "Config modificada" para
   recordar exportar la herramienta o los CSV. */
let vanilla = null;
let config = null;

function loadVanillaConfig() {
  const el = $("vanillaConfig");
  vanilla = JSON.parse(el.textContent);
}

function loadConfig() {
  try {
    const raw = localStorage.getItem(CONFIG_KEY);
    if (raw) {
      const c = JSON.parse(raw);
      if (c && c.schema && c.data) {
        config = c;
        migrateConfig();
        return;
      }
    }
  } catch (e) { console.error("loadConfig", e); }
  config = deepClone(vanilla);
}

// Si esta versión del archivo trae listas/reglas nuevas que la config
// guardada en el navegador no conoce, se completan sin pisar nada.
function migrateConfig() {
  Object.entries(vanilla.data.lists).forEach(([k, v]) => {
    if (!config.data.lists[k]) config.data.lists[k] = deepClone(v);
  });
  Object.entries(vanilla.data.rules).forEach(([k, v]) => {
    if (config.data.rules[k] === undefined) config.data.rules[k] = v;
  });
}

function configIsDirty() {
  return JSON.stringify(config) !== JSON.stringify(vanilla);
}

function updateConfigChip() {
  $("configChip").classList.toggle("visible", configIsDirty());
}

/* ================================================================
   [4] HELPERS DE SCHEMA
   ================================================================ */
function getForms() { return config.schema.forms; }

function getForm(formId) {
  return getForms().find(f => f.id === formId) || null;
}

function getSection(form, secId) {
  return form.sections.find(s => s.id === secId) || null;
}

function getField(form, fieldId) {
  for (const sec of form.sections) {
    const idx = sec.fields.findIndex(f => f.id === fieldId);
    if (idx >= 0) return { sec, field: sec.fields[idx], idx };
  }
  return null;
}

function allFields(form) {
  const out = [];
  form.sections.forEach(sec => sec.fields.forEach(f => out.push({ sec, field: f })));
  return out;
}

// Opciones disponibles para la columna "source" de un autocomplete:
// nombres de lista, "maps", o "pois:<campo de mapa>".
function sourceOptions(form) {
  const opts = Object.keys(config.data.lists).slice();
  opts.push("maps");
  allFields(form).forEach(({ field }) => {
    if (field.type === "text" || field.type === "autocomplete") {
      opts.push("pois:" + field.id);
    }
  });
  return opts;
}

// Devuelve las opciones actuales de un campo autocomplete.
function optionsForField(field, inst) {
  const src = field.source || "";
  if (src === "maps") return config.data.maps;
  if (src.startsWith("pois:")) {
    const mapField = src.slice(5);
    const mapVal = inst ? String(inst.values[mapField] || "") : "";
    return (mapVal && config.data.pois[mapVal]) ? config.data.pois[mapVal] : [];
  }
  return config.data.lists[src] || [];
}

/* ================================================================
   [5] INSTANCIAS Y PERSISTENCIA
   ================================================================ */
const state = {
  topTab: "",            // id de formulario, "data" o "rules"
  editMode: false,
  instances: [],         // { id, formId, title, values, ticketKey, output, outputEdited, errors, dirty }
  activeInstanceId: null,
  dataTab: { selectedCategory: "" },
  prefs: { dontAskOnClose: false }
};

function makeInstance(formId) {
  const form = getForm(formId);
  const values = {};
  allFields(form).forEach(({ field }) => {
    if (field.type === "mirror") return;
    if (field.type === "keywords") values[field.id] = [];
    else values[field.id] = resolveRef(field.default || "");
  });
  return {
    id: newId(),
    formId: formId,
    title: form.label + " 1",
    values: values,
    ticketKey: "",
    output: "",
    outputEdited: false,
    errors: {},
    dirty: false
  };
}

// Tras editar el schema (agregar campos, importar CSV) las instancias
// viejas pueden no tener todos los ids: aquí se completan.
function ensureInstanceFields(inst) {
  const form = getForm(inst.formId);
  if (!form) return;
  allFields(form).forEach(({ field }) => {
    if (field.type === "mirror") return;
    if (inst.values[field.id] === undefined) {
      inst.values[field.id] = field.type === "keywords" ? [] : resolveRef(field.default || "");
    }
    if (field.type === "keywords" && !Array.isArray(inst.values[field.id])) {
      inst.values[field.id] = [];
    }
  });
  if (inst.ticketKey === undefined) inst.ticketKey = "";
  if (!inst.errors) inst.errors = {};
}

function getActiveInstance() {
  return state.instances.find(i => i.id === state.activeInstanceId) || null;
}

// ---- Guardado en localStorage (debounced) ----
let saveTimer = null;
// true mientras se ejecuta "Borrar todo lo local": bloquea cualquier
// guardado para que beforeunload no re-escriba lo recién borrado.
let suppressSave = false;
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  setSaveIndicator("saving");
  saveTimer = setTimeout(() => {
    saveAll();
    setSaveIndicator("saved");
  }, 300);
}

function saveAll() {
  if (suppressSave) return;
  try {
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      topTab: state.topTab,
      instances: state.instances,
      activeInstanceId: state.activeInstanceId,
      dataTab: state.dataTab,
      prefs: state.prefs
    }));
  } catch (e) {
    console.error("saveAll", e);
  }
  updateConfigChip();
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const snap = JSON.parse(raw);
    if (snap.topTab) state.topTab = snap.topTab;
    if (Array.isArray(snap.instances)) state.instances = snap.instances;
    if (snap.activeInstanceId) state.activeInstanceId = snap.activeInstanceId;
    if (snap.dataTab) state.dataTab = Object.assign(state.dataTab, snap.dataTab);
    if (snap.prefs) state.prefs = Object.assign(state.prefs, snap.prefs);
    return true;
  } catch (e) {
    console.error("loadSession", e);
    return false;
  }
}

function setSaveIndicator(kind) {
  const el = $("saveIndicator");
  el.classList.remove("saved", "saving", "unsaved");
  el.classList.add(kind);
  $("saveIndicatorText").textContent =
    kind === "saved" ? "Guardado" : kind === "saving" ? "Guardando..." : "Sin guardar";
}

function markInstanceDirty(inst) {
  if (!inst.dirty) { inst.dirty = true; refreshSubTabs(); }
}

/* ================================================================
   [6] RENDER: PESTAÑAS SUPERIORES Y SUB-PESTAÑAS
   ================================================================ */
function renderTopTabs() {
  const cont = $("formTabs");
  cont.innerHTML = getForms().map(f =>
    `<div class="top-tab${state.topTab === f.id ? " active" : ""}" data-form="${escapeHtml(f.id)}">${escapeHtml(f.label)}</div>`
  ).join("");
  cont.querySelectorAll("[data-form]").forEach(el => {
    el.addEventListener("click", () => switchToForm(el.dataset.form));
  });
  document.querySelectorAll('#topTabs [data-tab]').forEach(el => {
    el.classList.toggle("active", state.topTab === el.dataset.tab);
  });
  // Mostrar el contenedor que toca
  const isForm = !!getForm(state.topTab);
  $("subTabsAndMain").style.display = isForm ? "flex" : "none";
  $("tilesBar").classList.toggle("hidden", !isForm);
  $("dataContainer").style.display = state.topTab === "data" ? "flex" : "none";
  $("rulesContainer").style.display = state.topTab === "rules" ? "block" : "none";
}

function switchToForm(formId) {
  state.topTab = formId;
  const existing = state.instances.find(i => i.formId === formId);
  if (!existing) addInstance();
  else if (!getActiveInstance() || getActiveInstance().formId !== formId) {
    state.activeInstanceId = existing.id;
  }
  refreshAll();
  scheduleSave();
}

function refreshSubTabs() {
  const bar = $("subTabs");
  bar.innerHTML = "";
  const visible = state.instances.filter(i => i.formId === state.topTab);
  visible.forEach(inst => {
    const el = document.createElement("div");
    el.className = "sub-tab" + (inst.id === state.activeInstanceId ? " active" : "")
                 + (inst.dirty ? " dirty" : "");
    el.innerHTML = `<span class="dirty-dot"></span>
                    <span class="label">${escapeHtml(inst.title)}</span>
                    <span class="close" title="Cerrar">×</span>`;
    el.addEventListener("click", e => {
      if (e.target.classList.contains("close")) {
        e.stopPropagation();
        closeInstance(inst.id);
      } else if (inst.id !== state.activeInstanceId) {
        state.activeInstanceId = inst.id;
        refreshAll();
        scheduleSave();
      }
    });
    bar.appendChild(el);
  });
  const plus = document.createElement("div");
  plus.className = "sub-tab-new";
  plus.textContent = "+";
  plus.title = "Nueva instancia";
  plus.addEventListener("click", addInstance);
  bar.appendChild(plus);
}

function addInstance() {
  const form = getForm(state.topTab);
  if (!form) return;
  let count = 1;
  const existing = state.instances.filter(i => i.formId === state.topTab);
  while (existing.some(i => i.title === form.label + " " + count)) count++;
  const inst = makeInstance(state.topTab);
  inst.title = form.label + " " + count;
  inst.dirty = true;
  state.instances.push(inst);
  state.activeInstanceId = inst.id;
  refreshAll();
  scheduleSave();
}

function closeInstance(id) {
  const inst = state.instances.find(i => i.id === id);
  if (!inst) return;
  const doClose = () => {
    state.instances = state.instances.filter(i => i.id !== id);
    if (state.activeInstanceId === id) {
      const remaining = state.instances.filter(i => i.formId === state.topTab);
      state.activeInstanceId = remaining.length ? remaining[0].id : null;
      if (!state.activeInstanceId) { addInstance(); return; }
    }
    refreshAll();
    scheduleSave();
  };
  if (inst.dirty && !state.prefs.dontAskOnClose) {
    showConfirmModal({
      title: "¿Descartar cambios?",
      body: `¿Descartar los cambios sin guardar de "${escapeHtml(inst.title)}"?`,
      confirmText: "Descartar",
      confirmClass: "danger",
      showDontAsk: true,
      onConfirm: (dontAsk) => {
        if (dontAsk) state.prefs.dontAskOnClose = true;
        doClose();
      }
    });
  } else {
    doClose();
  }
}

function refreshAll() {
  renderTopTabs();
  const isForm = !!getForm(state.topTab);
  if (isForm) {
    refreshSubTabs();
    renderForm();
    renderMediaPanel();
  } else if (state.topTab === "data") {
    renderDataTab();
  } else if (state.topTab === "rules") {
    renderRulesTab();
  }
  updateConfigChip();
}

/* ================================================================
   [7] RENDER: FORMULARIO (NORMAL + MODO EDICIÓN)
   ================================================================
   Todo el formulario se pinta a partir del schema. En modo edición
   aparecen los controles ↑ ↓ ✎ ✕ en secciones y campos. El orden
   visual de arriba hacia abajo ES el orden del output. */
function renderForm() {
  const inst = getActiveInstance();
  const form = getForm(state.topTab);
  const panel = $("formPanel");
  if (!inst || !form) { panel.innerHTML = "<p>No hay instancia activa.</p>"; return; }
  ensureInstanceFields(inst);
  $("formTitle").textContent = form.label;
  const toggle = $("editToggle");
  toggle.classList.toggle("active", state.editMode);
  toggle.textContent = state.editMode ? "✓ Terminar edición" : "✎ Editar formulario";
  document.body.classList.toggle("editing", state.editMode);

  // Estado de las condiciones entre campos (ocultar/bloquear/default)
  const fx = evalFieldRules(form, inst);
  lastFxJson = JSON.stringify(fx);

  panel.innerHTML = form.sections.map(sec => sectionHtml(sec, inst, fx)).join("")
    + `<button class="add-section-btn" id="addSectionBtn">+ Agregar sección</button>`;
  wireFormEvents(inst, form);
  revalidate(inst);
  renderOutput();
}

// Última foto del estado de condiciones que está pintado en pantalla;
// si al validar cambia (ej. escribieron "LOD"), se re-pinta el form.
let lastFxJson = "";
function rerenderIfRulesChanged(form, inst) {
  const fxNow = JSON.stringify(evalFieldRules(form, inst));
  if (fxNow !== lastFxJson) renderForm();
}

function sectionHtml(sec, inst, fx) {
  const tools = `
    <span class="sec-tools">
      <button class="tool-btn" data-sec-add="${sec.id}" title="Agregar campo a esta sección">+ campo</button>
      <button class="tool-btn" data-sec-up="${sec.id}" title="Subir sección">▲</button>
      <button class="tool-btn" data-sec-down="${sec.id}" title="Bajar sección">▼</button>
      <button class="tool-btn" data-sec-edit="${sec.id}" title="Editar sección">✎</button>
      <button class="tool-btn del" data-sec-del="${sec.id}" title="Borrar sección">✕</button>
    </span>`;
  // Los campos ocultos por condición no se pintan (en modo edición sí,
  // marcados, para poder seguir editándolos).
  const visibleFields = sec.fields.filter(f =>
    state.editMode || !(fx[f.id] && fx[f.id].hidden));
  // Agrupar campos consecutivos del mismo tamaño en filas de 2 o 3
  const rows = [];
  let group = null;
  visibleFields.forEach(f => {
    const size = f.size === "half" ? 2 : f.size === "third" ? 3 : 1;
    if (group && group.size === size && size > 1 && group.items.length < size) {
      group.items.push(f);
    } else {
      group = { size, items: [f] };
      rows.push(group);
    }
  });
  const body = rows.map(g => {
    const cells = g.items.map(f => fieldHtml(f, inst, fx)).join("");
    if (g.size === 2) return `<div class="row-2">${cells}</div>`;
    if (g.size === 3) return `<div class="row-3">${cells}</div>`;
    return cells;
  }).join("");
  return `<div class="form-section" data-section="${escapeHtml(sec.id)}">
    <h4>${escapeHtml(sec.label)}${tools}</h4>
    ${body}
  </div>`;
}

function fieldHtml(field, inst, fx) {
  const err = inst.errors[field.id] || "";
  const invalid = err ? " invalid" : "";
  const st = (fx && fx[field.id]) || { hidden: false, disabled: false };
  const dis = st.disabled ? " disabled" : "";
  const tools = `
    <span class="fld-tools">
      <button class="tool-btn" data-fld-up="${field.id}" title="Subir campo (sube en el output)">▲</button>
      <button class="tool-btn" data-fld-down="${field.id}" title="Bajar campo (baja en el output)">▼</button>
      <button class="tool-btn" data-fld-edit="${field.id}" title="Editar campo">✎</button>
      <button class="tool-btn del" data-fld-del="${field.id}" title="Borrar campo definitivamente">✕</button>
    </span>`;
  const stateTag = st.hidden ? '<span class="hidden-tag">(oculto)</span>'
                 : st.disabled ? '<span class="hidden-tag">(bloqueado)</span>' : "";
  const labelHtml = `<label>${escapeHtml(field.label)}${field.required ? '<span class="req">*</span>' : ""}${stateTag}${tools}</label>`;
  const helpHtml = field.help ? `<div class="field-help">${escapeHtml(field.help)}</div>` : "";
  const errHtml = `<div class="field-error">${escapeHtml(err)}</div>`;
  const val = field.type === "mirror" ? "" : (inst.values[field.id] != null ? inst.values[field.id] : "");

  if (field.type === "mirror") {
    // Solo visible en modo edición: no se llena, copia otro campo en el output.
    return `<div class="field mirror-field" data-field="${escapeHtml(field.id)}">
      ${labelHtml}
      <div class="mirror-note">= copia del campo «${escapeHtml(field.source || "?")}» (solo aparece en el output)</div>
    </div>`;
  }
  if (field.type === "textarea") {
    return `<div class="field${invalid}" data-field="${escapeHtml(field.id)}">
      ${labelHtml}
      <textarea data-bind="${escapeHtml(field.id)}" rows="${field.rows || 3}"${dis}>${escapeHtml(val)}</textarea>
      ${errHtml}${helpHtml}
    </div>`;
  }
  if (field.type === "autocomplete") {
    return `<div class="field autocomplete${invalid}" data-field="${escapeHtml(field.id)}">
      ${labelHtml}
      <div class="autocomplete-input-wrap">
        <input type="text" data-bind="${escapeHtml(field.id)}" data-ac="${escapeHtml(field.id)}" value="${escapeHtml(val)}"${dis} />
        <span class="autocomplete-arrow" data-ac-toggle title="Ver todas las opciones">▼</span>
      </div>
      <div class="autocomplete-list"></div>
      ${errHtml}${helpHtml}
    </div>`;
  }
  if (field.type === "keywords") {
    const kws = Array.isArray(val) ? val : [];
    return `<div class="field" data-field="${escapeHtml(field.id)}">
      ${labelHtml}
      <div class="chips${err ? " invalid" : ""}" data-kw-chips="${escapeHtml(field.id)}">
        ${kws.map(k => `<span class="chip">${escapeHtml(k)}<button data-kw-remove="${escapeHtml(k)}" title="Quitar">×</button></span>`).join("")}
        <input type="text" data-kw-input="${escapeHtml(field.id)}" placeholder="Escribe y presiona Enter..."${dis} />
      </div>
      ${err ? `<div class="chips-error">${escapeHtml(err)}</div>` : ""}
      ${helpHtml}
    </div>`;
  }
  // text (default)
  return `<div class="field${invalid}" data-field="${escapeHtml(field.id)}">
    ${labelHtml}
    <input type="text" data-bind="${escapeHtml(field.id)}" value="${escapeHtml(val)}"${dis} />
    ${errHtml}${helpHtml}
  </div>`;
}

function wireFormEvents(inst, form) {
  const panel = $("formPanel");

  // ---- Inputs normales: escribir solo actualiza el modelo; el
  //      trabajo pesado (validar, output, guardar) ocurre en blur. ----
  panel.querySelectorAll("[data-bind]").forEach(el => {
    const name = el.dataset.bind;
    el.addEventListener("input", () => {
      inst.values[name] = el.value;
      clearDependents(form, name, inst, panel);
      markInstanceDirty(inst);
    });
    el.addEventListener("blur", () => {
      revalidate(inst);
      renderOutput();
      renderMediaPanel();
      saveAll();
      setSaveIndicator("saved");
      // Si alguna condición mostró/ocultó/bloqueó campos, re-pintar.
      // Va al final: el usuario ya salió del campo, no roba el foco.
      rerenderIfRulesChanged(form, inst);
    });
    el.addEventListener("change", () => {
      inst.values[name] = el.value;
      clearDependents(form, name, inst, panel);
      revalidate(inst);
      renderOutput();
      renderMediaPanel();
      markInstanceDirty(inst);
      saveAll();
      setSaveIndicator("saved");
      rerenderIfRulesChanged(form, inst);
    });
  });

  // ---- Autocompletes ----
  panel.querySelectorAll("input[data-ac]").forEach(input => {
    const found = getField(form, input.dataset.ac);
    if (found) wireAutocomplete(input, inst, form, found.field);
  });

  // ---- Palabras clave ----
  panel.querySelectorAll("[data-kw-chips]").forEach(chips => {
    wireKeywords(chips, inst, form);
  });

  // ---- Controles del modo edición ----
  $("addSectionBtn").addEventListener("click", () => showSectionEditor(form, null));
  panel.querySelectorAll("[data-sec-add]").forEach(b => b.addEventListener("click", () =>
    showFieldEditor(form, getSection(form, b.dataset.secAdd), null)));
  panel.querySelectorAll("[data-sec-up]").forEach(b => b.addEventListener("click", () =>
    moveSection(form, b.dataset.secUp, -1)));
  panel.querySelectorAll("[data-sec-down]").forEach(b => b.addEventListener("click", () =>
    moveSection(form, b.dataset.secDown, +1)));
  panel.querySelectorAll("[data-sec-edit]").forEach(b => b.addEventListener("click", () =>
    showSectionEditor(form, getSection(form, b.dataset.secEdit))));
  panel.querySelectorAll("[data-sec-del]").forEach(b => b.addEventListener("click", () =>
    deleteSection(form, b.dataset.secDel)));
  panel.querySelectorAll("[data-fld-up]").forEach(b => b.addEventListener("click", () =>
    moveField(form, b.dataset.fldUp, -1)));
  panel.querySelectorAll("[data-fld-down]").forEach(b => b.addEventListener("click", () =>
    moveField(form, b.dataset.fldDown, +1)));
  panel.querySelectorAll("[data-fld-edit]").forEach(b => b.addEventListener("click", () => {
    const found = getField(form, b.dataset.fldEdit);
    if (found) showFieldEditor(form, found.sec, found.field);
  }));
  panel.querySelectorAll("[data-fld-del]").forEach(b => b.addEventListener("click", () =>
    deleteField(form, b.dataset.fldDel)));
}

// Si cambia el campo del que dependen otros (ej. mapa -> POIs),
// se limpian los dependientes sin re-pintar el formulario completo.
function clearDependents(form, name, inst, panel) {
  allFields(form).forEach(({ field }) => {
    if (field.source === "pois:" + name) {
      inst.values[field.id] = "";
      const el = panel.querySelector(`[data-bind="${field.id}"]`);
      if (el) el.value = "";
    }
  });
}

/* ================================================================
   [8] WIDGETS: AUTOCOMPLETE Y PALABRAS CLAVE
   ================================================================
   El dropdown permite texto libre. Al final muestra "+ Agregar ..."
   para sumar el texto escrito a la lista (queda en DATA), y cada
   opción tiene una ✕ para borrarla definitivamente (con
   confirmación). */
function wireAutocomplete(input, inst, form, field) {
  const wrap = input.closest(".autocomplete");
  const list = wrap.querySelector(".autocomplete-list");
  const arrow = wrap.querySelector("[data-ac-toggle]");
  let activeIdx = -1;

  const renderList = (showAll) => {
    const all = optionsForField(field, inst);
    const q = input.value.trim().toLowerCase();
    let items = all;
    if (!showAll && q) items = all.filter(v => v.toLowerCase().includes(q));

    let html = "";
    if (!items.length) {
      html = `<div class="autocomplete-empty">Sin coincidencias — puedes escribir un valor libre</div>`;
    } else {
      const re = q ? new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig") : null;
      html = items.slice(0, 50).map(v => {
        const marked = re ? escapeHtml(v).replace(re, "<mark>$1</mark>") : escapeHtml(v);
        return `<div class="autocomplete-item" data-v="${escapeHtml(v)}">
          <span>${marked}</span>
          <span class="ac-del" data-del="${escapeHtml(v)}" title="Borrar esta opción de la lista">✕</span>
        </div>`;
      }).join("");
    }
    // Fila "+ Agregar" cuando lo escrito no existe tal cual en la lista
    const typed = input.value.trim();
    if (typed && !all.some(v => v.toLowerCase() === typed.toLowerCase())) {
      html += `<div class="autocomplete-add" data-add="${escapeHtml(typed)}">+ Agregar «${escapeHtml(typed)}» a la lista</div>`;
    }
    list.innerHTML = html;

    list.querySelectorAll(".autocomplete-item").forEach(it => {
      it.addEventListener("mousedown", (e) => {
        if (e.target.closest(".ac-del")) return; // la ✕ tiene su propio handler
        e.preventDefault();
        input.value = it.dataset.v;
        input.dispatchEvent(new Event("input"));
        wrap.classList.remove("open");
      });
    });
    list.querySelectorAll(".ac-del").forEach(x => {
      x.addEventListener("mousedown", (e) => {
        e.preventDefault();
        e.stopPropagation();
        confirmDeleteOption(field, inst, x.dataset.del, () => renderList(showAll));
      });
    });
    const addEl = list.querySelector(".autocomplete-add");
    if (addEl) {
      addEl.addEventListener("mousedown", (e) => {
        e.preventDefault();
        addOptionToSource(field, inst, addEl.dataset.add);
        input.value = addEl.dataset.add;
        input.dispatchEvent(new Event("input"));
        wrap.classList.remove("open");
      });
    }
    activeIdx = -1;
    wrap.classList.add("open");
  };

  if (arrow) {
    arrow.addEventListener("mousedown", (e) => {
      e.preventDefault();
      if (wrap.classList.contains("open")) wrap.classList.remove("open");
      else { renderList(true); input.focus(); }
    });
  }
  input.addEventListener("focus", () => renderList(false));
  input.addEventListener("input", () => renderList(false));
  input.addEventListener("blur", () => setTimeout(() => {
    wrap.classList.remove("open");
    activeIdx = -1;
  }, 150));

  input.addEventListener("keydown", (e) => {
    const items = list.querySelectorAll(".autocomplete-item");
    if (e.key === "ArrowDown") {
      e.preventDefault();
      if (!wrap.classList.contains("open")) renderList(false);
      activeIdx = Math.min(items.length - 1, activeIdx + 1);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeIdx = Math.max(0, activeIdx - 1);
    } else if (e.key === "Enter" && wrap.classList.contains("open") && activeIdx >= 0 && items[activeIdx]) {
      e.preventDefault();
      input.value = items[activeIdx].dataset.v;
      input.dispatchEvent(new Event("input"));
      wrap.classList.remove("open");
      activeIdx = -1;
      return;
    } else if (e.key === "Escape") {
      wrap.classList.remove("open");
      activeIdx = -1;
      return;
    } else {
      return;
    }
    items.forEach((it, i) => it.classList.toggle("active", i === activeIdx));
    if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].scrollIntoView({ block: "nearest" });
  });
}

// Agrega un valor a la fuente del campo (lista, mapas o POIs del mapa activo).
function addOptionToSource(field, inst, value) {
  const src = field.source || "";
  if (src === "maps") {
    config.data.maps.push(value);
    if (!config.data.pois[value]) config.data.pois[value] = [];
  } else if (src.startsWith("pois:")) {
    const mapVal = String(inst.values[src.slice(5)] || "");
    if (!mapVal) { flashBanner("Primero elige un mapa.", true); return; }
    config.data.pois[mapVal] = config.data.pois[mapVal] || [];
    config.data.pois[mapVal].push(value);
  } else {
    config.data.lists[src] = config.data.lists[src] || [];
    config.data.lists[src].push(value);
  }
  scheduleSave();
  flashBanner(`«${value}» agregado. Recuerda exportar los datos o la herramienta para compartirlo.`);
}

function confirmDeleteOption(field, inst, value, after) {
  const src = field.source || "";
  const listName = src === "maps" ? "mapas" : src.startsWith("pois:") ? "POIs" : src;
  showConfirmModal({
    title: "Borrar opción",
    body: `¿Borrar definitivamente «${escapeHtml(value)}» de la lista de ${escapeHtml(listName)}? Afecta a todos los formularios que usan esta lista.`,
    confirmText: "Borrar",
    confirmClass: "danger",
    onConfirm: () => {
      if (src === "maps") {
        config.data.maps = config.data.maps.filter(v => v !== value);
        // Los POIs del mapa quedan huérfanos y visibles en DATA (a propósito).
      } else if (src.startsWith("pois:")) {
        const mapVal = String(inst.values[src.slice(5)] || "");
        if (config.data.pois[mapVal]) {
          config.data.pois[mapVal] = config.data.pois[mapVal].filter(v => v !== value);
        }
      } else if (config.data.lists[src]) {
        config.data.lists[src] = config.data.lists[src].filter(v => v !== value);
      }
      scheduleSave();
      if (after) after();
    }
  });
}

function wireKeywords(chips, inst, form) {
  const fieldId = chips.dataset.kwChips;
  const getInput = () => chips.querySelector("[data-kw-input]");

  const refresh = () => {
    const cur = getInput().value;
    chips.innerHTML = (inst.values[fieldId] || []).map(k =>
      `<span class="chip">${escapeHtml(k)}<button data-kw-remove="${escapeHtml(k)}" title="Quitar">×</button></span>`
    ).join("") + `<input type="text" data-kw-input="${escapeHtml(fieldId)}" placeholder="Escribe y presiona Enter..." />`;
    const inp = getInput();
    inp.value = cur;
    inp.addEventListener("keydown", keyHandler);
    inp.focus();
    bindRemoves();
  };
  const bindRemoves = () => {
    chips.querySelectorAll("[data-kw-remove]").forEach(btn => {
      btn.addEventListener("click", () => {
        inst.values[fieldId] = (inst.values[fieldId] || []).filter(k => k !== btn.dataset.kwRemove);
        markInstanceDirty(inst);
        revalidate(inst);
        renderOutput();
        refresh();
        saveAll();
      });
    });
  };
  const keyHandler = (e) => {
    const inp = getInput();
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      const v = inp.value.trim();
      const arr = inst.values[fieldId] || [];
      if (v && !arr.includes(v)) {
        arr.push(v);
        inst.values[fieldId] = arr;
        inp.value = "";
        markInstanceDirty(inst);
        revalidate(inst);
        renderOutput();
        refresh();
        saveAll();
      } else if (v) {
        inp.value = "";
      }
    } else if (e.key === "Backspace" && !inp.value && (inst.values[fieldId] || []).length) {
      inst.values[fieldId].pop();
      markInstanceDirty(inst);
      revalidate(inst);
      renderOutput();
      refresh();
      saveAll();
    }
  };

  chips.addEventListener("click", (e) => {
    if (e.target === chips) getInput().focus();
  });
  getInput().addEventListener("keydown", keyHandler);
  bindRemoves();
}

/* ================================================================
   [9] EDICIÓN DE SCHEMA: SECCIONES Y CAMPOS
   ================================================================ */
function moveSection(form, secId, dir) {
  const idx = form.sections.findIndex(s => s.id === secId);
  const to = idx + dir;
  if (idx < 0 || to < 0 || to >= form.sections.length) return;
  const [sec] = form.sections.splice(idx, 1);
  form.sections.splice(to, 0, sec);
  renderForm();
  scheduleSave();
}

// Mueve el campo dentro de su sección; en los bordes salta a la
// sección vecina, así el orden del output es totalmente libre.
function moveField(form, fieldId, dir) {
  const found = getField(form, fieldId);
  if (!found) return;
  const { sec, idx } = found;
  const to = idx + dir;
  if (to >= 0 && to < sec.fields.length) {
    const [f] = sec.fields.splice(idx, 1);
    sec.fields.splice(to, 0, f);
  } else {
    const sIdx = form.sections.indexOf(sec);
    const neighbor = form.sections[sIdx + dir];
    if (!neighbor) return;
    const [f] = sec.fields.splice(idx, 1);
    if (dir < 0) neighbor.fields.push(f);
    else neighbor.fields.unshift(f);
  }
  renderForm();
  scheduleSave();
}

function deleteField(form, fieldId) {
  const found = getField(form, fieldId);
  if (!found) return;
  showConfirmModal({
    title: "Borrar campo",
    body: `¿Borrar definitivamente el campo «${escapeHtml(found.field.label)}»? Dejará de aparecer en el formulario y en el output.`,
    confirmText: "Borrar",
    confirmClass: "danger",
    onConfirm: () => {
      found.sec.fields = found.sec.fields.filter(f => f.id !== fieldId);
      renderForm();
      scheduleSave();
    }
  });
}

function deleteSection(form, secId) {
  const sec = getSection(form, secId);
  if (!sec) return;
  showConfirmModal({
    title: "Borrar sección",
    body: `¿Borrar definitivamente la sección «${escapeHtml(sec.label)}» y sus ${sec.fields.length} campo(s)?`,
    confirmText: "Borrar todo",
    confirmClass: "danger",
    onConfirm: () => {
      form.sections = form.sections.filter(s => s.id !== secId);
      renderForm();
      scheduleSave();
    }
  });
}

function uniqueFieldId(form, base) {
  let id = base, n = 2;
  while (getField(form, id)) { id = base + n; n++; }
  return id;
}

function uniqueSectionId(form, base) {
  let id = base, n = 2;
  while (getSection(form, id)) { id = base + n; n++; }
  return id;
}

      <div style="display:flex;flex-direction:column;gap:2px;justify-content:end;">

        if (t === "autocomplete") opts = sourceOptions(form);
        else if (t === "mirror") {

          ? opts.map(o => `<option value="${escapeHtml(o)}"${f.source === o ? " selected" : ""}>${escapeHtml(o)}</option>`).join("")
