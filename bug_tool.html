    deleteField(form, b.dataset.fldDel)));
}

// Si cambia el campo del que dependen otros (ej. mapa -> POIs),
// se limpian los dependientes sin re-pintar el formulario completo.
function clearDependents(form, name, inst, panel) {
  allFields(form).forEach(({ field }) => {
    const src = field.source || "";
    const cm = /^child:[^:]+:(.+)$/.exec(src);
    const dependsOnName = (cm && cm[1] === name) || src === "pois:" + name;
    if (dependsOnName) {
      inst.values[field.id] = "";
      const el = panel.querySelector(`[data-bind="${field.id}"]`);
      if (el) el.value = "";
    }
  });
}

/* ================================================================
   [8] WIDGETS: AUTOCOMPLETE Y PALABRAS CLAVE
   ================================================================
   El dropdown permite texto libre. Al final muestra "+ Agregar ..."
   para sumar el texto escrito a la lista (queda en DATA), y cada
   opción tiene una ✕ para borrarla definitivamente (con
   confirmación). */
// Ancestro scrolleable más cercano (el que recorta el dropdown). Ej.: el
// .form-panel (overflow-y:auto) o el panel de media.
function nearestScrollParent(el) {
  let p = el.parentElement;
  while (p && p !== document.body) {
    const oy = getComputedStyle(p).overflowY;
    if ((oy === "auto" || oy === "scroll") && p.scrollHeight > p.clientHeight) return p;
    p = p.parentElement;
  }
  return null;
}

// Decide si el dropdown abre hacia abajo (por defecto) o hacia arriba
// (clase drop-up) según el espacio disponible dentro del contenedor que lo
// recorta. Se llama con la lista ya visible para poder medir su alto real.
function positionAutocomplete(wrap, list) {
  wrap.classList.remove("drop-up");
  const rect = wrap.getBoundingClientRect();
  const sp = nearestScrollParent(wrap);
  const topBound = sp ? sp.getBoundingClientRect().top : 0;
  const bottomBound = sp ? sp.getBoundingClientRect().bottom : window.innerHeight;
  const listH = list.offsetHeight;
  const spaceBelow = bottomBound - rect.bottom;
  const spaceAbove = rect.top - topBound;
  // Solo abre hacia arriba si no cabe abajo y arriba hay más sitio.
  if (spaceBelow < listH && spaceAbove > spaceBelow) wrap.classList.add("drop-up");
}

function wireAutocomplete(input, inst, form, field) {
  const wrap = input.closest(".autocomplete");
  const list = wrap.querySelector(".autocomplete-list");
  const arrow = wrap.querySelector("[data-ac-toggle]");
  let activeIdx = -1;

  const renderList = (showAll) => {
    const all = optionsForField(field, inst);
    const q = input.value.trim().toLowerCase();
    let items = all;
    if (!showAll && q) items = all.filter(v => v.toLowerCase().includes(q));

    let html = "";
    if (!items.length) {
      html = `<div class="autocomplete-empty">Sin coincidencias — puedes escribir un valor libre</div>`;
    } else {
      const re = q ? new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig") : null;
      html = items.slice(0, 50).map(v => {
        const marked = re ? escapeHtml(v).replace(re, "<mark>$1</mark>") : escapeHtml(v);
        return `<div class="autocomplete-item" data-v="${escapeHtml(v)}">
          <span>${marked}</span>
          <span class="ac-del" data-del="${escapeHtml(v)}" title="Borrar esta opción de la lista">✕</span>
        </div>`;
      }).join("");
    }
    // Fila "+ Agregar" cuando lo escrito no existe tal cual en la lista
    const typed = input.value.trim();
    if (typed && !all.some(v => v.toLowerCase() === typed.toLowerCase())) {
      html += `<div class="autocomplete-add" data-add="${escapeHtml(typed)}">+ Agregar «${escapeHtml(typed)}» a la lista</div>`;
    }
    list.innerHTML = html;

    list.querySelectorAll(".autocomplete-item").forEach(it => {
      it.addEventListener("mousedown", (e) => {
        if (e.target.closest(".ac-del")) return; // la ✕ tiene su propio handler
        e.preventDefault();
        input.value = it.dataset.v;
        input.dispatchEvent(new Event("input"));
        wrap.classList.remove("open");
      });
    });
    list.querySelectorAll(".ac-del").forEach(x => {
      x.addEventListener("mousedown", (e) => {
        e.preventDefault();
        e.stopPropagation();
        confirmDeleteOption(field, inst, x.dataset.del, () => renderList(showAll));
      });
    });
    const addEl = list.querySelector(".autocomplete-add");
    if (addEl) {
      addEl.addEventListener("mousedown", (e) => {
        e.preventDefault();
        addOptionToSource(field, inst, addEl.dataset.add);
        input.value = addEl.dataset.add;
        input.dispatchEvent(new Event("input"));
        wrap.classList.remove("open");
      });
    }
    activeIdx = -1;
    wrap.classList.add("open");
    positionAutocomplete(wrap, list);
  };

  if (arrow) {
    arrow.addEventListener("mousedown", (e) => {
      e.preventDefault();
      if (wrap.classList.contains("open")) wrap.classList.remove("open");
      // Enfoca PRIMERO: focus dispara renderList(false) (filtrado por el
      // texto ya escrito); luego renderList(true) lo sobrescribe con TODAS
      // las opciones. Si se invierte el orden, el focus re-filtra y el
      // dropdown se abre incompleto la primera vez (bug de la flecha).
      else { input.focus(); renderList(true); }
    });
  }
  input.addEventListener("focus", () => renderList(false));
  input.addEventListener("input", () => renderList(false));
  input.addEventListener("blur", () => setTimeout(() => {
    wrap.classList.remove("open");
    activeIdx = -1;
  }, 150));

  input.addEventListener("keydown", (e) => {
    const items = list.querySelectorAll(".autocomplete-item");
    if (e.key === "ArrowDown") {
      e.preventDefault();
      if (!wrap.classList.contains("open")) renderList(false);
      activeIdx = Math.min(items.length - 1, activeIdx + 1);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeIdx = Math.max(0, activeIdx - 1);
    } else if (e.key === "Enter" && wrap.classList.contains("open") && activeIdx >= 0 && items[activeIdx]) {
      e.preventDefault();
      input.value = items[activeIdx].dataset.v;
      input.dispatchEvent(new Event("input"));
      wrap.classList.remove("open");
      activeIdx = -1;
      return;
    } else if (e.key === "Escape") {
      wrap.classList.remove("open");
      activeIdx = -1;
      return;
    } else {
      return;
    }
    items.forEach((it, i) => it.classList.toggle("active", i === activeIdx));
    // Desplaza SOLO dentro del propio dropdown (no la página): así navegar
    // con las flechas nunca mueve el resto del layout.
    if (activeIdx >= 0 && items[activeIdx]) {
      const it = items[activeIdx];
      if (it.offsetTop < list.scrollTop) list.scrollTop = it.offsetTop;
      else if (it.offsetTop + it.offsetHeight > list.scrollTop + list.clientHeight)
        list.scrollTop = it.offsetTop + it.offsetHeight - list.clientHeight;
    }
  });
}

// Interpreta la fuente de un campo: { kind, link?, parentField? }.
// kind: "child" (lista dependiente) o "list" (raíz / plana). Ya no hay "parent":
// una lista raíz se referencia por su id a secas. `parent:`/`maps`/`pois:` se
// aceptan solo como legacy (CSV viejo sin migrar).
function parseSource(src) {
  src = src || "";
  let m;
  if ((m = /^child:([^:]+):(.+)$/.exec(src))) return { kind: "child", link: m[1], parentField: m[2] };
  if ((m = /^parent:(.+)$/.exec(src))) return { kind: "list", list: m[1] };
  if (src === "maps") return { kind: "list", list: "map" };
  if ((m = /^pois:(.+)$/.exec(src))) return { kind: "child", link: "poi", parentField: m[1] };
  return { kind: "list", list: src };
}

// Agrega un valor a la fuente del campo (raíz o dependiente).
function addOptionToSource(field, inst, value) {
  const s = parseSource(field.source);
  if (s.kind === "child") {
    const c = config.data.childLists[s.link];
    if (!c) return;
    const pv = String(inst.values[s.parentField] || "");
    if (!pv) { flashBanner(`Primero elige ${listLabel(c.parent).toLowerCase()}.`, true); return; }
    c.values[pv] = c.values[pv] || [];
    c.values[pv].push(value);
  } else {
    config.data.lists[s.list] = config.data.lists[s.list] || [];
    config.data.lists[s.list].push(value);
  }
  scheduleSave();
  flashBanner(`«${value}» agregado. Recuerda exportar los datos o la herramienta para compartirlo.`);
}

function confirmDeleteOption(field, inst, value, after) {
  const s = parseSource(field.source);
  const listName = s.kind === "child" ? listLabel(s.link) : listLabel(s.list);
  showConfirmModal({
    title: "Borrar opción",
    body: `¿Borrar definitivamente «${escapeHtml(value)}» de la lista de ${escapeHtml(listName)}? Afecta a todos los formularios que usan esta lista.`,
    confirmText: "Borrar",
    confirmClass: "danger",
    onConfirm: () => {
      if (s.kind === "child") {
        const c = config.data.childLists[s.link];
        const pv = String(inst.values[s.parentField] || "");
        if (c && c.values[pv]) c.values[pv] = c.values[pv].filter(v => v !== value);
      } else if (config.data.lists[s.list]) {
        config.data.lists[s.list] = config.data.lists[s.list].filter(v => v !== value);
      }
      scheduleSave();
      if (after) after();
    }
  });
}

function wireKeywords(chips, inst, form) {
  const fieldId = chips.dataset.kwChips;
  const getInput = () => chips.querySelector("[data-kw-input]");

  const refresh = () => {
    const cur = getInput().value;
    chips.innerHTML = (inst.values[fieldId] || []).map(k =>
      `<span class="chip">${escapeHtml(k)}<button data-kw-remove="${escapeHtml(k)}" title="Quitar">×</button></span>`
    ).join("") + `<input type="text" data-kw-input="${escapeHtml(fieldId)}" placeholder="Escribe y presiona Enter..." />`;
    const inp = getInput();
    inp.value = cur;
    inp.addEventListener("keydown", keyHandler);
    inp.focus();
    bindRemoves();
  };
  const bindRemoves = () => {
    chips.querySelectorAll("[data-kw-remove]").forEach(btn => {
      btn.addEventListener("click", () => {
        inst.values[fieldId] = (inst.values[fieldId] || []).filter(k => k !== btn.dataset.kwRemove);
        markInstanceDirty(inst);
        revalidate(inst);
        renderOutput();
        refresh();
        saveAll();
      });
    });
  };
  const keyHandler = (e) => {
    const inp = getInput();
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      const v = inp.value.trim();
      const arr = inst.values[fieldId] || [];
      if (v && !arr.includes(v)) {
        arr.push(v);
        inst.values[fieldId] = arr;
        inp.value = "";
        markInstanceDirty(inst);
        revalidate(inst);
        renderOutput();
        refresh();
        saveAll();
      } else if (v) {
        inp.value = "";
      }
    } else if (e.key === "Backspace" && !inp.value && (inst.values[fieldId] || []).length) {
      inst.values[fieldId].pop();
      markInstanceDirty(inst);
      revalidate(inst);
      renderOutput();
      refresh();
      saveAll();
    }
  };

  chips.addEventListener("click", (e) => {
    if (e.target === chips) getInput().focus();
  });
  getInput().addEventListener("keydown", keyHandler);
  bindRemoves();
}

/* ================================================================
   [9] EDICIÓN DE SCHEMA: SECCIONES Y CAMPOS
   ================================================================ */
function moveSection(form, secId, dir) {
  const idx = form.sections.findIndex(s => s.id === secId);
  const to = idx + dir;
  if (idx < 0 || to < 0 || to >= form.sections.length) return;
  const [sec] = form.sections.splice(idx, 1);
  form.sections.splice(to, 0, sec);
  renderForm();
  scheduleSave();
}

// Mueve el campo dentro de su sección; en los bordes salta a la
// sección vecina, así el orden del output es totalmente libre.
function moveField(form, fieldId, dir) {
  const found = getField(form, fieldId);
  if (!found) return;
  const { sec, idx } = found;
  const to = idx + dir;
  if (to >= 0 && to < sec.fields.length) {
    const [f] = sec.fields.splice(idx, 1);
    sec.fields.splice(to, 0, f);
  } else {
    const sIdx = form.sections.indexOf(sec);
    const neighbor = form.sections[sIdx + dir];
    if (!neighbor) return;
    const [f] = sec.fields.splice(idx, 1);
    if (dir < 0) neighbor.fields.push(f);
    else neighbor.fields.unshift(f);
  }
  renderForm();
  scheduleSave();
}

function deleteField(form, fieldId) {
  const found = getField(form, fieldId);
  if (!found) return;
  showConfirmModal({
    title: "Borrar campo",
    body: `¿Borrar definitivamente el campo «${escapeHtml(found.field.label)}»? Dejará de aparecer en el formulario y en el output.`,
    confirmText: "Borrar",
    confirmClass: "danger",
    onConfirm: () => {
      found.sec.fields = found.sec.fields.filter(f => f.id !== fieldId);
      renderForm();
      scheduleSave();
    }
  });
}

function deleteSection(form, secId) {
  const sec = getSection(form, secId);
  if (!sec) return;
  showConfirmModal({
    title: "Borrar sección",
    body: `¿Borrar definitivamente la sección «${escapeHtml(sec.label)}» y sus ${sec.fields.length} campo(s)?`,
    confirmText: "Borrar todo",
    confirmClass: "danger",
    onConfirm: () => {
      form.sections = form.sections.filter(s => s.id !== secId);
      renderForm();
      scheduleSave();
    }
  });
}

function uniqueFieldId(form, base) {
  let id = base, n = 2;
  while (getField(form, id)) { id = base + n; n++; }
  return id;
}

function uniqueSectionId(form, base) {
  let id = base, n = 2;
  while (getSection(form, id)) { id = base + n; n++; }
  return id;
}

// ---- Editor de sección (crear o modificar) ----
function showSectionEditor(form, sec) {
  const isNew = !sec;
  const s = sec || { label: "", mode: "lines", heading: "", sep: " - ", noGap: false };
  const body = `
    <div class="fe-grid">
      <div class="fe-full">
        <label>Nombre de la sección</label>
        <input type="text" id="se_label" value="${escapeHtml(s.label)}" />
      </div>
      <div>
        <label>Modo de salida</label>
        <select id="se_mode">
          <option value="lines"${s.mode !== "joined" ? " selected" : ""}>Líneas (cada campo en su línea)</option>
          <option value="joined"${s.mode === "joined" ? " selected" : ""}>Unida (todo en una sola línea)</option>
        </select>
        <div class="field-help">"Unida" sirve para encabezados tipo resumen.</div>
      </div>
      <div>
        <label>Separador (modo unida)</label>
        <input type="text" id="se_sep" value="${escapeHtml(s.sep != null ? s.sep : " - ")}" />
        <div class="field-help">Texto entre campos, p. ej. " - "</div>
      </div>
      <div class="fe-full">
        <label>Encabezado en el output (opcional)</label>
        <input type="text" id="se_heading" value="${escapeHtml(s.heading || "")}" />
        <div class="field-help">P. ej. "+Notas:+". Vacío = sin encabezado.</div>
      </div>
      <label class="checkbox fe-full"><input type="checkbox" id="se_nogap"${s.noGap ? " checked" : ""} /> Sin línea en blanco después de esta sección</label>
    </div>`;
  showEditorModal({
    title: isNew ? "Nueva sección" : `Editar sección «${escapeHtml(s.label)}»`,
    bodyHtml: body,
    onConfirm: () => {
      const label = $("se_label").value.trim();
      if (!label) { flashBanner("La sección necesita un nombre.", true); return false; }
      const target = isNew
        ? { id: uniqueSectionId(form, slugify(label)), label: "", mode: "lines", fields: [] }
        : sec;
      target.label = label;
      target.mode = $("se_mode").value;
      target.heading = $("se_heading").value;
      target.sep = $("se_sep").value;
      target.noGap = $("se_nogap").checked;
      if (!target.heading) delete target.heading;
      if (!target.noGap) delete target.noGap;
      if (isNew) form.sections.push(target);
      renderForm();
      scheduleSave();
      return true;
    }
  });
}

// ---- Editor de campo (crear o modificar) ----
function showFieldEditor(form, sec, field) {
  const isNew = !field;
  const f = field || {
    label: "", type: "text", size: "full", source: "", template: "{value}",
    sep: null, rows: 3, required: false, regex: "", regexMsg: "",
    default: "", emptyAs: "", omitValue: "", help: "",
    joinPrev: false, perLine: false
  };
  const typeOpts = FIELD_TYPES.map(t =>
    `<option value="${t.id}"${f.type === t.id ? " selected" : ""}>${t.label}</option>`).join("");
  const sizeOpts = FIELD_SIZES.map(t =>
    `<option value="${t.id}"${(f.size || "full") === t.id ? " selected" : ""}>${t.label}</option>`).join("");

  const body = `
    <div class="fe-grid">
      <div class="fe-sep">Básico</div>
      <div>
        <label>Etiqueta (lo que ve el tester)</label>
        <input type="text" id="fe_label" value="${escapeHtml(f.label)}" />
      </div>
      <div>
        <label>Tipo de campo</label>
        <select id="fe_type">${typeOpts}</select>
      </div>
      <div>
        <label>Fuente (para dropdown / copia)</label>
        <select id="fe_source"></select>
        <div class="field-help">Dropdown: qué lista muestra. Copia: qué campo copia.</div>
      </div>
      <div>
        <label>Tamaño en el formulario</label>
        <select id="fe_size">${sizeOpts}</select>
      </div>
      <div>
        <label>Valor por defecto</label>
        <input type="text" id="fe_default" value="${escapeHtml(f.default || "")}" />
        <div class="field-help">Acepta @regla, p. ej. @default_tz</div>
      </div>
      <div>
        <label>Renglones (solo texto multilínea)</label>
        <input type="number" id="fe_rows" value="${f.rows || 3}" min="1" max="20" />
      </div>
      <div class="fe-full">
        <label>Ayuda para el tester (opcional)</label>
        <input type="text" id="fe_help" value="${escapeHtml(f.help || "")}" />
      </div>

      <div class="fe-sep">Cómo sale en el output</div>
      <div class="fe-full">
        <label>Plantilla</label>
        <input type="text" id="fe_template" value="${escapeHtml(f.template || "{value}")}" />
        <div class="field-help">{value} se reemplaza por lo escrito. Ej.: "* *Perfil:* {value}" o "# {value}" para pasos numerados.</div>
      </div>
      <div>
        <label>Separador antes del campo</label>
        <input type="text" id="fe_sep" value="${escapeHtml(f.sep != null && f.sep !== "" ? f.sep : "")}" />
        <div class="field-help">Solo en secciones "unidas". Vacío = usar el de la sección.</div>
        <label class="checkbox"><input type="checkbox" id="fe_glue"${f.sep === "" ? " checked" : ""} /> Pegado al campo anterior (sin separador)</label>
      </div>
      <div>
        <label>Si está vacío, mostrar</label>
        <input type="text" id="fe_emptyAs" value="${escapeHtml(f.emptyAs || "")}" />
        <div class="field-help">P. ej. "N/A". Vacío = omitir la línea.</div>
      </div>
      <div>
        <label>Omitir si el valor es</label>
        <input type="text" id="fe_omitValue" value="${escapeHtml(f.omitValue || "")}" />
        <div class="field-help">P. ej. "N/A" para no imprimir BSP CL: N/A</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px;justify-content:end;">
        <label class="checkbox"><input type="checkbox" id="fe_joinPrev"${f.joinPrev ? " checked" : ""} /> Continúa en la línea anterior</label>
        <label class="checkbox"><input type="checkbox" id="fe_perLine"${f.perLine ? " checked" : ""} /> Aplicar plantilla a cada línea escrita</label>
      </div>

      <div class="fe-sep">Validación</div>
      <div class="fe-full" style="display:flex;gap:16px;">
        <label class="checkbox"><input type="checkbox" id="fe_required"${f.required ? " checked" : ""} /> Obligatorio</label>
        <label class="checkbox"><input type="checkbox" id="fe_hidden"${f.hidden ? " checked" : ""} /> Oculto por defecto (aparece solo por una condición de RULES)</label>
      </div>
      <div>
        <label>REGEX</label>
        <input type="text" id="fe_regex" value="${escapeHtml(f.regex || "")}" />
        <div class="field-help">Expresión regular o @regla de DATA (ej. @coord_re)</div>
      </div>
      <div>
        <label>Mensaje si no cumple</label>
        <input type="text" id="fe_regexMsg" value="${escapeHtml(f.regexMsg || "")}" />
      </div>
      <div>
        <label>Chips: cantidad exacta</label>
        <input type="text" id="fe_kwCount" value="${escapeHtml(f.kwCount || "")}" />
        <div class="field-help">Solo palabras clave. Número o @regla (ej. @kw_count). Vacío = sin límite.</div>
      </div>
      <div style="display:flex;align-items:end;">
        <label class="checkbox"><input type="checkbox" id="fe_kwOverlap"${f.kwOverlap ? " checked" : ""} /> Chips: prohibir que aparezcan en el cuerpo del bug</label>
      </div>
    </div>`;

  showEditorModal({
    title: isNew ? `Nuevo campo en «${escapeHtml(sec.label)}»` : `Editar campo «${escapeHtml(f.label)}»`,
    bodyHtml: body,
    wide: true,
    onOpen: () => {
      // La fuente depende del tipo: listas para dropdown, campos para copia.
      const typeSel = $("fe_type");
      const srcSel = $("fe_source");
      const fillSources = () => {
        const t = typeSel.value;
        let opts = [];
        if (t === "autocomplete") opts = sourceOptions(form);
        else if (t === "mirror") {
          opts = allFields(form).filter(x => x.field.type !== "mirror" && x.field.id !== f.id)
                                 .map(x => ({ value: x.field.id, label: x.field.label }));
        }
        srcSel.disabled = !opts.length;
        srcSel.innerHTML = opts.length
          ? opts.map(o => `<option value="${escapeHtml(o.value)}"${f.source === o.value ? " selected" : ""}>${escapeHtml(o.label)}</option>`).join("")
          : `<option value="">(no aplica)</option>`;
      };
      typeSel.addEventListener("change", fillSources);
      fillSources();
    },
    onConfirm: () => {
      const label = $("fe_label").value.trim();
      if (!label) { flashBanner("El campo necesita una etiqueta.", true); return false; }
      const regexTxt = $("fe_regex").value.trim();
      if (regexTxt) {
        try { new RegExp(resolveRef(regexTxt)); }
        catch (e) { flashBanner("La REGEX no es válida: " + e.message, true); return false; }
      }
      const target = isNew ? { id: uniqueFieldId(form, slugify(label)) } : field;
      target.label = label;
      target.type = $("fe_type").value;
      // Solo guardamos las propiedades con contenido para que el
      // schema (y el CSV) queden limpios y legibles.
      const setOrDel = (key, val, emptyVal) => {
        if (val === emptyVal || val === "" || val == null) delete target[key];
        else target[key] = val;
      };
      setOrDel("size", $("fe_size").value, "full");
      setOrDel("source", $("fe_source").disabled ? "" : $("fe_source").value, "");
      setOrDel("default", $("fe_default").value, "");
      setOrDel("rows", parseInt($("fe_rows").value, 10) || 3, 3);
      setOrDel("help", $("fe_help").value.trim(), "");
      setOrDel("template", $("fe_template").value, "{value}");
      // Separador: el checkbox "pegado" fuerza sep = "" (sin separador);
      // si no, texto no vacío = separador propio; vacío = usar el de la sección.
      if ($("fe_glue").checked) target.sep = "";
      else setOrDel("sep", $("fe_sep").value, "");
      setOrDel("emptyAs", $("fe_emptyAs").value.trim(), "");
      setOrDel("omitValue", $("fe_omitValue").value.trim(), "");
      if ($("fe_joinPrev").checked) target.joinPrev = true; else delete target.joinPrev;
      if ($("fe_perLine").checked) target.perLine = true; else delete target.perLine;
      if ($("fe_required").checked) target.required = true; else delete target.required;
      if ($("fe_hidden").checked) target.hidden = true; else delete target.hidden;
      setOrDel("regex", regexTxt, "");
      setOrDel("regexMsg", $("fe_regexMsg").value.trim(), "");
      setOrDel("kwCount", $("fe_kwCount").value.trim(), "");
      if ($("fe_kwOverlap").checked) target.kwOverlap = true; else delete target.kwOverlap;
      if (target.type !== "keywords") { delete target.kwCount; delete target.kwOverlap; }
      if (target.type === "mirror") { delete target.required; delete target.regex; }
      if (isNew) sec.fields.push(target);
      state.instances.forEach(ensureInstanceFields);
      renderForm();
      scheduleSave();
      return true;
    }
  });
}

/* ================================================================
   [10] VALIDACIÓN, CONDICIONES ENTRE CAMPOS Y TILES DE ESTADO
   ================================================================
   Validaciones por campo (editables en RULES):
     - required: no puede quedar vacío
     - regex: expresión regular literal o @regla de DATA
   Palabras clave (por campo): cantidad exacta (kwCount, acepta
   @regla), unicidad, y opcionalmente que no aparezcan en el cuerpo
   del bug (kwOverlap).

   CONDICIONES ENTRE CAMPOS (form.rules, editables en RULES):
     { when: { field, op, value }, then: { action, field, value } }
     op:     empty | notEmpty | equals | notEquals | matches (regex/@regla)
     action: show | hide | disable | setDefault
   Ejemplos: si map está vacío o es "global" → ocultar/bloquear POI;
   si shortDescription cumple la regex LOD → mostrar el campo
   "LOD number" (creado con "Oculto por defecto") en Notas. */
function getFormRules(form) {
  return form.rules || [];
}

/* ================================================================
   MOTOR DE EXPRESIONES BOOLEANAS (AND / OR / NOT)
   ================================================================
   La condición de una regla es una EXPRESIÓN de texto anidable. Gramática
   (palabras clave indistintas de may/min):

     expr    := or
     or      := and  ( ("OR"|"||")  and )*
     and     := not  ( ("AND"|"&&") not )*
     not     := ("NOT"|"!") not  |  primary
     primary := "(" expr ")"  |  "@"nombre  |  comparación
     comparación := campo ( "empty" | "notEmpty"
                          | ("="|"==") operando       // igual
                          | ("!="|"<>") operando       // distinto
                          | ("matches"|"~") operando ) // cumple regex/@regla
     operando := "texto"  |  "@"nombre  |  palabra

   - operando entre comillas → literal;  @nombre → @regla;  palabra suelta →
     id de campo (compara valor contra valor: equalsField/notEqualsField).
   - "@nombre" suelto = evalúa esa @regla como sub-expresión booleana
     (permite reutilizar/concatenar reglas: «@esLod OR @esVlod»).
   Retrocompatible: una `when` vieja { field, op, value } sigue evaluándose. */

function tokenizeExpr(src) {
  const toks = [];
  let i = 0;
  const isWord = (c) => /[A-Za-z0-9_\-.]/.test(c);
  while (i < src.length) {
    const c = src[i];
    if (/\s/.test(c)) { i++; continue; }
    if (c === "(" || c === ")") { toks.push({ t: c }); i++; continue; }
    if (c === '"' || c === "'") {
      let j = i + 1, s = "";
      while (j < src.length && src[j] !== c) { s += src[j]; j++; }
      if (j >= src.length) throw new Error("Falta cerrar la comilla");
      toks.push({ t: "str", v: s }); i = j + 1; continue;
    }
    if (c === "@") {
      let j = i + 1, s = "";
      while (j < src.length && /[A-Za-z0-9_]/.test(src[j])) { s += src[j]; j++; }
      if (!s) throw new Error("@ sin nombre de regla");
      toks.push({ t: "ref", v: s }); i = j; continue;
    }
    const two = src.slice(i, i + 2);
    if (two === "==" || two === "!=" || two === "<>" || two === "&&" || two === "||") {
      toks.push({ t: "op", v: two }); i += 2; continue;
    }
    if (c === "=" || c === "~" || c === "!") { toks.push({ t: "op", v: c }); i++; continue; }
    if (isWord(c)) {
      let j = i, s = "";
      while (j < src.length && isWord(src[j])) { s += src[j]; j++; }
      toks.push({ t: "word", v: s }); i = j; continue;
    }
    throw new Error("Carácter inesperado: «" + c + "»");
  }
  return toks;
}

// Parser de descenso recursivo → AST. Lanza Error con mensaje legible.
function parseExpr(src) {
  const toks = tokenizeExpr(src);
  let p = 0;
  const peek = () => toks[p];
  const isKw = (w) => peek() && peek().t === "word" && peek().v.toLowerCase() === w;
  const isOp = (...vs) => peek() && peek().t === "op" && vs.includes(peek().v);

  function parseOr() {
    let left = parseAnd();
    while (isKw("or") || isOp("||")) { p++; left = { type: "or", items: [left, parseAnd()] }; }
    return left;
  }
  function parseAnd() {
    let left = parseNot();
    while (isKw("and") || isOp("&&")) { p++; left = { type: "and", items: [left, parseNot()] }; }
    return left;
  }
  function parseNot() {
    if (isKw("not") || isOp("!")) { p++; return { type: "not", item: parseNot() }; }
    return parsePrimary();
  }
  function parsePrimary() {
    if (peek() && peek().t === "(") {
      p++;
      const e = parseOr();
      if (!peek() || peek().t !== ")") throw new Error("Falta cerrar «)»");
      p++;
      return e;
    }
    if (peek() && peek().t === "ref") { const name = peek().v; p++; return { type: "ref", name }; }
    // comparación: empieza por un id de campo (word)
    if (!peek() || peek().t !== "word") throw new Error("Se esperaba un campo o «(»");
    const field = peek().v; p++;
    // operador postfijo empty/notEmpty
    if (isKw("empty")) { p++; return { type: "cmp", field, op: "empty" }; }
    if (isKw("notempty")) { p++; return { type: "cmp", field, op: "notEmpty" }; }
    // operador binario
    let op;
    if (isOp("=", "==")) op = "eq";
    else if (isOp("!=", "<>")) op = "ne";
    else if (isKw("matches") || isOp("~")) op = "matches";
    else throw new Error("Se esperaba un operador después de «" + field + "»");
    p++;
    if (!peek()) throw new Error("Falta el valor de la comparación");
    const tk = peek(); p++;
    let operand;
    if (tk.t === "str") operand = { kind: "lit", v: tk.v };
    else if (tk.t === "ref") operand = { kind: "ref", v: tk.v };
    else if (tk.t === "word") operand = { kind: "word", v: tk.v };
    else throw new Error("Valor de comparación inválido");
    return { type: "cmp", field, op, operand };
  }

  if (!toks.length) throw new Error("Expresión vacía");
  const ast = parseOr();
  if (p < toks.length) throw new Error("Sobra texto tras la expresión");
  return ast;
}

// Convierte un nodo de comparación a la forma { field, op, value } que ya
// sabe evaluar evalCondition (reusando toda su semántica).
function cmpToWhen(node) {
  if (node.op === "empty" || node.op === "notEmpty") return { field: node.field, op: node.op };
  const o = node.operand || { kind: "lit", v: "" };
  if (node.op === "matches") {
    const val = o.kind === "ref" ? "@" + o.v : o.v;
    return { field: node.field, op: "matches", value: val };
  }
  // eq/ne: palabra suelta que ES un id de campo → comparación campo-a-campo
  const isFieldRef = o.kind === "word" && anyFieldHasId(o.v);
  if (o.kind === "ref") return { field: node.field, op: node.op === "eq" ? "equals" : "notEquals", value: "@" + o.v };
  if (isFieldRef) return { field: node.field, op: node.op === "eq" ? "equalsField" : "notEqualsField", value: o.v };
  return { field: node.field, op: node.op === "eq" ? "equals" : "notEquals", value: o.v };
}

// ¿Algún campo de cualquier formulario tiene este id? (para decidir si un
// operando suelto es referencia a campo o literal).
function anyFieldHasId(id) {
  return getForms().some(f => allFields(f).some(x => x.field.id === id));
}

// Evalúa un AST contra la instancia. `seen` evita ciclos entre @reglas.
function evalAst(ast, inst, seen) {
  if (!ast) return false;
  switch (ast.type) {
    case "or":  return ast.items.some(x => evalAst(x, inst, seen));
    case "and": return ast.items.every(x => evalAst(x, inst, seen));
    case "not": return !evalAst(ast.item, inst, seen);
    case "cmp": return evalCondition(cmpToWhen(ast), inst);
    case "ref": {
      const name = ast.name;
      if (seen && seen.has(name)) return false; // ciclo
      const raw = config.data.rules[name];
      if (raw == null || String(raw).trim() === "") return false;
      try {
        const sub = parseExpr(String(raw));
        const s2 = new Set(seen || []); s2.add(name);
        return evalAst(sub, inst, s2);
      } catch (e) { return false; } // @regla que no es expresión booleana
    }
    default: return false;
  }
}

// Evalúa la condición de una regla, aceptando la forma nueva (whenExpr:
// string) o la vieja (when: {field,op,value}). Vacío = no dispara.
function ruleWhenTrue(rule, inst) {
  if (typeof rule.whenExpr === "string") {
    const src = rule.whenExpr.trim();
    if (!src) return false;
    try { return evalAst(parseExpr(src), inst); }
    catch (e) { return false; } // expresión inválida: la regla no aplica
  }
  if (rule.when) return evalCondition(rule.when, inst);
  return false;
}

// Valida una expresión; devuelve "" si es válida o el mensaje de error.
function exprError(src) {
  if (!String(src || "").trim()) return "";
  try { parseExpr(String(src)); return ""; }
  catch (e) { return e.message || "Expresión inválida"; }
}

// Ids de campo usados como lado izquierdo de una comparación en la expresión
// (para validar al importar que existan). No mira los operandos (pueden ser
// literales) ni desciende a otras @reglas. Si no parsea, devuelve [].
function exprFieldRefs(src) {
  const ids = [];
  const walk = (n) => {
    if (!n) return;
    if (n.type === "cmp") ids.push(n.field);
    else if (n.type === "not") walk(n.item);
    else if (n.type === "or" || n.type === "and") n.items.forEach(walk);
  };
  try { walk(parseExpr(String(src || ""))); } catch (e) {}
  return ids;
}

function evalCondition(when, inst) {
  const v = String(inst.values[when.field] == null ? "" : inst.values[when.field]).trim();
  const target = String(when.value == null ? "" : when.value).trim();
  switch (when.op) {
    case "empty":     return !v;
    case "notEmpty":  return !!v;
    case "equals":    return v.toLowerCase() === target.toLowerCase();
    case "notEquals": return v.toLowerCase() !== target.toLowerCase();
    case "matches":
      try { return new RegExp(resolveRef(target), "i").test(v); }
      catch (e) { return false; }
    // target = id de otro campo; solo cuenta si ambos tienen valor
    case "equalsField": {
      const other = String(inst.values[target] == null ? "" : inst.values[target]).trim();
      return !!v && !!other && v.toLowerCase() === other.toLowerCase();
    }
    case "notEqualsField": {
      const other = String(inst.values[target] == null ? "" : inst.values[target]).trim();
      return !!v && !!other && v.toLowerCase() !== other.toLowerCase();
    }
    default: return false;
  }
}

// Estado efectivo de cada campo según las condiciones del formulario.
// Devuelve { fieldId: { hidden, disabled } }. La acción setDefault
// rellena el campo destino solo si está vacío.
function evalFieldRules(form, inst) {
  const fx = {};
  allFields(form).forEach(({ field }) => {
    fx[field.id] = { hidden: !!field.hidden, disabled: false };
  });
  getFormRules(form).forEach(r => {
    if ((!r.when && r.whenExpr == null) || !r.then || !fx[r.then.field]) return;
    if (!ruleWhenTrue(r, inst)) return;
    const t = fx[r.then.field];
    if (r.then.action === "show") t.hidden = false;
    else if (r.then.action === "hide") t.hidden = true;
    else if (r.then.action === "disable") t.disabled = true;
    else if (r.then.action === "setDefault") {
      const cur = inst.values[r.then.field];
      if (!String(cur == null ? "" : cur).trim()) {
        inst.values[r.then.field] = resolveRef(r.then.value || "");
      }
    }
  });
  return fx;
}

function revalidate(inst) {
  inst.errors = {};
  const form = getForm(inst.formId);
  if (!form) return;
  const fx = evalFieldRules(form, inst);

  // Cuerpo del bug: todos los campos de texto, para el chequeo de keywords
  const bodyText = allFields(form)
    .filter(({ field }) => field.type === "text" || field.type === "textarea")
    .map(({ field }) => String(inst.values[field.id] || ""))
    .join(" ")
    .toLowerCase();

  allFields(form).forEach(({ field }) => {
    if (field.type === "mirror") return;
    // Un campo oculto o bloqueado por condición no puede exigirse
    if (fx[field.id].hidden || fx[field.id].disabled) return;

    if (field.type === "keywords") {
      const arr = inst.values[field.id] || [];
      const want = parseInt(resolveRef(field.kwCount || ""), 10) || 0;
      if (want && arr.length !== want) {
        inst.errors[field.id] = `Se necesitan exactamente ${want} (hay ${arr.length})`;
      } else if (new Set(arr.map(k => k.toLowerCase())).size !== arr.length) {
        inst.errors[field.id] = "Los valores deben ser únicos";
      } else if (field.kwOverlap) {
        const conflict = arr.find(k => bodyText.includes(k.toLowerCase()));
        if (conflict) inst.errors[field.id] = `«${conflict}» aparece en el cuerpo del bug`;
      }
      return;
    }

    const v = String(inst.values[field.id] || "");
    if (field.required && !v.trim()) {
      inst.errors[field.id] = "Obligatorio";
      return;
    }
    if (v.trim() && field.regex) {
      try {
        const re = new RegExp(resolveRef(field.regex));
        if (!re.test(v.trim())) {
          inst.errors[field.id] = field.regexMsg || "Formato inválido";
        }
      } catch (e) { /* regex rota: se ignora, se corrige en RULES */ }
    }
  });

  // Condiciones con acción "marcar error" (ej. BSP CL igual a CL).
  // No aplican sobre campos ocultos o bloqueados.
  getFormRules(form).forEach(r => {
    if ((!r.when && r.whenExpr == null) || !r.then || r.then.action !== "error") return;
    const st = fx[r.then.field];
    if (!st || st.hidden || st.disabled) return;
    if (ruleWhenTrue(r, inst)) {
      inst.errors[r.then.field] = r.then.value || "Valor inválido";
    }
  });

  reflectErrors(inst);
  renderTiles(inst);
}

// Pinta los errores en los campos sin re-renderizar el formulario.
function reflectErrors(inst) {
  const panel = $("formPanel");
  panel.querySelectorAll(".field").forEach(el => {
    const name = el.dataset.field;
    if (!name) return;
    const err = inst.errors[name] || "";
    const chips = el.querySelector("[data-kw-chips]");
    if (chips) {
      chips.classList.toggle("invalid", !!err);
      let msg = el.querySelector(".chips-error");
      if (err) {
        if (!msg) {
          msg = document.createElement("div");
          msg.className = "chips-error";
          chips.after(msg);
        }
        msg.textContent = err;
      } else if (msg) {
        msg.remove();
      }
      return;
    }
    el.classList.toggle("invalid", !!err);
    const errEl = el.querySelector(".field-error");
    if (errEl) errEl.textContent = err;
  });
}

/* ---------- Tiles personalizados (definidos por el usuario) ----------
   Cada form puede tener form.tiles = [ { text, whenExpr, color, group,
   severity, field } ]. Son independientes de los campos: aparecen cuando su
   condición es verdadera (o siempre, si la condición está vacía). Reutilizan
   el motor de expresiones (parseExpr/evalAst) y exprFieldRefs. */
function getFormTiles(form) { return (form && form.tiles) || []; }

// Rellena valores por defecto de cada tile (configs viejas / import de CSV).
function normalizeTiles(form) {
  if (!Array.isArray(form.tiles)) { form.tiles = form.tiles == null ? [] : []; }
  form.tiles.forEach(t => {
    t.text = typeof t.text === "string" ? t.text : (t.text == null ? "" : String(t.text));
    t.whenExpr = typeof t.whenExpr === "string" ? t.whenExpr : (t.whenExpr == null ? "" : String(t.whenExpr));
    t.severity = ["error", "warn", "info"].includes(t.severity) ? t.severity : "info";
    if (!TILE_COLOR_MAP[t.color]) t.color = TILE_SEV_COLOR[t.severity] || "slate";
    t.group = typeof t.group === "string" ? t.group : (t.group == null ? "" : String(t.group));
    t.field = typeof t.field === "string" ? t.field : (t.field == null ? "" : String(t.field));
  });
}
function ensureTiles(cfg) {
  (cfg.schema.forms || []).forEach(form => {
    if (!Array.isArray(form.tiles)) form.tiles = [];
    normalizeTiles(form);
  });
}

// Campos a los que "toca" un tile: los que menciona su condición más el campo
// destino explícito. Base del resaltado cruzado campo -> tile.
function tileFieldRefs(tile) {
  const refs = new Set(exprFieldRefs(tile.whenExpr || ""));
  if (tile.field) refs.add(tile.field);
  return [...refs];
}

// Sustituye {idCampo} en el texto por el valor actual de la instancia.
function interpolateTileText(text, inst) {
  return String(text || "").replace(/\{([A-Za-z0-9_\-.]+)\}/g, (m, id) => {
    const v = inst.values[id];
    if (v == null) return "";
    return Array.isArray(v) ? v.join(", ") : String(v);
  });
}

// Tiles personalizados activos ahora. Condición vacía = siempre activo
// (tile informativo fijo). Devuelve { tile, idx, text }.
function evalTiles(form, inst) {
  const out = [];
  getFormTiles(form).forEach((tile, idx) => {
    const src = String(tile.whenExpr || "").trim();
    let active;
    if (!src) active = true;
    else { try { active = evalAst(parseExpr(src), inst); } catch (e) { active = false; } }
    if (active) out.push({ tile, idx, text: interpolateTileText(tile.text || tile.group || "(tile)", inst) });
  });
  return out;
}

// ¿Hay algo que impida el estado "listo para copiar"? Errores de campo o un
// tile personalizado activo de severidad "error".
function hasBlockingState(form, inst) {
  if (Object.keys(inst.errors || {}).length) return true;
  return evalTiles(form, inst).some(a => a.tile.severity === "error");
}

// Salta y enfoca un campo por id.
function scrollToField(fieldId) {
  const el = document.querySelector(`#formPanel .field[data-field="${fieldId}"]`);
  if (!el) return;
  el.scrollIntoView({ block: "center", behavior: "smooth" });
  const inp = el.querySelector("input, textarea");
  if (inp) inp.focus({ preventScroll: true });
}

// Barra de tiles: verde si todo bien; si no, grupos con los errores de campo
// (automáticos) y los tiles personalizados activos. Se puede colapsar a una
// línea con la "llave".
function renderTiles(inst) {
  const bar = $("tilesBar");
  if (!inst || !getForm(state.topTab)) { bar.innerHTML = ""; return; }
  const form = getForm(inst.formId);

  // Banda 1: errores de campo EN EL ORDEN DEL FORM.
  const fieldErrs = [];
  allFields(form).forEach(({ field }) => {
    if (inst.errors[field.id]) fieldErrs.push([field.id, inst.errors[field.id], field]);
  });
  // Errores sin campo asociado (caso raro): al final, sin color propio.
  Object.keys(inst.errors).forEach(id => {
    if (!fieldErrs.some(e => e[0] === id)) fieldErrs.push([id, inst.errors[id], null]);
  });
  // Banda 2: tiles personalizados activos, en el orden de la lista de Rules.
  const active = evalTiles(form, inst);
  const blocking = fieldErrs.length > 0 || active.some(a => a.tile.severity === "error");

  // Nada que mostrar: verde y salir.
  if (!fieldErrs.length && !active.length) {
    bar.classList.remove("collapsed");
    bar.innerHTML = `<div class="tiles-wrap"><div class="tiles-band"><span class="tile ok">✓ Sin errores — listo para copiar</span></div></div>`;
    return;
  }

  // Banda 1 (automáticos). Cada tile usa el color del campo (default rojo).
  let band1;
  if (fieldErrs.length) {
    band1 = fieldErrs.map(([id, msg, field]) => {
      const label = field ? field.label : id;
      const cid = (field && TILE_COLOR_MAP[field.errColor]) ? field.errColor : "red";
      const col = tileColor(cid);
      const style = `background:${col.bg};color:${col.fg};border-color:${col.border}`;
      return `<span class="tile sev-error" style="${style}" data-target="${escapeHtml(id)}" data-fields="${escapeHtml(id)}" title="${escapeHtml(msg)}">${escapeHtml(label)}</span>`;
    }).join("");
  } else {
    band1 = `<span class="tile ok">✓ ${blocking ? "Campos sin errores" : "Listo para copiar"}</span>`;
  }

  // Banda 2 (personalizados).
  let band2 = "";
  if (active.length) {
    band2 = active.map(({ tile, text }) => {
      const col = tileColor(tile.color);
      const refs = tileFieldRefs(tile);
      const target = tile.field || refs[0] || "";
      const cls = "tile sev-" + tile.severity + (target ? "" : " no-target");
      const style = `background:${col.bg};color:${col.fg};border-color:${col.border}`;
      const tip = tile.whenExpr ? "Cuando: " + tile.whenExpr : "";
      return `<span class="${cls}" style="${style}"${target ? ` data-target="${escapeHtml(target)}"` : ""}`
        + ` data-fields="${escapeHtml(refs.join(" "))}"${tip ? ` title="${escapeHtml(tip)}"` : ""}>${escapeHtml(text)}</span>`;
    }).join("");
  }

  const collapsed = !!state.prefs.tilesCollapsed;
  bar.classList.toggle("collapsed", collapsed);
  bar.innerHTML =
    `<div class="tiles-wrap">` +
      `<div class="tiles-band band-auto">${band1}</div>` +
      (band2 ? `<div class="tiles-band band-custom">${band2}</div>` : "") +
    `</div>` +
    `<button class="tiles-toggle" id="tilesToggle" title="${collapsed ? "Expandir (ver todas las tiles)" : "Colapsar a una línea"}">` +
    `<span class="chev">▾</span></button>`;

  // Click en un tile con destino = saltar a ese campo.
  bar.querySelectorAll("[data-target]").forEach(t => {
    t.addEventListener("click", () => scrollToField(t.dataset.target));
  });
}

// Compactación: colapso de secciones y repliegue de paneles. Se cablea UNA
// vez en boot sobre elementos persistentes (no se reemplazan, solo su
// innerHTML), así sobrevive a los re-render. El estado vive en uiCollapse.
function wireCollapse() {
  // Secciones: delegación en #formPanel (persistente). Solo el chevron
  // dispara; el nombre no. Toggle de clase directo = respuesta inmediata +
  // animación CSS; el próximo renderForm reaplica la clase desde uiCollapse.
  const panel = $("formPanel");
  if (panel) {
    panel.addEventListener("click", e => {
      const btn = e.target.closest("[data-sec-collapse]");
      if (!btn) return;
      const form = getForm(state.topTab);
      if (!form) return;
      const key = sectionCollapseKey(form, btn.dataset.secCollapse);
      uiCollapse.sections[key] = !uiCollapse.sections[key];
      const sec = btn.closest(".form-section");
      if (sec) sec.classList.toggle("collapsed", uiCollapse.sections[key]);
    });
  }
  // Paneles: sus cabeceras son markup estático, listeners directos por id.
  const panelToggle = (btnId, elId, cls, key) => {
    const btn = $(btnId), el = $(elId);
    if (!btn || !el) return;
    btn.addEventListener("click", () => {
      uiCollapse[key] = !uiCollapse[key];
      el.classList.toggle(cls, uiCollapse[key]);
    });
  };
  panelToggle("formCollapseBtn",    "formCol",    "form-collapsed",    "form");
  panelToggle("mediaCollapseBtn",   "mediaPanel", "collapsed",         "media");
  panelToggle("actionsCollapseBtn", "outputSide", "actions-collapsed", "actions");
}

// Interacciones de la barra de tiles. Se cablean UNA vez sobre elementos
// persistentes (#tilesBar y #formPanel no se reemplazan, solo su innerHTML),
// así que la delegación sobrevive a los re-render de la barra y del form.
function wireTileInteractions() {
  const bar = $("tilesBar");
  const panel = $("formPanel");
  if (!bar || !panel) return;

  // La "llave": colapsar / expandir. El estado se guarda en la sesión.
  // (Este patrón se reutilizará luego para colapsar secciones del form.)
  bar.addEventListener("click", e => {
    if (!e.target.closest("#tilesToggle")) return;
    state.prefs.tilesCollapsed = !state.prefs.tilesCollapsed;
    bar.classList.toggle("collapsed", state.prefs.tilesCollapsed);
    const btn = $("tilesToggle");
    if (btn) btn.title = state.prefs.tilesCollapsed
      ? "Expandir (ver todas las tiles)" : "Colapsar a una línea";
    scheduleSave();
  });

  // Resaltado cruzado: al pasar el mouse o enfocar un campo, todas las tiles
  // que ese campo "toca" se marcan (.tile-hot) y las demás se atenúan.
  let hotField = null;
  const clear = () => {
    if (!hotField) return;
    bar.classList.remove("tiles-focus");
    bar.querySelectorAll(".tile-hot").forEach(t => t.classList.remove("tile-hot"));
    hotField = null;
  };
  const apply = (fieldId) => {
    if (fieldId === hotField) return;
    clear();
    let any = false;
    bar.querySelectorAll(".tile[data-fields]").forEach(t => {
      const fs = (t.dataset.fields || "").split(" ").filter(Boolean);
      if (fs.includes(fieldId)) { t.classList.add("tile-hot"); any = true; }
    });
    if (any) { bar.classList.add("tiles-focus"); hotField = fieldId; }
  };
  const leave = (e) => {
    const f = e.target.closest(".field[data-field]");
    if (!f) return;
    if (!e.relatedTarget || !f.contains(e.relatedTarget)) clear();
  };
  panel.addEventListener("mouseover", e => {
    const f = e.target.closest(".field[data-field]");
    if (f) apply(f.dataset.field);
  });
  panel.addEventListener("mouseout", leave);
  panel.addEventListener("focusin", e => {
    const f = e.target.closest(".field[data-field]");
    if (f) apply(f.dataset.field);
  });
  panel.addEventListener("focusout", leave);
}

/* ================================================================
   [11] GENERADOR DE OUTPUT
   ================================================================
   Recorre las secciones en el orden del formulario (el orden visual
   ES el orden del output) y aplica las plantillas de cada campo.
   Nada del texto está fijo en el código: todo sale del schema. */

// Texto de un campo listo para el output, o null si se omite.
function fieldOutputPart(field, inst) {
  let raw;
  if (field.type === "mirror") raw = inst.values[field.source];
  else raw = inst.values[field.id];

  if (field.type === "keywords") {
    const arr = Array.isArray(raw) ? raw : [];
    if (!arr.length) return null;
    raw = arr.join(", ");
  }
  let value = String(raw == null ? "" : raw);
  if (!value.trim()) {
    if (field.emptyAs) value = field.emptyAs;
    else return null;
  }
  if (field.omitValue && value.trim() === field.omitValue) return null;

  // \n y <br> en la plantilla se convierten en saltos de línea reales
  const tpl = unescapeNl(field.template || "{value}");
  if (field.perLine) {
    const lines = value.split("\n").map(l => l.trim()).filter(Boolean);
    if (!lines.length) return null;
    return lines.map(l => tpl.replace("{value}", l));
  }
  return tpl.replace("{value}", value);
}

function buildOutput(inst) {
  const form = getForm(inst.formId);
  if (!form) return { full: "", summary: "" };
  const blocks = [];
  let summaryLine = "";
  // Campos ocultos por condición: fuera del output
  const fx = evalFieldRules(form, inst);

  form.sections.forEach(sec => {
    const lines = [];
    if (sec.mode === "joined") {
      // Todo en una sola línea, con separadores por campo
      let line = "";
      sec.fields.forEach(field => {
        if (fx[field.id] && fx[field.id].hidden) return;
        const part = fieldOutputPart(field, inst);
        if (part == null) return;
        const text = Array.isArray(part) ? part.join(" ") : part;
        if (!line) {
          line = text;
        } else {
          const sep = unescapeNl(field.sep != null ? field.sep : (sec.sep != null ? sec.sep : " - "));
          line += sep + text;
        }
      });
      if (line) {
        lines.push(line);
        if (!summaryLine) summaryLine = line;
      }
    } else {
      // Cada campo aporta su(s) línea(s)
      sec.fields.forEach(field => {
        if (fx[field.id] && fx[field.id].hidden) return;
        const part = fieldOutputPart(field, inst);
        if (part == null) return;
        const arr = Array.isArray(part) ? part : [part];
        if (field.joinPrev) {
          // Continúa en la línea anterior; si no hay línea previa
          // (p. ej. timestamp vacío) no se imprime suelto.
          if (!lines.length) return;
          const sep = unescapeNl(field.sep != null ? field.sep : " ");
          lines[lines.length - 1] += sep + arr[0];
          arr.slice(1).forEach(l => lines.push(l));
        } else {
          arr.forEach(l => lines.push(l));
        }
      });
      if (lines.length && sec.heading) lines.unshift(unescapeNl(sec.heading));
    }
    if (lines.length) blocks.push({ lines, noGap: !!sec.noGap });
  });

  const out = [];
  blocks.forEach((b, i) => {
    out.push(...b.lines);
    if (i < blocks.length - 1 && !b.noGap) out.push("");
  });

  // Chunks para los botones de copia:
  //   summary     = la línea de la PRIMERA sección (la unida por guiones)
  //   description = todas las demás secciones
  const isSummaryFirst = blocks.length > 0 && !!summaryLine
                      && blocks[0].lines.length === 1
                      && blocks[0].lines[0] === summaryLine;
  const rest = [];
  blocks.forEach((b, i) => {
    if (isSummaryFirst && i === 0) return;
    rest.push(...b.lines);
    if (i < blocks.length - 1 && !b.noGap) rest.push("");
  });
  while (rest.length && rest[rest.length - 1] === "") rest.pop();
  return {
    full: out.join("\n"),
    summary: isSummaryFirst ? summaryLine : "",
    description: rest.join("\n")
  };
}

function renderOutput() {
  const inst = getActiveInstance();
  if (!inst || !getForm(state.topTab)) return;
  const chunks = buildOutput(inst);

  // Si el tester editó el textarea a mano se respeta su versión;
  // "Regenerar" vuelve a la versión automática.
  const ta = $("outputTextarea");
  if (!inst.output || !inst.outputEdited) {
    inst.output = chunks.full;
    inst.outputEdited = false;
  }
  ta.value = inst.output;

  const actions = $("outputActions");
  actions.innerHTML = "";
  addBtn(actions, "Copiar todo", () => copyToClipboard(inst.output), "primary");
  if (chunks.summary) {
    addBtn(actions, "Copiar summary", () => copyToClipboard(chunks.summary));
  }
  if (chunks.description) {
    addBtn(actions, "Copiar description", () => copyToClipboard(chunks.description));
  }
  addBtn(actions, "Regenerar", () => {
    inst.outputEdited = false;
    inst.output = "";
    renderOutput();
    scheduleSave();
  });
  addBtn(actions, "Limpiar campos", () => {
    showConfirmModal({
      title: "Limpiar instancia",
      body: `¿Vaciar todos los campos de "${escapeHtml(inst.title)}"? Esto no se puede deshacer.`,
      confirmText: "Limpiar",
      confirmClass: "danger",
      onConfirm: () => {
        const blank = makeInstance(inst.formId);
        inst.values = blank.values;
        inst.ticketKey = "";
        inst.output = "";
        inst.outputEdited = false;
        markInstanceDirty(inst);
        scheduleSave();
        renderForm();
        renderMediaPanel();
      }
    });
  }, "danger");
}

function addBtn(container, label, fn, cls) {
  const b = document.createElement("button");
  b.textContent = label;
  if (cls) b.classList.add(cls);
  b.addEventListener("click", fn);
  container.appendChild(b);
}

/* ================================================================
   [12] PANEL DE MEDIA
   ================================================================
   Los nombres se generan SOLOS a partir de la regla `media_fmt`
   (editable en DATA/RULES — cada cliente puede tener su formato):

     {type}     → el tipo de media de la fila (lista mediaTypes)
     {key}      → la Key del ticket (el textbox de arriba)
     {platform} → plataforma(cliente) combinados, sin duplicar parens
     {loQueSea} → el valor de cualquier campo del formulario por id
                  (ej. {cl}, {map}, {bugType})

   Los tipos de fila salen de la lista `mediaTypes` en DATA.

   La lista y la regla se pueden configurar POR SECCIÓN (bug, regression...)
   con el lápiz del panel de media: `form.media = { source, fmt }`. Si la
   sección no tiene override, usa la lista "mediaTypes" y la regla global
   `config.data.rules.media_fmt`. Así la media de regresión puede llevar,
   por ejemplo, un prefijo "Open_" distinto al del bug. */

// Formulario cuya media se está mostrando (la pestaña activa).
function currentMediaForm() { return getForm(state.topTab); }

// Lista de DATA que alimenta el dropdown de tipo de media de la sección.
function mediaSource(form) {
  form = form || currentMediaForm();
  return (form && form.media && form.media.source) || "mediaTypes";
}

function mediaTypes(form) {
  return config.data.lists[mediaSource(form)] || ["Vid", "Pic", "ConsoleLog", "DxDiag"];
}

// Tipo con el que nace una fila de media nueva (el primero de la lista).
function defaultMediaType() {
  const t = mediaTypes();
  return t.length ? t[0] : "Pic";
}

function mediaFormat(form) {
  form = form || currentMediaForm();
  return (form && form.media && form.media.fmt) || config.data.rules.media_fmt
    || "{type}_{key}_{platform}_{cl}_(1)";
}

function getPlatformForMedia(inst) {
  const plat = String(inst.values.platform || "").trim();
  const client = String(inst.values.client || "").trim();
  if (!plat) return "";
  if (plat.includes("(") || !client) return plat;
  return `${plat}(${client})`;
}

// Devuelve { name, missing: [placeholders sin valor] }
function buildMediaName(mediaType, inst) {
  const missing = [];
  const name = mediaFormat().replace(/\{([A-Za-z0-9_]+)\}/g, (m, ph) => {
    let v = "";
    if (ph === "type") v = mediaType;
    else if (ph === "key") v = String(inst.ticketKey || "").trim();
    else if (ph === "platform") v = getPlatformForMedia(inst);
    else v = String(inst.values[ph] == null ? "" : inst.values[ph]).trim();
    if (!v) missing.push(ph);
    return v;
  });
  return { name, missing };
}

function renderMediaPanel() {
  const inst = getActiveInstance();
  if (!inst) return;
  const mform = currentMediaForm();
  if (inst.ticketKey === undefined) inst.ticketKey = "";
  if (!Array.isArray(inst.media)) inst.media = [defaultMediaType()];
  $("mediaFmtHint").textContent = "Formato (regla media_fmt): " + mediaFormat(mform);
  const cfgBtn = $("mediaConfigBtn");
  if (cfgBtn) cfgBtn.onclick = () => showMediaConfigEditor();
  const keyInput = $("mediaTicketKey");
  if (document.activeElement !== keyInput) keyInput.value = inst.ticketKey;

  // Una fila por cada media que el tester quiera. Cada fila tiene un
  // selector de tipo (text+dropdown vía datalist) y el nombre generado
  // al lado (solo lectura + copiar). Se pueden agregar y borrar.
  const rows = $("mediaRows");
  rows.innerHTML = inst.media.map((type, i) => {
    const { name, missing } = buildMediaName(type, inst);
    const ok = !missing.length;
    return `<div class="media-row" data-media-i="${i}">
      <div class="field autocomplete media-type-ac">
        <div class="autocomplete-input-wrap">
          <input type="text" class="media-type-input" data-media-type="${i}"
            value="${escapeHtml(type)}" placeholder="tipo (pic, vid...)" />
          <span class="autocomplete-arrow" data-ac-toggle title="Ver todas las opciones">▼</span>
        </div>
        <div class="autocomplete-list"></div>
      </div>
      <input type="text" readonly data-media-name="${i}" value="${ok ? escapeHtml(name) : ""}"
        placeholder="${ok ? "" : "falta: " + escapeHtml(missing.join(", "))}" />
      <span class="media-row-actions">
        <button data-media-copy="${i}"${ok ? "" : " disabled"}
          title="${ok ? "Copiar " + escapeHtml(name) : "Faltan datos: " + escapeHtml(missing.join(", "))}">Copiar</button>
        <button class="row-del" data-media-del="${i}" title="Quitar esta media">✕</button>
      </span>
    </div>`;
  }).join("")
    + `<button id="addMediaBtn" class="add-media-btn" title="Agrega otra media">+ Agregar media</button>`;

  // Actualiza solo el nombre generado de una fila (sin re-render: así el
  // selector de tipo no pierde el foco mientras el tester escribe).
  const refreshRowName = (i) => {
    const { name, missing } = buildMediaName(inst.media[i], inst);
    const ok = !missing.length;
    const nameInp = rows.querySelector(`[data-media-name="${i}"]`);
    const copyBtn = rows.querySelector(`[data-media-copy="${i}"]`);
    if (nameInp) {
      nameInp.value = ok ? name : "";
      nameInp.placeholder = ok ? "" : "falta: " + missing.join(", ");
    }
    if (copyBtn) {
      copyBtn.disabled = !ok;
      copyBtn.title = ok ? "Copiar " + name : "Faltan datos: " + missing.join(", ");
    }
  };

  // El tipo de media usa el MISMO widget autocomplete que los campos del
  // formulario, respaldado por la lista de media de la sección (agregar/borrar
  // opciones in situ). Campo sintético: fuente = lista configurada.
  const mediaTypeField = { id: "mediaType", label: "Tipo de media", source: mediaSource(mform) };
  rows.querySelectorAll("[data-media-type]").forEach(inp => {
    const i = +inp.dataset.mediaType;
    // Sincroniza a inst.media[i] tanto al escribir como al elegir del dropdown
    // (la selección despacha un evento "input").
    inp.addEventListener("input", () => {
      inst.media[i] = inp.value;
      markInstanceDirty(inst);
      refreshRowName(i);
    });
    inp.addEventListener("blur", () => { saveAll(); setSaveIndicator("saved"); });
    wireAutocomplete(inp, inst, null, mediaTypeField);
  });
  rows.querySelectorAll("[data-media-copy]").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = +btn.dataset.mediaCopy;
      const { name, missing } = buildMediaName(inst.media[i], inst);
      if (missing.length) { flashBanner("Faltan datos: " + missing.join(", "), true); return; }
      copyToClipboard(name);
    });
  });
  rows.querySelectorAll("[data-media-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      inst.media.splice(+btn.dataset.mediaDel, 1);
      markInstanceDirty(inst);
      renderMediaPanel();
      saveAll();
    });
  });
  $("addMediaBtn").addEventListener("click", () => {
    inst.media.push(defaultMediaType());
    markInstanceDirty(inst);
    renderMediaPanel();
    saveAll();
  });
}

let _mediaPanelWired = false;
function wireMediaPanel() {
  if (_mediaPanelWired) return;
  _mediaPanelWired = true;
  const keyInput = $("mediaTicketKey");
  keyInput.addEventListener("input", () => {
    const inst = getActiveInstance();
    if (!inst) return;
    inst.ticketKey = keyInput.value;
    markInstanceDirty(inst);
    // Solo refrescar las filas generadas, sin pisar el input activo
    renderMediaPanel();
  });
  keyInput.addEventListener("blur", () => {
    saveAll();
    setSaveIndicator("saved");
  });
}

// Editor (modo edición) de la media de la sección activa: qué lista de DATA
// alimenta su dropdown y qué regla genera el nombre. Se guarda en
// `form.media`, de modo que bug y regression pueden tener reglas distintas
// (p. ej. regression con prefijo "Open_").
function showMediaConfigEditor() {
  const form = currentMediaForm();
  if (!form) return;
  const curSource = mediaSource(form);
  const curFmt = mediaFormat(form);
  const listOpts = Object.keys(config.data.lists).map(k =>
    `<option value="${escapeHtml(k)}"${k === curSource ? " selected" : ""}>${escapeHtml(k)}</option>`).join("");
  const overridden = !!(form.media && (form.media.source || form.media.fmt));
  const body = `
    <div class="fe-grid">
      <div class="fe-full">
        <label>Lista de tipos de media (en DATA)</label>
        <select id="mc_source">${listOpts}</select>
        <div class="field-help">Alimenta el dropdown de tipo (Vid, Pic, ConsoleLog...).</div>
      </div>
      <div class="fe-full">
        <label>Regla del nombre (media_fmt)</label>
        <input type="text" id="mc_fmt" value="${escapeHtml(curFmt)}" />
        <div class="field-help">Placeholders: {type}, {key}, {platform}, {cl} y cualquier {idDeCampo}. Ej. regresión: «Open_{type}_{key}_{platform}_{cl}_(1)».</div>
      </div>
      <div class="fe-full">
        <label class="checkbox"><input type="checkbox" id="mc_reset"${overridden ? "" : " disabled"} /> Volver a la configuración global (usar «mediaTypes» y la regla de DATA/RULES)</label>
        <div class="field-help">${overridden
          ? "Esta sección tiene una configuración propia."
          : "Esta sección usa la configuración global. Al guardar con otra lista o regla, se vuelve propia de «" + escapeHtml(form.label) + "»."}</div>
      </div>
    </div>`;
  showEditorModal({
    title: `Media — ${form.label}`,
    wide: false,
    bodyHtml: body,
    onConfirm: () => {
      if ($("mc_reset") && $("mc_reset").checked) {
        delete form.media;
      } else {
        const src = $("mc_source").value || "mediaTypes";
        const fmt = $("mc_fmt").value.trim();
        if (!fmt) { flashBanner("La regla del nombre no puede quedar vacía.", true); return false; }
        // Guarda la config COMPLETA (lista + regla), no solo el diff contra el
        // global: así el export es autodescriptivo y no depende de que quien
        // importe tenga el mismo global (puede tener una versión desfasada).
        // Para "seguir el global" está el checkbox de reset (borra form.media).
        form.media = { source: src, fmt: fmt };
      }
      renderMediaPanel();
      scheduleSave();
      flashBanner("Configuración de media actualizada. Recuerda exportar la herramienta para compartirla.");
      return true;
    }
  });
}

/* ================================================================
   [13] PESTAÑA DATA
   ================================================================
   Edita config.data (listas, mapas, POIs, reglas). Los
   cambios quedan en el DOM/localStorage al momento; para
   compartirlos: exportar bug_data.csv o exportar la herramienta. */
function dataCategories() {
  const cats = [];
  // Raíces (planas) primero, luego las dependientes (mostrando su padre).
  Object.keys(config.data.lists).forEach(k =>
    cats.push({ id: "list:" + k, label: listLabel(k), kind: "list", key: k }));
  Object.keys(config.data.childLists || {}).forEach(k =>
    cats.push({ id: "list:" + k, kind: "list", key: k,
      label: listLabel(k) + " · hija de " + listLabel(config.data.childLists[k].parent) }));
  cats.push({ id: "rules", label: "Reglas", kind: "rules" });
  return cats;
}

function renderDataTab() {
  const cats = dataCategories();
  if (!cats.find(c => c.id === state.dataTab.selectedCategory)) {
    state.dataTab.selectedCategory = cats[0].id;
  }
  renderDataSidebar();
  renderDataTable();
}

function renderDataSidebar() {
  const sb = $("dataSidebar");
  sb.innerHTML = "";
  dataCategories().forEach(c => {
    const el = document.createElement("div");
    el.className = "item" + (state.dataTab.selectedCategory === c.id ? " active" : "");
    el.style.display = "flex";
    el.innerHTML = `<span style="flex:1">${escapeHtml(c.label)}</span>` +
      (c.kind === "list" ? `<button class="row-del" data-dellist="${escapeHtml(c.key)}" title="Borrar esta lista (y sus dependientes)">✕</button>` : "");
    el.addEventListener("click", (e) => {
      if (e.target.closest("[data-dellist]")) return;
      state.dataTab.selectedCategory = c.id;
      renderDataTab();
      scheduleSave();
    });
    sb.appendChild(el);
  });
  sb.querySelectorAll("[data-dellist]").forEach(btn => {
    btn.addEventListener("click", () => cascadeDeleteList(btn.dataset.dellist));
  });
}

// Borra una lista y TODAS sus dependientes (el subárbol). Avisa qué fuentes de
// campo quedarán vacías y qué listas dependientes se van con ella.
function cascadeDeleteList(id) {
  const descendants = descendantLists(id);
  const all = [id].concat(descendants);
  const users = [];
  getForms().forEach(form => allFields(form).forEach(({ field }) => {
    const s = parseSource(field.source);
    const used = s.kind === "child" ? s.link : s.list;
    if (all.includes(used)) users.push(form.label + " → " + field.label);
  }));
  const descTxt = descendants.length
    ? `<br /><br />Se borran también sus dependientes: ${descendants.map(x => escapeHtml(listLabel(x))).join(", ")}.` : "";
  const usersTxt = users.length
    ? `<br /><br /><strong>Ojo:</strong> estas fuentes de campo quedarán vacías:<br />${users.map(escapeHtml).join("<br />")}` : "";
  showConfirmModal({
    title: "Borrar lista",
    body: `¿Borrar definitivamente «${escapeHtml(listLabel(id))}» con todos sus valores?${descTxt}${usersTxt}`,
    confirmText: "Borrar",
    confirmClass: "danger",
    onConfirm: () => {
      all.forEach(x => {
        delete config.data.lists[x];
        if (config.data.childLists) delete config.data.childLists[x];
        if (config.data.listMeta) delete config.data.listMeta[x];
      });
      state.dataTab.selectedCategory = "";
      renderDataTab();
      scheduleSave();
    }
  });
}

// Al renombrar un valor de una lista que es padre, arrastra los buckets de
// TODAS sus dependientes (values[viejo] -> values[nuevo]).
function renameParentValue(listId, oldName, newName) {
  if (oldName === newName) return;
  childrenOf(listId).forEach(childId => {
    const vals = config.data.childLists[childId].values;
    if (vals[oldName] !== undefined) {
      vals[newName] = (vals[newName] || []).concat(vals[oldName]);
      delete vals[oldName];
    }
  });
}

function renderDataTable() {
  const wrap = $("dataTableWrap");
  const sel = dataCategories().find(c => c.id === state.dataTab.selectedCategory);
  if (!sel) { wrap.innerHTML = ""; return; }

  let cols, rowsHtml;
  const delBtn = (attr, val) =>
    `<button class="row-del" ${attr}="${escapeHtml(val)}" title="Borrar fila">✕</button>`;

  if (sel.kind === "rules") {
    cols = ["#", "Regla", "Valor", ""];
    rowsHtml = Object.entries(config.data.rules).map(([k, v], i) => `<tr>
      <td>${i + 1}</td>
      <td>${escapeHtml(k)}</td>
      <td><input type="text" data-rule-key="${escapeHtml(k)}" value="${escapeHtml(v)}" /></td>
      <td>${delBtn("data-rule-del", k)}</td>
    </tr>`).join("");
  } else if (isChildList(sel.key)) {
    // Lista dependiente: valores agrupados por el valor del padre.
    const c = config.data.childLists[sel.key];
    const parentVals = listValues(c.parent);
    cols = ["#", listLabel(c.parent), listLabel(sel.key), ""];
    let i = 0;
    rowsHtml = Object.entries(c.values).map(([par, kids]) => {
      const isOrphan = !parentVals.includes(par);
      return (kids || []).map((p, j) => {
        i++;
        return `<tr>
          <td>${i}</td>
          <td class="${isOrphan ? "orphan" : ""}">${escapeHtml(par)}${isOrphan ? " (huérfano)" : ""}</td>
          <td><input type="text" data-childc-edit="${escapeHtml(par)}|${j}" value="${escapeHtml(p)}" /></td>
          <td>${delBtn("data-childc-del", par + "|" + j)}</td>
        </tr>`;
      }).join("");
    }).join("");
  } else {
    // Lista raíz (plana).
    cols = ["#", "Valor", ""];
    const arr = config.data.lists[sel.key] || [];
    rowsHtml = arr.map((v, i) => `<tr>
      <td>${i + 1}</td>
      <td><input type="text" data-list-idx="${i}" value="${escapeHtml(v)}" /></td>
      <td>${delBtn("data-list-del", String(i))}</td>
    </tr>`).join("");
  }

  wrap.innerHTML = `<table class="data-table">
    <thead><tr>${cols.map(c => `<th>${c}</th>`).join("")}</tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table>`;

  // ---- Ediciones ----
  // Valor de lista raíz: commit al salir (change). Si la lista es padre de
  // dependientes, renombrar arrastra los buckets de sus hijas.
  wrap.querySelectorAll("[data-list-idx]").forEach(inp => {
    inp.addEventListener("change", () => {
      const i = +inp.dataset.listIdx;
      const oldName = config.data.lists[sel.key][i];
      const newName = inp.value;
      if (newName === oldName) return;
      const isParent = childrenOf(sel.key).length > 0;
      if (isParent && newName.trim()) renameParentValue(sel.key, oldName, newName);
      config.data.lists[sel.key][i] = newName;
      scheduleSave();
      if (isParent) renderDataTable(); // refresca closures tras el arrastre
    });
  });
  // Valor de lista dependiente.
  wrap.querySelectorAll("[data-childc-edit]").forEach(inp => {
    inp.addEventListener("input", () => {
      const [par, j] = inp.dataset.childcEdit.split("|");
      config.data.childLists[sel.key].values[par][+j] = inp.value;
      scheduleSave();
    });
  });
  wrap.querySelectorAll("[data-rule-key]").forEach(inp => {
    inp.addEventListener("input", () => {
      config.data.rules[inp.dataset.ruleKey] = inp.value;
      scheduleSave();
    });
  });

  // ---- Borrado de filas (con confirmación) ----
  const confirmRowDelete = (desc, doIt) => showConfirmModal({
    title: "Borrar fila",
    body: `¿Borrar definitivamente ${desc}?`,
    confirmText: "Borrar",
    confirmClass: "danger",
    onConfirm: () => { doIt(); renderDataTable(); scheduleSave(); }
  });
  wrap.querySelectorAll("[data-list-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = +btn.dataset.listDel;
      const warn = childrenOf(sel.key).length ? " (sus dependientes quedarán huérfanos)" : "";
      confirmRowDelete(`«${escapeHtml(config.data.lists[sel.key][i])}»${warn}`,
        () => config.data.lists[sel.key].splice(i, 1));
    });
  });
  wrap.querySelectorAll("[data-childc-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      const [par, j] = btn.dataset.childcDel.split("|");
      confirmRowDelete(`«${escapeHtml(config.data.childLists[sel.key].values[par][+j])}» de ${escapeHtml(par)}`,
        () => config.data.childLists[sel.key].values[par].splice(+j, 1));
    });
  });
  wrap.querySelectorAll("[data-rule-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      const k = btn.dataset.ruleDel;
      confirmRowDelete(`la regla «${escapeHtml(k)}» (revisa que ningún campo use @${escapeHtml(k)})`,
        () => delete config.data.rules[k]);
    });
  });
}

function addDataRow() {
  const sel = dataCategories().find(c => c.id === state.dataTab.selectedCategory);
  if (!sel) return;
  if (sel.kind === "rules") {
    showPromptModal({
      title: "Nueva regla",
      body: "Nombre de la regla (sin espacios). Los campos pueden usarla escribiendo @nombre.",
      placeholder: "mi_regla",
      confirmText: "Agregar",
      onConfirm: (k) => {
        k = (k || "").trim();
        if (!k) return;
        if (config.data.rules[k] != null) { flashBanner("Esa regla ya existe.", true); return; }
        config.data.rules[k] = "";
        renderDataTable();
        scheduleSave();
      }
    });
    return;
  }
  if (isChildList(sel.key)) {
    const c = config.data.childLists[sel.key];
    const parentVals = listValues(c.parent);
    showPromptModal({
      title: "Nuevo " + listLabel(sel.key),
      body: `¿A qué ${listLabel(c.parent).toLowerCase()} pertenece? Opciones: ` + parentVals.join(", "),
      placeholder: listLabel(c.parent),
      confirmText: "Agregar",
      onConfirm: (m) => {
        m = (m || "").trim();
        if (!parentVals.includes(m)) { flashBanner(`Ese ${listLabel(c.parent).toLowerCase()} no existe.`, true); return; }
        c.values[m] = c.values[m] || [];
        c.values[m].push("Nuevo" + listLabel(sel.key).replace(/\s+/g, ""));
        renderDataTable();
        scheduleSave();
      }
    });
    return;
  }
  // Lista raíz (plana)
  config.data.lists[sel.key] = config.data.lists[sel.key] || [];
  config.data.lists[sel.key].push("nuevo_valor");
  renderDataTable();
  scheduleSave();
}

function addNewList() {
  showPromptModal({
    title: "Nueva lista",
    body: "Nombre de la lista (será la fuente que eligen los campos dropdown).",
    placeholder: "p. ej. weapons",
    confirmText: "Crear",
    onConfirm: (name) => {
      const key = slugify(name);
      if (!key) return;
      if (config.data.lists[key]) { flashBanner("Esa lista ya existe.", true); return; }
      config.data.lists[key] = [];
      state.dataTab.selectedCategory = "list:" + key;
      renderDataTab();
      scheduleSave();
    }
  });
}

// Crea una lista dependiente NUEVA bajo la lista seleccionada (su padre).
// Cualquier lista (raíz o dependiente) puede recibir hijas → árbol a cualquier
// profundidad. Los valores se agregan después, por cada valor del padre.
function addChildList() {
  const sel = dataCategories().find(c => c.id === state.dataTab.selectedCategory);
  const parentId = sel && sel.kind === "list" ? sel.key : null;
  if (!parentId) { flashBanner("Elige primero una lista (a la izquierda) para agregarle una dependiente.", true); return; }
  showPromptModal({
    title: "Nueva lista dependiente",
    body: `Nombre de la lista que dependerá de «${escapeHtml(listLabel(parentId))}» (como «POI» depende de «Mapa»).`,
    placeholder: "p. ej. Accesorio",
    confirmText: "Crear",
    onConfirm: (label) => {
      label = (label || "").trim();
      if (!label) return;
      const id = uniqueListId(label, config.data);
      config.data.childLists[id] = { parent: parentId, values: {} };
      config.data.listMeta[id] = { label };
      state.dataTab.selectedCategory = "list:" + id;
      renderDataTab();
      scheduleSave();
      flashBanner(`«${label}» creada como dependiente de «${listLabel(parentId)}». Agrega valores por cada ${listLabel(parentId).toLowerCase()} y úsala como fuente (child) de un campo.`);
    }
  });
}

/* ================================================================
   [14] PESTAÑA RULES
   ================================================================
   Vista técnica y legible de TODAS las validaciones: por campo
   (obligatorio, REGEX, mensaje, default) y las reglas globales de
   DATA. Todo editable en vivo. */
// Operadores y acciones de las condiciones entre campos
const COND_OPS = [
  ["empty",          "está vacío"],
  ["notEmpty",       "no está vacío"],
  ["equals",         "es igual a"],
  ["notEquals",      "no es igual a"],
  ["matches",        "cumple REGEX"],
  // Comparan contra el VALOR de otro campo (el valor es el id del campo).
  // Solo aplican cuando ambos campos tienen algo escrito.
  ["equalsField",    "es igual al campo (id)"],
  ["notEqualsField", "es distinto del campo (id)"]
];
const COND_ACTIONS = [
  ["show",       "mostrar el campo"],
  ["hide",       "ocultar el campo"],
  ["disable",    "bloquear el campo"],
  ["setDefault", "poner default si está vacío"],
  ["error",      "marcar error (mensaje)"]
];

function renderRulesTab() {
  const c = $("rulesContainer");
  let fieldRows = "";
  getForms().forEach(form => {
    form.sections.forEach(sec => {
      sec.fields.forEach(f => {
        if (f.type === "mirror") return;
        const key = form.id + "|" + f.id;
        const ecid = TILE_COLOR_MAP[f.errColor] ? f.errColor : "red";
        const ecol = tileColor(ecid);
        fieldRows += `<tr>
          <td class="rules-form-cell">${escapeHtml(form.label)} · ${escapeHtml(sec.label)}</td>
          <td>${escapeHtml(f.label)}</td>
          <td style="text-align:center"><input type="checkbox" data-rr-req="${escapeHtml(key)}"${f.required ? " checked" : ""} /></td>
          <td><input type="text" data-rr-rx="${escapeHtml(key)}" value="${escapeHtml(f.regex || "")}" placeholder="regex o @regla" /></td>
          <td><input type="text" data-rr-msg="${escapeHtml(key)}" value="${escapeHtml(f.regexMsg || "")}" /></td>
          <td><input type="text" data-rr-def="${escapeHtml(key)}" value="${escapeHtml(f.default || "")}" /></td>
          <td><select data-rr-color="${escapeHtml(key)}" class="tile-color-sel" style="background:${ecol.bg};color:${ecol.fg}">${tileColorOptions(ecid)}</select></td>
        </tr>`;
      });
    });
  });

  const globalRows = Object.entries(config.data.rules).map(([k, v]) => `<tr>
    <td>@${escapeHtml(k)}</td>
    <td><input type="text" data-rr-global="${escapeHtml(k)}" value="${escapeHtml(v)}" /></td>
  </tr>`).join("");

  // ---- Condiciones entre campos ----
  const condsHtml = getForms().map(form => {
    const fieldOpts = (sel) => allFields(form)
      .filter(x => x.field.type !== "mirror")
      .map(x => `<option value="${escapeHtml(x.field.id)}"${sel === x.field.id ? " selected" : ""}>${escapeHtml(x.field.label)}</option>`)
      .join("");
