<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Report Tool</title>
  <style>
    /* ---------- Base ---------- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "SF Pro Text", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #1d2129;
      background: #f5f6f7;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    button {
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #c7ccd1;
      background: #fff;
      padding: 4px 10px;
      border-radius: 3px;
      color: #1d2129;
    }
    button:hover { background: #f0f2f5; }
    button:active { background: #e4e6eb; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    button.primary {
      background: #2563eb;
      color: #fff;
      border-color: #1d4ed8;
    }
    button.primary:hover { background: #1d4ed8; }
    button.danger {
      background: #fff;
      color: #b91c1c;
      border-color: #fca5a5;
    }
    button.danger:hover { background: #fee2e2; }
    input[type="text"], input[type="number"], textarea, select {
      font-family: inherit;
      font-size: 12px;
      padding: 4px 6px;
      border: 1px solid #c7ccd1;
      border-radius: 3px;
      background: #fff;
      color: #1d2129;
      width: 100%;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    textarea {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      resize: vertical;
      min-height: 60px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    label .req { color: #dc2626; font-size: 10px; font-weight: 700; }
    /* Cabecera del campo: el label y las herramientas de edición van
       como HERMANOS, no anidados. Si los botones ▲▼✎✕ estuvieran dentro
       del <label>, un clic en el label los activaría (el label reenvía
       el clic a su primer control), reordenando el campo sin querer. */
    .field-head { display: flex; align-items: center; }
    .field-head > label { flex: 1; }
    .field { margin-bottom: 8px; position: relative; }
    .field.invalid input,
    .field.invalid textarea,
    .field.invalid select {
      border-color: #dc2626;
      box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.18);
    }
    /* El error va debajo del campo (no a la derecha) para que nunca
       quede tapado por el output ni recortado por el scroll del panel. */
    .field-error {
      display: none;
      color: #dc2626;
      font-size: 10px;
      font-weight: 600;
      margin-top: 2px;
      line-height: 1.3;
    }
    .field.invalid .field-error { display: block; }
    .field-help {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 2px;
      line-height: 1.3;
    }

    /* ---------- Barra superior (pestañas de formularios + Data + Rules) ---------- */
    .top-tabs {
      display: flex;
      background: #1f2937;
      padding: 0 8px;
      height: 34px;
      align-items: stretch;
      user-select: none;
      flex: 0 0 auto;
    }
    .top-tab {
      padding: 0 16px;
      display: flex;
      align-items: center;
      color: #d1d5db;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-weight: 500;
      white-space: nowrap;
    }
    .top-tab:hover { color: #fff; }
    .top-tab.active {
      color: #fff;
      background: #111827;
      border-bottom-color: #2563eb;
    }
    .top-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #9ca3af;
      font-size: 11px;
    }
    .top-right button { font-size: 11px; padding: 3px 8px; }
    .save-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      white-space: nowrap;
    }
    .save-indicator .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .save-indicator.saved { background: #064e3b; color: #a7f3d0; }
    .save-indicator.saved .dot { background: #10b981; }
    .save-indicator.saving { background: #78350f; color: #fde68a; }
    .save-indicator.saving .dot { background: #f59e0b; }
    .save-indicator.unsaved { background: #7f1d1d; color: #fecaca; }
    .save-indicator.unsaved .dot { background: #ef4444; }
    /* Aviso de que la configuración local difiere del HTML distribuido */
    .config-chip {
      background: #7c2d12;
      color: #fed7aa;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      white-space: nowrap;
      display: none;
    }
    .config-chip.visible { display: inline-block; }

    /* ---------- Menús desplegables de la barra superior ---------- */
    .menu-wrap { position: relative; }
    .menu-pop {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      background: #fff;
      border: 1px solid #c7ccd1;
      border-radius: 4px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
      z-index: 300;
      min-width: 230px;
      display: none;
      padding: 4px;
    }
    .menu-wrap.open .menu-pop { display: block; }
    .menu-pop button {
      display: block;
      width: 100%;
      text-align: left;
      border: none;
      background: none;
      padding: 6px 10px;
      border-radius: 3px;
      font-size: 12px;
    }
    .menu-pop button:hover { background: #f0f2f5; }
    .menu-pop button.danger:hover { background: #fee2e2; }
    .menu-pop .sep { border-top: 1px solid #e5e7eb; margin: 4px 0; }

    /* ---------- Tiles de estado (validación + personalizados) ---------- */
    /* La barra es el contenedor posicionado. .tiles-wrap apila DOS bandas: la
       1ª = tiles automáticos (errores de campo, en el orden del form); la 2ª =
       tiles personalizados (orden de la lista en Rules). Cada banda envuelve
       hasta 3 renglones y luego hace scroll. La "llave" (▾) colapsa cada banda
       a un renglón; es un patrón reutilizable (luego, en las secciones). */
    .tiles-bar {
      position: relative;
      padding: 4px 26px 4px 8px;   /* margen derecho para la llave */
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      flex: 0 0 auto;
    }
    .tiles-bar.hidden { display: none; }
    .tiles-wrap { display: flex; flex-direction: column; gap: 3px; }
    .tiles-band {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 4px;
      max-height: 74px;            /* ~3 renglones de tiles */
      overflow-y: auto;
      overflow-x: hidden;
    }
    /* La 2ª banda (personalizados) se separa con una línea sutil. */
    .tiles-band.band-custom { border-top: 1px dashed #e5e7eb; padding-top: 4px; }
    /* Colapsada: cada banda a un renglón con scroll horizontal. */
    .tiles-bar.collapsed .tiles-band {
      flex-wrap: nowrap;
      max-height: 24px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    /* La llave: toggle de colapso; el chevron rota al colapsar. */
    .tiles-toggle {
      position: absolute;
      top: 3px;
      right: 4px;
      width: 18px;
      height: 18px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #fff;
      color: #6b7280;
      font-size: 10px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .tiles-toggle:hover { background: #f3f4f6; color: #374151; }
    .tiles-toggle .chev { transition: transform .15s; display: inline-block; }
    .tiles-bar.collapsed .tiles-toggle .chev { transform: rotate(-90deg); }

    .tile {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .tile.ok {
      background: #ecfdf5; color: #065f46; border-color: #a7f3d0;
      cursor: default;
    }
    .tile.no-target { cursor: default; }
    .tile.sev-error { font-weight: 600; }
    .tile[data-target]:hover { filter: brightness(0.96); }
    /* Resaltado cruzado: al pasar/enfocar un campo, sus tiles se marcan
       (.tile-hot) y las demás se atenúan. El anillo usa el color del tile. */
    .tiles-focus .tile:not(.tile-hot) { opacity: .28; }
    .tile-hot { box-shadow: 0 0 0 2px currentColor; opacity: 1 !important; }

    /* ---------- Sub-pestañas (instancias) ---------- */
    .sub-tabs {
      display: flex;
      background: #e5e7eb;
      border-bottom: 1px solid #c7ccd1;
      padding: 0 4px;
      align-items: stretch;
      min-height: 28px;
      user-select: none;
      flex: 0 0 auto;
    }
    .sub-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px 4px 12px;
      background: #f3f4f6;
      border: 1px solid #c7ccd1;
      border-bottom: none;
      border-radius: 3px 3px 0 0;
      margin-right: 2px;
      margin-top: 3px;
      cursor: pointer;
      font-size: 12px;
      color: #4b5563;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
    }
    .sub-tab.active {
      background: #fff;
      color: #1d2129;
      font-weight: 600;
    }
    .sub-tab .label { overflow: hidden; text-overflow: ellipsis; }
    .sub-tab .close {
      width: 16px; height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      font-size: 14px;
      line-height: 1;
      color: #6b7280;
    }
    .sub-tab .close:hover { background: #fee2e2; color: #b91c1c; }
    .sub-tab .dirty-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f59e0b;
      display: none;
    }
    .sub-tab.dirty .dirty-dot { display: inline-block; }
    .sub-tab-new {
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 16px;
      color: #4b5563;
      cursor: pointer;
      align-self: center;
      margin-top: 3px;
      height: 22px;
    }
    .sub-tab-new:hover { color: #1d2129; }

    /* ---------- Split principal ---------- */
    #subTabsAndMain {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .form-col {
      width: 50%;
      min-width: 380px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #d1d5db;
      min-height: 0;
      overflow: hidden;
      transition: width .18s ease;
    }
    /* Replegado: la columna se encoge a una riel; el output ocupa el ancho. */
    .form-col.form-collapsed { width: 34px; min-width: 0; flex: 0 0 34px; }
    .form-col.form-collapsed .form-panel { display: none; }
    .form-col.form-collapsed .form-toolbar { padding: 6px 4px; justify-content: center; }
    .form-col.form-collapsed .form-toolbar > *:not(#formCollapseBtn) { display: none; }
    .form-col.form-collapsed #formCollapseBtn .chev { transform: rotate(180deg); }
    .form-rail-label { display: none; }
    .form-col.form-collapsed .form-rail-label {
      display: block;
      writing-mode: vertical-rl;
      margin: 10px auto 0;
      color: #6b7280;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      user-select: none;
      white-space: nowrap;
    }
    .form-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
      flex: 0 0 auto;
    }
    .form-toolbar h3 {
      font-size: 12px;
      font-weight: 600;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-toolbar .edit-toggle { margin-left: auto; }
    .form-toolbar .edit-toggle.active {
      background: #2563eb;
      color: #fff;
      border-color: #1d4ed8;
    }
    .form-panel {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      min-height: 0;
    }
    .output-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fafbfc;
      overflow: hidden;
      min-height: 0;
    }
    /* El textarea crece a lo alto; los botones van en una columna
       pegada al borde derecho para no robarle espacio vertical. */
    .output-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .output-textarea-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px 8px 12px 16px;
      min-width: 0;
    }
    .output-textarea-wrap textarea { flex: 1; }
    .output-side {
      flex: 0 0 148px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px 12px 12px 4px;
      overflow: hidden;
      min-width: 0;
      transition: flex-basis .18s ease;
    }
    .output-side .rail-btn { align-self: flex-end; }
    .output-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }
    .output-actions button { width: 100%; }
    /* Replegado: franja delgada; se ocultan los botones, queda el chevron. */
    .output-side.actions-collapsed { flex-basis: 30px; }
    .output-side.actions-collapsed .output-actions { display: none; }
    .output-side.actions-collapsed .rail-btn { align-self: center; }
    .output-side.actions-collapsed .rail-btn .chev { transform: rotate(180deg); }

    /* ---------- Panel de nombres de media ---------- */
    .media-panel {
      border-top: 1px solid #d1d5db;
      background: #f9fafb;
      padding: 8px 16px 10px 16px;
      flex: 0 0 auto;
    }
    .media-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    /* Cuerpo colapsable de la media (Key + filas): grid 1fr→0fr (~180ms). */
    .media-panel-body {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows .18s ease;
    }
    .media-panel-body-inner { overflow: hidden; min-height: 0; }
    .media-panel.collapsed .media-panel-body { grid-template-rows: 0fr; }
    .media-panel.collapsed .media-panel-header { margin-bottom: 0; }
    .media-panel.collapsed #mediaCollapseBtn .chev { transform: rotate(-90deg); }
    .media-panel-header h4 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #4b5563;
      letter-spacing: 0.4px;
    }
    .media-panel-header .hint {
      font-size: 10px;
      color: #9ca3af;
      font-style: italic;
    }
    .media-row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 4px;
    }
    .media-row:last-child { margin-bottom: 0; }
    .media-row .media-type {
      font-size: 11px;
      font-weight: 700;
      color: #1d4ed8;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .media-row input[type="text"] {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      padding: 3px 6px;
    }
    /* El selector de tipo (text+dropdown vía datalist): no monospace */
    .media-row input.media-type-input {
      font-family: inherit;
      font-weight: 600;
      color: #1d4ed8;
    }
    .media-row button { font-size: 11px; padding: 2px 8px; }
    .media-row-actions { display: flex; gap: 4px; align-items: center; }
    .media-row-actions .row-del {
      border: none;
      background: none;
      color: #9ca3af;
      font-size: 13px;
      padding: 0 6px;
    }
    .media-row-actions .row-del:hover { background: #fee2e2; color: #b91c1c; }
    /* El tipo de media reutiliza el widget autocomplete; su columna es
       angosta (120px), así que el desplegable se ensancha para leerse bien. */
    .media-row .media-type-ac { position: relative; }
    .media-row .media-type-ac .autocomplete-list { min-width: 180px; }
    .add-media-btn { margin-top: 8px; font-size: 11px; padding: 3px 10px; }
    .media-preview {
      margin-top: 6px;
      padding: 4px 6px;
      background: #fff;
      border: 1px dashed #d1d5db;
      border-radius: 3px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 10px;
      color: #4b5563;
      min-height: 14px;
      line-height: 1.4;
      word-break: break-all;
    }
    .media-preview:empty { display: none; }

    /* ---------- Secciones del formulario ---------- */
    .form-section { margin-bottom: 16px; }
    .form-section h4 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #6b7280;
      letter-spacing: 0.5px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e5e7eb;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    /* ---------- Compactación: colapsar secciones ---------- */
    /* Chevron de colapso: SIEMPRE visible (no depende del modo edición).
       Único disparador del colapso; el nombre de la sección no reacciona. */
    .sec-collapse {
      flex: 0 0 auto;
      width: 18px; height: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #fff;
      color: #6b7280;
      font-size: 10px; line-height: 1;
      cursor: pointer;
    }
    .sec-collapse:hover { background: #eef2ff; color: #1d4ed8; border-color: #c7d2fe; }
    .sec-collapse .chev { display: inline-block; transition: transform .18s ease; }
    .form-section.collapsed .sec-collapse .chev { transform: rotate(-90deg); }
    .sec-label { flex: 0 1 auto; }
    /* Cuerpo colapsable: grid 1fr→0fr para animar altura desconocida (~180ms)
       sin medir en JS. El hijo interno recorta con overflow durante el cierre. */
    .form-section-body {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows .18s ease;
    }
    .form-section-body-inner { overflow: hidden; min-height: 0; }
    .form-section.collapsed .form-section-body { grid-template-rows: 0fr; }
    .form-section.collapsed h4 { margin-bottom: 0; }

    /* Botón genérico de repliegue de panel (formulario / media / copiar). */
    .rail-btn {
      flex: 0 0 auto;
      width: 22px; height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #fff;
      color: #6b7280;
      font-size: 12px; line-height: 1;
      cursor: pointer;
    }
    .rail-btn:hover { background: #eef2ff; color: #1d4ed8; border-color: #c7d2fe; }
    .rail-btn .chev { display: inline-block; transition: transform .18s ease; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* ---------- Controles del modo edición ---------- */
    /* Ocultos por defecto; body.editing los muestra. */
    .sec-tools, .fld-tools, .add-section-btn, .mirror-field,
    .media-edit-btn, #addSectionTopBtn { display: none; }
    body.editing .media-edit-btn { display: inline-flex; margin-left: 6px; }
    body.editing #addSectionTopBtn { display: inline-block; margin-left: auto; }
    body.editing .form-toolbar .edit-toggle { margin-left: 0; }
    body.editing .sec-tools { display: inline-flex; gap: 2px; margin-left: auto; }
    body.editing .fld-tools { display: inline-flex; gap: 2px; margin-left: auto; }
    body.editing .add-section-btn { display: block; width: 100%; margin-top: 8px; }
    body.editing .mirror-field { display: block; }
    .tool-btn {
      padding: 0 5px;
      font-size: 11px;
      line-height: 16px;
      height: 18px;
      border-radius: 2px;
      color: #6b7280;
    }
    .tool-btn:hover { color: #1d2129; }
    .tool-btn.del:hover { background: #fee2e2; color: #b91c1c; }
    .mirror-note {
      font-size: 11px;
      color: #6b7280;
      font-style: italic;
      padding: 4px 6px;
      background: #f3f4f6;
      border: 1px dashed #d1d5db;
      border-radius: 3px;
    }
    /* Etiqueta junto al label cuando una condición oculta/bloquea el campo */
    .hidden-tag {
      color: #9ca3af;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 10px;
    }
    /* Tabla de condiciones entre campos (pestaña RULES) */
    .cond-table select, .cond-table input[type="text"] {
      font-size: 11px;
      padding: 3px 4px;
    }
    .cond-table td { white-space: nowrap; }
    .cond-then { color: #1d4ed8; font-weight: 700; font-size: 10px; text-transform: uppercase; }
    /* Celda de expresión booleana: ancha, monospace y con aviso de error */
    .cond-expr-cell { white-space: normal; min-width: 320px; }
    .cond-table input.cond-expr {
      width: 100%;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
    }
    .cond-table input.cond-expr.cond-bad {
      border-color: #dc2626;
      background: #fef2f2;
    }
    .cond-err {
      color: #b91c1c;
      font-size: 10px;
      margin-top: 2px;
      min-height: 12px;
      white-space: normal;
    }

    /* ---------- Autocomplete ---------- */
    .autocomplete { position: relative; }
    .autocomplete-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .autocomplete-input-wrap input { padding-right: 22px; }
    .autocomplete-arrow {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
      border-radius: 2px;
      font-size: 9px;
      line-height: 1;
    }
    .autocomplete-arrow:hover { background: #f0f2f5; color: #1d2129; }
    .autocomplete.open .autocomplete-arrow { color: #2563eb; }
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      max-height: 200px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #c7ccd1;
      border-top: none;
      border-radius: 0 0 3px 3px;
      z-index: 50;
      display: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    }
    .autocomplete.open .autocomplete-list { display: block; }
    /* Cuando no cabe hacia abajo, el dropdown se abre hacia arriba
       (campos en la parte inferior del form o del panel de media). */
    .autocomplete.drop-up .autocomplete-list {
      top: auto;
      bottom: 100%;
      border-top: 1px solid #c7ccd1;
      border-bottom: none;
      border-radius: 3px 3px 0 0;
      box-shadow: 0 -4px 8px rgba(0,0,0,0.08);
    }
    .autocomplete-empty {
      padding: 4px 8px;
      color: #9ca3af;
      font-size: 11px;
      font-style: italic;
    }
    .autocomplete-item {
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .autocomplete-item:hover,
    .autocomplete-item.active { background: #eff6ff; color: #1d4ed8; }
    .autocomplete-item mark {
      background: #fef08a;
      color: inherit;
      font-weight: 600;
    }
    /* Botón para borrar una opción de la lista (aparece al pasar el mouse) */
    .ac-del {
      visibility: hidden;
      color: #9ca3af;
      padding: 0 4px;
      border-radius: 2px;
      font-size: 12px;
      line-height: 1;
      flex: 0 0 auto;
    }
    .autocomplete-item:hover .ac-del { visibility: visible; }
    .ac-del:hover { background: #fee2e2; color: #b91c1c; }
    /* Fila "+ Agregar..." al final del dropdown */
    .autocomplete-add {
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      color: #1d4ed8;
      border-top: 1px dashed #e5e7eb;
    }
    .autocomplete-add:hover { background: #eff6ff; }

    /* ---------- Chips de palabras clave ---------- */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px;
      border: 1px solid #c7ccd1;
      border-radius: 3px;
      background: #fff;
      min-height: 30px;
      cursor: text;
    }
    .chips.invalid { border-color: #dc2626; box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.18); }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #dbeafe;
      color: #1e40af;
      padding: 2px 4px 2px 8px;
      border-radius: 12px;
      font-size: 11px;
    }
    .chip button {
      border: none;
      background: transparent;
      color: #1e40af;
      cursor: pointer;
      padding: 0 4px;
      font-size: 13px;
      line-height: 1;
    }
    .chip button:hover { color: #b91c1c; }
    .chips input {
      border: none;
      outline: none;
      flex: 1;
      min-width: 80px;
      font-size: 12px;
      padding: 2px;
      background: transparent;
      width: auto;
    }
    .chips-error {
      display: block;
      margin-top: 4px;
      background: #fee2e2;
      color: #991b1b;
      padding: 4px 8px;
      border-radius: 3px;
      border-left: 3px solid #dc2626;
      font-size: 11px;
    }

    /* ---------- Pestaña DATA ---------- */
    .data-layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .data-sidebar {
      width: 200px;
      background: #fff;
      border-right: 1px solid #d1d5db;
      overflow-y: auto;
      flex: 0 0 auto;
    }
    .data-sidebar .item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
      color: #4b5563;
      border-bottom: 1px solid #f3f4f6;
    }
    .data-sidebar .item:hover { background: #f9fafb; }
    .data-sidebar .item.active {
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
      border-left: 3px solid #2563eb;
    }
    .data-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .data-toolbar {
      padding: 8px 12px;
      background: #f3f4f6;
      border-bottom: 1px solid #d1d5db;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .data-table-wrap {
      flex: 1;
      overflow: auto;
      padding: 12px;
    }
    table.data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    table.data-table th,
    table.data-table td {
      border: 1px solid #e5e7eb;
      padding: 4px 8px;
      text-align: left;
      vertical-align: top;
    }
    table.data-table th {
      background: #f3f4f6;
      font-weight: 600;
      color: #4b5563;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.3px;
      position: sticky;
      top: -13px;
    }
    table.data-table input[type="text"] {
      border: none;
      padding: 2px;
      width: 100%;
      background: transparent;
    }
    table.data-table input[type="text"]:focus {
      background: #fff;
      outline: 1px solid #2563eb;
      box-shadow: none;
    }
    table.data-table tr:hover { background: #f9fafb; }
    .orphan { color: #dc2626; font-weight: 600; }
    .row-del {
      border: none;
      background: none;
      color: #9ca3af;
      font-size: 13px;
      padding: 0 6px;
    }
    .row-del:hover { background: #fee2e2; color: #b91c1c; }

    /* ---------- Pestaña RULES ---------- */
    .rules-layout {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      min-height: 0;
    }
    .rules-layout h3 {
      font-size: 13px;
      margin-bottom: 4px;
    }
    .rules-layout .rules-intro {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 12px;
      max-width: 760px;
      line-height: 1.5;
    }
    .rules-block { margin-bottom: 24px; }
    .rules-future {
      border: 1px dashed #c7ccd1;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 11px;
      color: #9ca3af;
      max-width: 760px;
    }
    td.rules-form-cell { color: #6b7280; white-space: nowrap; }

    /* ---------- Modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 6px;
      padding: 20px;
      min-width: 360px;
      max-width: 600px;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .modal.wide { max-width: 780px; width: 740px; }
    .modal h3 { margin-bottom: 12px; font-size: 14px; }
    .modal-body { margin-bottom: 16px; font-size: 12px; color: #4b5563; }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .modal label.checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #6b7280;
      margin-top: 8px;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }
    /* Grid del editor de campos/secciones */
    .fe-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
    }
    .fe-grid .fe-full { grid-column: 1 / -1; }
    .fe-grid label { margin-top: 4px; }
    .fe-grid label.checkbox { margin-top: 2px; }
    .fe-sep {
      grid-column: 1 / -1;
      border-top: 1px solid #e5e7eb;
      padding-top: 6px;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* ---------- Banner ---------- */
    /* Toast flotante: no ocupa espacio en el layout (position:fixed),
       aparece abajo a la derecha y se desvanece solo. */
    .banner {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 2000;
      max-width: 340px;
      padding: 10px 14px;
      background: #1f2937;
      color: #f9fafb;
      border: 1px solid #374151;
      border-left: 3px solid #10b981;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .banner.error { border-left-color: #ef4444; }
    .banner.hidden {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }
    .banner button {
      font-size: 11px;
      padding: 2px 8px;
      background: #374151;
      color: #f9fafb;
      border-color: #4b5563;
    }
    .banner button:hover { background: #4b5563; }
  </style>
</head>
<body>

  <!-- ============ BARRA SUPERIOR ============ -->
  <div class="top-tabs" id="topTabs">
    <!-- Las pestañas de formularios (Bug, Regression, ...) se generan
         desde el schema. Data y Rules son fijas. -->
    <div id="formTabs" style="display:flex;"></div>
    <div class="top-tab" data-tab="data">Data</div>
    <div class="top-tab" data-tab="rules">Rules</div>
    <div class="top-right">
      <span class="config-chip" id="configChip" title="Tu configuración local (campos/datos/reglas) es distinta a la del archivo distribuido. Usa 'Exportar herramienta' para compartirla.">Config modificada</span>
      <span class="save-indicator saved" id="saveIndicator">
        <span class="dot"></span><span id="saveIndicatorText">Guardado</span>
      </span>
      <div class="menu-wrap" id="menuDatos">
        <button>Datos CSV ▾</button>
        <div class="menu-pop">
          <button id="importDataBtn">Cargar bug_data.csv…</button>
          <button id="exportDataBtn">Exportar bug_data.csv</button>
          <div class="sep"></div>
          <button id="importFieldsBtn">Cargar bug_fields.csv…</button>
          <button id="exportFieldsBtn">Exportar bug_fields.csv</button>
        </div>
      </div>
      <div class="menu-wrap" id="menuSesion">
        <button>Sesión ▾</button>
        <div class="menu-pop">
          <button id="saveSessionBtn">Guardar sesión como archivo…</button>
          <button id="loadSessionBtn">Cargar sesión desde archivo…</button>
          <div class="sep"></div>
          <button id="resetVanillaBtn">Restaurar config del archivo (vanilla)</button>
          <button id="clearLocalBtn" class="danger">Borrar todo lo local…</button>
        </div>
      </div>
      <button id="exportToolBtn" class="primary" title="Descarga un bug_tool.html nuevo con tus campos, datos y reglas integrados, listo para el sharefolder">Exportar herramienta</button>
    </div>
  </div>

  <!-- ============ BANNER ============ -->
  <div class="banner hidden" id="banner">
    <span id="bannerText"></span>
    <button id="bannerDismiss">Cerrar</button>
  </div>

  <!-- ============ TILES DE VALIDACIÓN ============ -->
  <div class="tiles-bar" id="tilesBar"></div>

  <!-- ============ SUB-PESTAÑAS + PRINCIPAL ============ -->
  <div id="subTabsAndMain">
    <div class="sub-tabs" id="subTabs"></div>
    <div class="main" id="main">
      <div class="form-col" id="formCol">
        <div class="form-toolbar">
          <button id="formCollapseBtn" class="rail-btn" title="Replegar el formulario para dar más espacio al output"><span class="chev">«</span></button>
          <h3 id="formTitle">Formulario</h3>
          <button id="addSectionTopBtn" title="Agrega una sección nueva al final del formulario">+ Sección</button>
          <button class="edit-toggle" id="editToggle" title="Activa el modo edición para agregar, mover o borrar secciones y campos">✎ Editar formulario</button>
        </div>
        <div class="form-rail-label">Formulario</div>
        <div class="form-panel" id="formPanel"></div>
      </div>
      <div class="output-panel">
        <div class="output-body">
          <div class="output-textarea-wrap">
            <label>Output (editable antes de copiar)</label>
            <textarea id="outputTextarea" spellcheck="false"></textarea>
          </div>
          <div class="output-side" id="outputSide">
            <button id="actionsCollapseBtn" class="rail-btn" title="Replegar los botones de copiar para ensanchar el output"><span class="chev">▸</span></button>
            <div class="output-actions" id="outputActions"></div>
          </div>
        </div>
        <div class="media-panel" id="mediaPanel">
          <div class="media-panel-header">
            <button id="mediaCollapseBtn" class="rail-btn" title="Replegar los nombres de media"><span class="chev">▾</span></button>
            <h4>Nombres de media</h4>
            <span class="hint" id="mediaFmtHint"></span>
            <button class="tool-btn media-edit-btn" id="mediaConfigBtn"
              title="Editar la lista y la regla de nombres de esta sección">✎</button>
          </div>
          <!-- Key del ticket: la escribe el tester al crear el issue.
               Los nombres de abajo se generan solos con esta key y los
               campos del formulario, según la regla media_fmt. -->
          <div class="media-panel-body"><div class="media-panel-body-inner">
            <div class="media-row">
              <span class="media-type">Key</span>
              <input type="text" id="mediaTicketKey" placeholder="clave del ticket (p. ej. ABC-1234)" />
              <span></span>
            </div>
            <div id="mediaRows"></div>
          </div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ PESTAÑA DATA ============ -->
  <div id="dataContainer" class="data-layout" style="display:none;">
    <div class="data-sidebar" id="dataSidebar"></div>
    <div class="data-main">
      <div class="data-toolbar">
        <button id="addRowBtn">+ Agregar fila</button>
        <button id="addListBtn">+ Nueva lista</button>
        <button id="addLinkBtn" title="Agrega una lista dependiente a la lista seleccionada (depende de sus valores, como POI depende de Mapa)">+ Lista correlacionada</button>
        <span style="flex:1"></span>
        <button id="dataImportBtn">Cargar bug_data.csv…</button>
        <button id="dataExportBtn" class="primary">Exportar bug_data.csv</button>
      </div>
      <div class="data-table-wrap" id="dataTableWrap"></div>
    </div>
  </div>

  <!-- ============ PESTAÑA RULES ============ -->
  <div id="rulesContainer" class="rules-layout" style="display:none;"></div>

  <!-- ============ MODAL ============ -->
  <div class="modal-backdrop" id="modal">
    <div class="modal" id="modalBox">
      <h3 id="modalTitle">Confirmar</h3>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <!-- ============ INPUTS DE ARCHIVO OCULTOS ============ -->
  <input type="file" id="dataCsvInput" accept=".csv,text/csv" style="display:none" />
  <input type="file" id="fieldsCsvInput" accept=".csv,text/csv" style="display:none" />
  <input type="file" id="sessionFileInput" accept=".json,application/json" style="display:none" />

<!-- ================================================================
     CONFIG VANILLA (fuente de verdad embebida)
     ================================================================
     Este bloque JSON contiene los formularios (schema), los datos
     (listas, mapas, POIs, reglas) tal como se distribuyen.
     La herramienta lo lee al abrir. "Exportar herramienta" descarga
     un bug_tool.html nuevo con este bloque actualizado.
     El equipo de Database puede editarlo aquí a mano si lo prefiere,
     pero lo normal es editarlo desde la propia herramienta o via CSV.
     ================================================================ -->
<script type="application/json" id="vanillaConfig">
{
  "version": 2,
  "data": {
    "lists": {
      "regions": ["NA", "EU", "APAC", "LATAM", "BR"],
      "platforms": ["PC(MSS)", "PC(Bnet)", "PS5", "Xbox Series X", "Xbox One", "Switch", "Mobile"],
      "modes": ["MP", "BR", "WZ", "Ranked", "HC", "Campaign", "Spec Ops"],
      "bugTypes": ["Visual", "Logic", "Audio", "Crash", "Performance", "Network", "HUD", "Animation", "UI", "AI", "Physics", "Collision", "Texture"],
      "regressionStatuses": ["Verificado Corregido", "Regresado", "No Reproducible", "Aún Presente", "No Encontrado", "Fix Parcial"],
      "onlineOrLan": ["Online", "LAN", "Offline", "Split-Screen"],
      "mediaTypes": ["Vid", "Pic", "ConsoleLog", "DxDiag", "TestLogs", "DemoLogs"],
      "severities": ["S0", "S1", "S2", "S3"],
      "priorities": ["P0", "P1", "P2", "P3"]
    },
    "maps": ["Highrise", "Terminal", "Scrapyard", "Rust", "Atlas", "Boneyard", "Firing Range", "Nuketown", "ExampleMap_01", "ExampleMap_02"],
    "pois": {
      "Highrise": ["Office A", "Office B", "Helipad", "Roof East", "Roof West", "Stairwell", "Server Room"],
      "Terminal": ["Check-in", "Gate 7", "Gate 12", "Baggage Claim", "Security", "Runway"],
      "Scrapyard": ["Container A", "Container B", "Crane Top", "Office", "Yard Center"],
      "Rust": ["Refinery", "Storage Tank 1", "Storage Tank 2", "Pipe Bridge", "Control Room"],
      "Atlas": ["Mech Bay", "Command Center", "Hangar"],
      "Boneyard": ["Hangar", "Tower", "Runway Edge"],
      "Firing Range": ["Range A", "Range B", "Center Lane"],
      "Nuketown": ["House Yellow", "House Green", "Backyard", "Bus"],
      "ExampleMap_01": ["POI A", "POI B", "POI C"],
      "ExampleMap_02": ["POI X", "POI Y", "POI Z"]
    },
    "rules": {
      "kw_count": "5",
      "media_fmt": "{type}_{key}_{platform}_{cl}_(1)",
      "coord_fmt": "(X, Y, Z) (X, Y, Z)",
      "coord_re": "^\\(\\d+,\\s*\\d+,\\s*\\d+\\)\\s*\\(\\d+,\\s*\\d+,\\s*\\d+\\)$",
      "repro_re": "^\\d+/\\d+$",
      "buildUrl_prefix": "getbuild://",
      "default_tz": "CST",
      "default_executable": "Test.exe"
    }
  },
  "schema": {
    "forms": [
      {
        "id": "bug",
        "label": "Bug",
        "sections": [
          {
            "id": "resumen",
            "label": "Resumen (encabezado)",
            "mode": "joined",
            "sep": " - ",
            "fields": [
              { "id": "team", "label": "Team", "type": "text", "size": "half", "required": true },
              { "id": "region", "label": "Región", "type": "autocomplete", "source": "regions", "size": "half", "required": true },
              { "id": "version", "label": "Versión", "type": "text", "size": "third", "required": true },
              { "id": "platform", "label": "Plataforma", "type": "autocomplete", "source": "platforms", "size": "third", "required": true },
              { "id": "client", "label": "Cliente", "type": "text", "size": "third", "template": "({value})", "sep": "", "help": "Déjalo vacío si la plataforma ya lo incluye, p. ej. PC(MSS)" },
              { "id": "mode", "label": "Modo", "type": "autocomplete", "source": "modes", "size": "third", "required": true },
              { "id": "map", "label": "Mapa", "type": "autocomplete", "source": "parent:map", "size": "third", "required": true },
              { "id": "poi", "label": "POI", "type": "autocomplete", "source": "child:map:map", "size": "third", "required": true },
              { "id": "bugType", "label": "Tipo de bug", "type": "autocomplete", "source": "bugTypes", "size": "half", "required": true },
              { "id": "shortDescription", "label": "Descripción corta", "type": "text", "size": "half", "required": true },
              { "id": "narrativeCondition", "label": "Condición narrativa (1-3 frases)", "type": "textarea", "rows": 2, "required": true, "template": "Cuando {value}" },
              { "id": "coords", "label": "Coordenadas", "type": "text", "required": true, "regex": "@coord_re", "regexMsg": "Formato: (X, Y, Z) (X, Y, Z)", "template": "({value})", "sep": " " }
            ]
          },
          {
            "id": "descripcion",
            "label": "Descripción",
            "mode": "lines",
            "fields": [
              { "id": "description", "label": "Descripción larga", "type": "textarea", "rows": 4 }
            ]
          },
          {
            "id": "variables",
            "label": "Variables / Argumentos",
            "mode": "lines",
            "heading": "+Variables/Argumentos Usados:+",
            "fields": [
              { "id": "variables", "label": "Variables (una por línea)", "type": "textarea", "rows": 3, "perLine": true, "template": "+ {value}" }
            ]
          },
          {
            "id": "build",
            "label": "Información de compilación",
            "mode": "lines",
            "heading": "+Información de Compilación:+",
            "fields": [
              { "id": "cod", "label": "COD", "type": "text", "size": "third", "required": true, "template": "COD {value}" },
              { "id": "cl", "label": "CL", "type": "text", "size": "third", "required": true, "regex": "^\\d+$", "regexMsg": "Debe ser numérico", "template": "CL: {value}", "joinPrev": true },
              { "id": "bspCl", "label": "BSP CL", "type": "text", "size": "third", "default": "N/A", "regex": "^(\\d+|N/A)$", "regexMsg": "Numérico o N/A", "template": "BSP CL: {value}", "omitValue": "N/A" },

<script>
"use strict";

/* ================================================================
   BUG REPORT TOOL v2 — schema-driven

   Índice del código (buscar el número para saltar):
     [1] Captura prístina y constantes
     [2] Utilidades generales
     [3] Config (vanilla embebida + copia local editable)
     [4] Helpers de schema (formularios, secciones, campos)
     [5] Instancias (Bug 1, Bug 2, ...) y persistencia
     [6] Render: pestañas superiores y sub-pestañas

    [10] Validación y tiles de estado

    [12] Panel de media

    [16] Exportar herramienta (HTML autocontenido)
    [17] Sesión (guardar/cargar archivo), modales, banner, menús
    [18] Boot
   ================================================================ */

/* ================================================================
   [1] CAPTURA PRÍSTINA Y CONSTANTES
   ================================================================
   Guardamos el HTML del archivo TAL COMO ESTÁ EN DISCO antes de que
   el JS pinte nada. "Exportar herramienta" toma esta copia, le
   reemplaza el bloque JSON #vanillaConfig por la config actual y la
   descarga: así los cambios quedan DENTRO del nuevo .html. */
const PRISTINE_HTML = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
// Escrito en dos partes para que el parser HTML no corte el script aquí.
const SCRIPT_END = "</scr" + "ipt>";

const CONFIG_KEY  = "bug_tool_v2_config";   // schema + data (localStorage)
const SESSION_KEY = "bug_tool_v2_session";  // instancias y preferencias

const FIELD_TYPES = [
  { id: "text",         label: "Texto (una línea)" },
  { id: "textarea",     label: "Texto (varias líneas)" },

];
const FIELD_SIZES = [

  { id: "third", label: "1/3 de fila" }
];

// Paleta de colores con nombre para los tiles personalizados. Cada uno trae
// fondo (bg), texto (fg) y borde para buen contraste en tema claro. Se usan
// como estilo en línea (fuente única) tanto en la barra como en el editor.
const TILE_COLORS = [
  { id: "red",     label: "Rojo",      bg: "#fef2f2", fg: "#991b1b", border: "#fecaca" },
  { id: "orange",  label: "Naranja",   bg: "#fff7ed", fg: "#9a3412", border: "#fed7aa" },

  { id: "yellow",  label: "Amarillo",  bg: "#fefce8", fg: "#854d0e", border: "#fde047" },
  { id: "lime",    label: "Lima",      bg: "#f7fee7", fg: "#3f6212", border: "#d9f99d" },
  { id: "green",   label: "Verde",     bg: "#f0fdf4", fg: "#166534", border: "#bbf7d0" },
  { id: "emerald", label: "Esmeralda", bg: "#ecfdf5", fg: "#065f46", border: "#a7f3d0" },
  { id: "teal",    label: "Teal",      bg: "#f0fdfa", fg: "#115e59", border: "#99f6e4" },
  { id: "cyan",    label: "Cian",      bg: "#ecfeff", fg: "#155e75", border: "#a5f3fc" },
  { id: "blue",    label: "Azul",      bg: "#eff6ff", fg: "#1e40af", border: "#bfdbfe" },
  { id: "indigo",  label: "Índigo",    bg: "#eef2ff", fg: "#3730a3", border: "#c7d2fe" },
  { id: "violet",  label: "Morado",    bg: "#f5f3ff", fg: "#5b21b6", border: "#ddd6fe" },
  { id: "pink",    label: "Rosa",      bg: "#fdf2f8", fg: "#9d174d", border: "#fbcfe8" },
  { id: "slate",   label: "Pizarra",   bg: "#f8fafc", fg: "#334155", border: "#cbd5e1" },
  { id: "stone",   label: "Piedra",    bg: "#fafaf9", fg: "#57534e", border: "#e7e5e4" }
];
const TILE_COLOR_MAP = Object.fromEntries(TILE_COLORS.map(c => [c.id, c]));
function tileColor(id) { return TILE_COLOR_MAP[id] || TILE_COLOR_MAP.slate; }
// <option> de la paleta para los <select> de color (validación y tiles).
function tileColorOptions(selected) {
  return TILE_COLORS.map(cc =>
    `<option value="${cc.id}"${selected === cc.id ? " selected" : ""}>${escapeHtml(cc.label)}</option>`).join("");
}

// Severidad de un tile personalizado. Solo "error" bloquea el estado verde
// "listo para copiar" (como un campo obligatorio). Aviso e info no bloquean.
const TILE_SEVERITIES = [
  ["error", "Error (bloquea listo)"],
  ["warn",  "Aviso"],
  ["info",  "Info"]
];
// Color por defecto sugerido según la severidad al crear un tile nuevo.
const TILE_SEV_COLOR = { error: "red", warn: "amber", info: "blue" };

/* ================================================================
   [2] UTILIDADES GENERALES
   ================================================================ */
function $(id) { return document.getElementById(id); }

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function newId() {
  return "i_" + Math.random().toString(36).slice(2, 10);
}

function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

// Convierte un nombre libre en un id seguro: "Posición de vista" -> "posicionDeVista"
function slugify(label) {
  const clean = String(label || "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")  // sin acentos
    .replace(/[^a-zA-Z0-9]+/g, " ").trim();
  if (!clean) return "campo";
  const parts = clean.split(" ");
  return parts[0].toLowerCase() +
    parts.slice(1).map(p => p[0].toUpperCase() + p.slice(1).toLowerCase()).join("");
}

// Los valores que empiezan con "@" son referencias a data.rules.
// Ej.: regex "@coord_re" usa la regla coord_re; default "@default_tz" usa CST.
function resolveRef(v) {
  if (typeof v === "string" && v.startsWith("@")) {
    const key = v.slice(1);
    return config.data.rules[key] != null ? config.data.rules[key] : "";
  }
  return v == null ? "" : v;
}

// En plantillas, separadores y encabezados se puede escribir \n o
// <br> para forzar un salto de línea en el output.
function unescapeNl(s) {
  return String(s == null ? "" : s)
    .replace(/<br\s*\/?>/gi, "\n")
    .replace(/\\n/g, "\n");
}

function isoStamp() {
  const d = new Date();
  return d.toISOString().replace(/[:.]/g, "-").slice(0, 19);
}

function downloadFile(name, content) {
  const blob = new Blob([content || ""], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text || "").then(() => {
    flashBanner("Copiado al portapapeles.");
  }).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = text || "";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); flashBanner("Copiado al portapapeles."); }
    catch (e) { flashBanner("No se pudo copiar. Selecciona y copia a mano.", true); }
    document.body.removeChild(ta);
  });
}

/* ================================================================
   [3] CONFIG (VANILLA EMBEBIDA + COPIA LOCAL EDITABLE)
   ================================================================
   - `vanilla`: lo que trae el archivo .html (bloque #vanillaConfig).
   - `config`:  la copia con la que se trabaja. Vive en localStorage
     para que los cambios sobrevivan al cerrar el navegador.
   Si config != vanilla se muestra el aviso "Config modificada" para
   recordar exportar la herramienta o los CSV. */
let vanilla = null;
let config = null;

function loadVanillaConfig() {
  const el = $("vanillaConfig");
  vanilla = JSON.parse(el.textContent);
}

function loadConfig() {
  try {
    const raw = localStorage.getItem(CONFIG_KEY);
    if (raw) {
      const c = JSON.parse(raw);
      if (c && c.schema && c.data) {
        config = c;
        migrateConfig();
        return;
      }
    }
  } catch (e) { console.error("loadConfig", e); }
  config = deepClone(vanilla);
}

// Si esta versión del archivo trae listas/reglas nuevas que la config
// guardada en el navegador no conoce, se completan sin pisar nada.
function migrateConfig() {
  Object.entries(vanilla.data.lists).forEach(([k, v]) => {
    if (!config.data.lists[k]) config.data.lists[k] = deepClone(v);
  });
  Object.entries(vanilla.data.rules).forEach(([k, v]) => {
    if (config.data.rules[k] === undefined) config.data.rules[k] = v;
  });
}

// ---- Modelo de listas en árbol (unificado) ----
// config.data.lists      = { id: [valores] }                      // raíces (planas)
// config.data.childLists = { id: { parent, values: {pv:[...]} } } // dependientes
// config.data.listMeta   = { id: { label } }                      // etiqueta opcional
// Cualquier lista (raíz o dependiente) puede ser padre de varias dependientes.
// Una dependiente indexa sus valores por el valor del padre (como POI por Mapa)
// y su `parent` apunta a CUALQUIER lista → profundidad arbitraria.

function listLabel(id) {
  const m = config.data.listMeta && config.data.listMeta[id];
  return (m && m.label) || id;
}
function isChildList(id) { return !!(config.data.childLists && config.data.childLists[id]); }
function listExists(id) { return !!(config.data.lists[id] || isChildList(id)); }

// Valores que puede tomar una lista (para usarlos como claves de sus hijas).
// Raíz → su arreglo; dependiente → unión ordenada y sin repetir de sus buckets.
function listValues(id) {
  if (config.data.lists[id]) return config.data.lists[id];
  const c = config.data.childLists && config.data.childLists[id];
  if (!c) return [];
  const seen = new Set(), out = [];
  Object.values(c.values || {}).forEach(arr => (arr || []).forEach(v => {
    if (!seen.has(v)) { seen.add(v); out.push(v); }
  }));
  return out;
}
// Listas dependientes cuyo padre directo es `id`.
function childrenOf(id) {
  const cl = config.data.childLists || {};
  return Object.keys(cl).filter(k => cl[k].parent === id);
}
// Todo el subárbol de dependientes bajo `id` (para borrado en cascada).
function descendantLists(id) {
  const out = [];
  (function walk(p) { childrenOf(p).forEach(c => { out.push(c); walk(c); }); })(id);
  return out;
}
// Id nuevo único entre raíces, dependientes y etiquetas.
function uniqueListId(base, d) {
  d = d || config.data;
  base = slugify(base) || "list";
  const taken = (x) => (d.lists && d.lists[x] != null) ||
    (d.childLists && d.childLists[x] != null) || (d.listMeta && d.listMeta[x] != null);
  if (!taken(base)) return base;
  let n = 2; while (taken(base + n)) n++; return base + n;
}

// Migra el modelo viejo (par built-in maps/pois + linkedLists de pares) al
// árbol unificado, y reescribe las fuentes (source) de los campos. Idempotente:
// si ya está migrado (sin marcadores viejos), solo garantiza los contenedores.
function migrateListsToTree(cfg) {
  const d = cfg.data;
  if (!d.lists) d.lists = {};
  if (!d.rules) d.rules = {};
  if (!d.childLists) d.childLists = {};
  if (!d.listMeta) d.listMeta = {};
  const hasLegacy = d.maps !== undefined || d.pois !== undefined ||
    (d.linkedLists && Object.keys(d.linkedLists).length);
  if (!hasLegacy) { delete d.maps; delete d.pois; delete d.linkedLists; return; }

  const legacy = {}; // linkId viejo -> { parentId, childId }
  // Par built-in Mapa/POI → lista raíz "map" + dependiente "poi".
  if (d.maps !== undefined) {
    if (d.lists["map"] == null) d.lists["map"] = Array.isArray(d.maps) ? d.maps : [];
    if (!d.listMeta["map"]) d.listMeta["map"] = { label: "Mapa" };
    if (d.childLists["poi"] == null) d.childLists["poi"] = { parent: "map", values: d.pois || {} };
    if (!d.listMeta["poi"]) d.listMeta["poi"] = { label: "POI" };
    legacy["map"] = { parentId: "map", childId: "poi" };
  }
  // Pares correlacionados del usuario → raíz (padre) + dependiente (hijo).
  Object.keys(d.linkedLists || {}).forEach(x => {
    if (x === "map") return;
    const L = d.linkedLists[x];
    const parentId = uniqueListId(x, d);
    if (d.lists[parentId] == null) d.lists[parentId] = L.parents || [];
    if (!d.listMeta[parentId]) d.listMeta[parentId] = { label: L.parentLabel || parentId };
    const childId = uniqueListId(x + "_hijo", d);
    d.childLists[childId] = { parent: parentId, values: L.children || {} };
    d.listMeta[childId] = { label: L.childLabel || childId };
    legacy[x] = { parentId, childId };
  });
  // Reescribe las fuentes viejas de los campos al formato nuevo.
  (cfg.schema.forms || []).forEach(f => (f.sections || []).forEach(s => (s.fields || []).forEach(fl => {
    const src = fl.source;
    if (typeof src !== "string") return;
    let m;
    if (src === "maps") { if (legacy["map"]) fl.source = "map"; return; }
    if ((m = /^pois:(.+)$/.exec(src))) { if (legacy["map"]) fl.source = "child:poi:" + m[1]; return; }
    if ((m = /^parent:(.+)$/.exec(src))) { const lk = legacy[m[1]]; if (lk) fl.source = lk.parentId; return; }
    if ((m = /^child:([^:]+):(.+)$/.exec(src))) { const lk = legacy[m[1]]; if (lk) fl.source = "child:" + lk.childId + ":" + m[2]; return; }
  })));
  delete d.maps; delete d.pois; delete d.linkedLists;
}

// Encierra un literal en comillas seguras para el lenguaje de expresiones.
function quoteLit(v) {
  v = String(v == null ? "" : v);
  return v.includes('"') ? `'${v}'` : `"${v}"`;
}

// Convierte una condición vieja { field, op, value } a texto de expresión.
function whenToExpr(w) {
  if (!w || !w.field) return "";
  const f = w.field, val = w.value == null ? "" : w.value;
  switch (w.op) {
    case "empty":          return `${f} empty`;
    case "notEmpty":       return `${f} notEmpty`;
    case "equals":         return `${f} = ${quoteLit(val)}`;
    case "notEquals":      return `${f} != ${quoteLit(val)}`;
    case "matches":        return `${f} matches ${String(val).startsWith("@") ? val : quoteLit(val)}`;
    case "equalsField":    return `${f} = ${val}`;
    case "notEqualsField": return `${f} != ${val}`;
    default:               return "";
  }
}

// Normaliza las reglas de todos los formularios a la forma nueva
// (whenExpr: texto). Mantiene retrocompatibilidad: si ya trae whenExpr, no
// toca; si trae `when` viejo, lo convierte y elimina el objeto.
function migrateRulesToExpr(cfg) {
  (cfg.schema.forms || []).forEach(form => {
    (form.rules || []).forEach(r => {
      if (typeof r.whenExpr === "string") { delete r.when; return; }
      if (r.when) { r.whenExpr = whenToExpr(r.when); delete r.when; }
    });
  });
}

function configIsDirty() {
  return JSON.stringify(config) !== JSON.stringify(vanilla);
}

function updateConfigChip() {
  $("configChip").classList.toggle("visible", configIsDirty());
}

/* ================================================================
   [4] HELPERS DE SCHEMA
   ================================================================ */
function getForms() { return config.schema.forms; }

function getForm(formId) {
  return getForms().find(f => f.id === formId) || null;
}

function getSection(form, secId) {
  return form.sections.find(s => s.id === secId) || null;
}

function getField(form, fieldId) {
  for (const sec of form.sections) {
    const idx = sec.fields.findIndex(f => f.id === fieldId);
    if (idx >= 0) return { sec, field: sec.fields[idx], idx };
  }
  return null;
}

function allFields(form) {
  const out = [];
  form.sections.forEach(sec => sec.fields.forEach(f => out.push({ sec, field: f })));
  return out;
}

// Normaliza fuentes viejas de campos al formato nuevo usando el modelo YA
// migrado (para cuando se importa un bug_fields.csv anterior a la iteración 3,
// mientras data.lists/childLists ya está en árbol). Mapea:
//   maps -> map · pois:f -> child:poi:f · parent:X -> X (raíz) ·
//   child:map:f -> child:poi:f · child:X:f -> child:<hija de X>:f (best effort)
function normalizeFieldSources(forms) {
  const childByParent = {};
  Object.keys(config.data.childLists || {}).forEach(id => {
    const p = config.data.childLists[id].parent;
    (childByParent[p] = childByParent[p] || []).push(id);
  });
  (forms || []).forEach(f => (f.sections || []).forEach(s => (s.fields || []).forEach(fl => {
    const src = fl.source; let m;
    if (typeof src !== "string") return;
    if (src === "maps") { fl.source = "map"; return; }
    if ((m = /^pois:(.+)$/.exec(src))) { fl.source = "child:poi:" + m[1]; return; }
    if ((m = /^parent:(.+)$/.exec(src))) { fl.source = m[1]; return; }
    if ((m = /^child:([^:]+):(.+)$/.exec(src))) {
      const link = m[1], field = m[2];
      if (link === "map") { fl.source = "child:poi:" + field; return; }
      if (config.data.childLists && config.data.childLists[link]) return; // ya es dependiente actual
      const kids = childByParent[link];
      if (kids && kids.length) fl.source = "child:" + kids[0] + ":" + field;
    }
  })));
}

// Opciones para la columna "source" de un autocomplete. Devuelve { value, label }.
// Ofrece cada lista raíz (bare id) y, por cada campo del formulario atado a una
// lista L, las listas dependientes cuyo padre es L (como `child:hija:campo`).
// Así se encadena: Región → Mapa (child:mapa:region) → POI (child:poi:mapa).
function sourceOptions(form) {
  const opts = [];
  Object.keys(config.data.lists).forEach(k => opts.push({ value: k, label: listLabel(k) }));
  const cl = config.data.childLists || {};
  allFields(form).forEach(({ field }) => {
    const s = parseSource(field.source);
    const boundList = s.kind === "child" ? s.link : s.list; // lista que muestra este campo
    if (!boundList) return;
    Object.keys(cl).forEach(childId => {
      if (cl[childId].parent === boundList) {
        opts.push({ value: "child:" + childId + ":" + field.id, label: listLabel(childId) + " de «" + field.label + "»" });
      }
    });
  });
  return opts;
}

// Devuelve las opciones actuales de un campo autocomplete (nuevo modelo).
function optionsForField(field, inst) {
  const src = field.source || "";
  let m;
  if ((m = /^child:([^:]+):(.+)$/.exec(src))) {
    const c = config.data.childLists && config.data.childLists[m[1]];
    if (!c) return [];
    const pv = inst ? String(inst.values[m[2]] || "") : "";
    return (pv && c.values[pv]) ? c.values[pv] : [];
  }
  // Compatibilidad con fuentes viejas (por si entran vía CSV sin migrar).
  if (src === "maps") return config.data.lists["map"] || [];
  if ((m = /^parent:(.+)$/.exec(src))) return config.data.lists[m[1]] || [];
  if ((m = /^pois:(.+)$/.exec(src))) {
    const c = config.data.childLists && config.data.childLists["poi"];
    const pv = inst ? String(inst.values[m[1]] || "") : "";
    return (c && pv && c.values[pv]) ? c.values[pv] : [];
  }
  return config.data.lists[src] || [];
}

/* ================================================================
   [5] INSTANCIAS Y PERSISTENCIA
   ================================================================ */
const state = {
  topTab: "",            // id de formulario, "data" o "rules"
  editMode: false,
  instances: [],         // { id, formId, title, values, ticketKey, output, outputEdited, errors, dirty }
  activeInstanceId: null,
  dataTab: { selectedCategory: "" },
  prefs: { dontAskOnClose: false }
};

function makeInstance(formId) {
  const form = getForm(formId);
  const values = {};
  allFields(form).forEach(({ field }) => {
    if (field.type === "mirror") return;
    if (field.type === "keywords") values[field.id] = [];
    else values[field.id] = resolveRef(field.default || "");
  });
  return {
    id: newId(),
    formId: formId,
    title: form.label + " 1",
    values: values,
    ticketKey: "",
    media: [defaultMediaType()],
    output: "",
    outputEdited: false,
    errors: {},
    dirty: false
  };
}

// Tras editar el schema (agregar campos, importar CSV) las instancias
// viejas pueden no tener todos los ids: aquí se completan.
function ensureInstanceFields(inst) {
  const form = getForm(inst.formId);
  if (!form) return;
  allFields(form).forEach(({ field }) => {
    if (field.type === "mirror") return;
    if (inst.values[field.id] === undefined) {
      inst.values[field.id] = field.type === "keywords" ? [] : resolveRef(field.default || "");
    }
    if (field.type === "keywords" && !Array.isArray(inst.values[field.id])) {
      inst.values[field.id] = [];
    }
  });
  if (inst.ticketKey === undefined) inst.ticketKey = "";
  if (!Array.isArray(inst.media)) inst.media = [defaultMediaType()];
  if (!inst.errors) inst.errors = {};
}

function getActiveInstance() {
  return state.instances.find(i => i.id === state.activeInstanceId) || null;
}

// ---- Guardado en localStorage (debounced) ----
let saveTimer = null;
// true mientras se ejecuta "Borrar todo lo local": bloquea cualquier
// guardado para que beforeunload no re-escriba lo recién borrado.
let suppressSave = false;
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  setSaveIndicator("saving");
  saveTimer = setTimeout(() => {
    saveAll();
    setSaveIndicator("saved");
  }, 300);
}

function saveAll() {
  if (suppressSave) return;
  try {
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      topTab: state.topTab,
      instances: state.instances,
      activeInstanceId: state.activeInstanceId,
      dataTab: state.dataTab,
      prefs: state.prefs
    }));
  } catch (e) {
    console.error("saveAll", e);
  }
  updateConfigChip();
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const snap = JSON.parse(raw);
    if (snap.topTab) state.topTab = snap.topTab;
    if (Array.isArray(snap.instances)) state.instances = snap.instances;
    if (snap.activeInstanceId) state.activeInstanceId = snap.activeInstanceId;
    if (snap.dataTab) state.dataTab = Object.assign(state.dataTab, snap.dataTab);
    if (snap.prefs) state.prefs = Object.assign(state.prefs, snap.prefs);
    return true;
  } catch (e) {
    console.error("loadSession", e);
    return false;
  }
}

function setSaveIndicator(kind) {
  const el = $("saveIndicator");
  el.classList.remove("saved", "saving", "unsaved");
  el.classList.add(kind);
  $("saveIndicatorText").textContent =
    kind === "saved" ? "Guardado" : kind === "saving" ? "Guardando..." : "Sin guardar";
}

function markInstanceDirty(inst) {
  if (!inst.dirty) { inst.dirty = true; refreshSubTabs(); }
}

/* ================================================================
   [6] RENDER: PESTAÑAS SUPERIORES Y SUB-PESTAÑAS
   ================================================================ */
function renderTopTabs() {
  const cont = $("formTabs");
  cont.innerHTML = getForms().map(f =>
    `<div class="top-tab${state.topTab === f.id ? " active" : ""}" data-form="${escapeHtml(f.id)}">${escapeHtml(f.label)}</div>`
  ).join("");
  cont.querySelectorAll("[data-form]").forEach(el => {
    el.addEventListener("click", () => switchToForm(el.dataset.form));
  });
  document.querySelectorAll('#topTabs [data-tab]').forEach(el => {
    el.classList.toggle("active", state.topTab === el.dataset.tab);
  });
  // Mostrar el contenedor que toca
  const isForm = !!getForm(state.topTab);
  $("subTabsAndMain").style.display = isForm ? "flex" : "none";
  $("tilesBar").classList.toggle("hidden", !isForm);
  $("dataContainer").style.display = state.topTab === "data" ? "flex" : "none";
  $("rulesContainer").style.display = state.topTab === "rules" ? "block" : "none";
}

function switchToForm(formId) {
  state.topTab = formId;
  const existing = state.instances.find(i => i.formId === formId);
  if (!existing) addInstance();
  else if (!getActiveInstance() || getActiveInstance().formId !== formId) {
    state.activeInstanceId = existing.id;
  }
  refreshAll();
  scheduleSave();
}

function refreshSubTabs() {
  const bar = $("subTabs");
  bar.innerHTML = "";
  const visible = state.instances.filter(i => i.formId === state.topTab);
  visible.forEach(inst => {
    const el = document.createElement("div");
    el.className = "sub-tab" + (inst.id === state.activeInstanceId ? " active" : "")
                 + (inst.dirty ? " dirty" : "");
    el.innerHTML = `<span class="dirty-dot"></span>
                    <span class="label">${escapeHtml(inst.title)}</span>
                    <span class="close" title="Cerrar">×</span>`;
    el.addEventListener("click", e => {
      if (e.target.classList.contains("close")) {
        e.stopPropagation();
        closeInstance(inst.id);
      } else if (inst.id !== state.activeInstanceId) {
        state.activeInstanceId = inst.id;
        refreshAll();
        scheduleSave();
      }
    });
    bar.appendChild(el);
  });
  const plus = document.createElement("div");
  plus.className = "sub-tab-new";
  plus.textContent = "+";
  plus.title = "Nueva instancia";
  plus.addEventListener("click", addInstance);
  bar.appendChild(plus);
}

function addInstance() {
  const form = getForm(state.topTab);
  if (!form) return;
  let count = 1;
  const existing = state.instances.filter(i => i.formId === state.topTab);
  while (existing.some(i => i.title === form.label + " " + count)) count++;
  const inst = makeInstance(state.topTab);
  inst.title = form.label + " " + count;
  inst.dirty = true;
  state.instances.push(inst);
  state.activeInstanceId = inst.id;
  refreshAll();
  scheduleSave();
}

function closeInstance(id) {
  const inst = state.instances.find(i => i.id === id);
  if (!inst) return;
  const doClose = () => {
    state.instances = state.instances.filter(i => i.id !== id);
    if (state.activeInstanceId === id) {
      const remaining = state.instances.filter(i => i.formId === state.topTab);
      state.activeInstanceId = remaining.length ? remaining[0].id : null;
      if (!state.activeInstanceId) { addInstance(); return; }
    }
    refreshAll();
    scheduleSave();
  };
  if (inst.dirty && !state.prefs.dontAskOnClose) {
    showConfirmModal({
      title: "¿Descartar cambios?",
      body: `¿Descartar los cambios sin guardar de "${escapeHtml(inst.title)}"?`,
      confirmText: "Descartar",
      confirmClass: "danger",
      showDontAsk: true,
      onConfirm: (dontAsk) => {
        if (dontAsk) state.prefs.dontAskOnClose = true;
        doClose();
      }
    });
  } else {
    doClose();
  }
}

function refreshAll() {
  renderTopTabs();
  const isForm = !!getForm(state.topTab);
  if (isForm) {
    refreshSubTabs();
    renderForm();
    renderMediaPanel();
  } else if (state.topTab === "data") {
    renderDataTab();
  } else if (state.topTab === "rules") {
    renderRulesTab();
  }
  updateConfigChip();
}

/* ================================================================
   [7] RENDER: FORMULARIO (NORMAL + MODO EDICIÓN)
   ================================================================
   Todo el formulario se pinta a partir del schema. En modo edición
   aparecen los controles ↑ ↓ ✎ ✕ en secciones y campos. El orden
   visual de arriba hacia abajo ES el orden del output. */
function renderForm() {
  const inst = getActiveInstance();
  const form = getForm(state.topTab);
  const panel = $("formPanel");
  if (!inst || !form) { panel.innerHTML = "<p>No hay instancia activa.</p>"; return; }
  ensureInstanceFields(inst);
  $("formTitle").textContent = form.label;
  const toggle = $("editToggle");
  toggle.classList.toggle("active", state.editMode);
  toggle.textContent = state.editMode ? "✓ Terminar edición" : "✎ Editar formulario";
  document.body.classList.toggle("editing", state.editMode);

  // Estado de las condiciones entre campos (ocultar/bloquear/default)
  const fx = evalFieldRules(form, inst);
  lastFxJson = JSON.stringify(fx);

  panel.innerHTML = form.sections.map(sec => sectionHtml(sec, inst, fx, form)).join("")
    + `<button class="add-section-btn" id="addSectionBtn">+ Agregar sección</button>`;
  wireFormEvents(inst, form);
  revalidate(inst);
  renderOutput();
}

// Última foto del estado de condiciones que está pintado en pantalla;
// si al validar cambia (ej. escribieron "LOD"), se re-pinta el form.
let lastFxJson = "";
function rerenderIfRulesChanged(form, inst) {
  const fxNow = JSON.stringify(evalFieldRules(form, inst));
  if (fxNow !== lastFxJson) renderForm();
}

// Estado de colapso de la UI (fase "compactación"): SOLO en memoria. No se
// guarda en state.prefs ni se exporta; cada recarga arranca todo expandido
// (decisión de diseño). Se relee en cada render, así el colapso sobrevive a
// los re-render dentro de la sesión pero no a un reload.
const uiCollapse = { sections: Object.create(null), form: false, media: false, actions: false };
function sectionCollapseKey(form, secId) { return form.id + ":" + secId; }

function sectionHtml(sec, inst, fx, form) {
  const tools = `
    <span class="sec-tools">
      <button class="tool-btn" data-sec-add="${sec.id}" title="Agregar campo a esta sección">+ campo</button>
      <button class="tool-btn" data-sec-up="${sec.id}" title="Subir sección">▲</button>
      <button class="tool-btn" data-sec-down="${sec.id}" title="Bajar sección">▼</button>
      <button class="tool-btn" data-sec-edit="${sec.id}" title="Editar sección">✎</button>
      <button class="tool-btn del" data-sec-del="${sec.id}" title="Borrar sección">✕</button>
    </span>`;
  // Los campos ocultos por condición no se pintan (en modo edición sí,
  // marcados, para poder seguir editándolos).
  const visibleFields = sec.fields.filter(f =>
    state.editMode || !(fx[f.id] && fx[f.id].hidden));
  // Agrupar campos consecutivos del mismo tamaño en filas de 2 o 3
  const rows = [];
  let group = null;
  visibleFields.forEach(f => {
    const size = f.size === "half" ? 2 : f.size === "third" ? 3 : 1;
    if (group && group.size === size && size > 1 && group.items.length < size) {
      group.items.push(f);
    } else {
      group = { size, items: [f] };
      rows.push(group);
    }
  });
  const body = rows.map(g => {
    const cells = g.items.map(f => fieldHtml(f, inst, fx)).join("");
    if (g.size === 2) return `<div class="row-2">${cells}</div>`;
    if (g.size === 3) return `<div class="row-3">${cells}</div>`;
    return cells;
  }).join("");
  const collapsed = !!uiCollapse.sections[sectionCollapseKey(form, sec.id)];
  return `<div class="form-section${collapsed ? " collapsed" : ""}" data-section="${escapeHtml(sec.id)}">
    <h4>
      <button class="sec-collapse" data-sec-collapse="${sec.id}" title="Colapsar / expandir sección"><span class="chev">▾</span></button>
      <span class="sec-label">${escapeHtml(sec.label)}</span>${tools}
    </h4>
    <div class="form-section-body"><div class="form-section-body-inner">${body}</div></div>
  </div>`;
}

function fieldHtml(field, inst, fx) {
  const err = inst.errors[field.id] || "";
  const invalid = err ? " invalid" : "";
  const st = (fx && fx[field.id]) || { hidden: false, disabled: false };
  const dis = st.disabled ? " disabled" : "";
  const tools = `
    <span class="fld-tools">
      <button class="tool-btn" data-fld-up="${field.id}" title="Subir campo (sube en el output)">▲</button>
      <button class="tool-btn" data-fld-down="${field.id}" title="Bajar campo (baja en el output)">▼</button>
      <button class="tool-btn" data-fld-edit="${field.id}" title="Editar campo">✎</button>
      <button class="tool-btn del" data-fld-del="${field.id}" title="Borrar campo definitivamente">✕</button>
    </span>`;
  const stateTag = st.hidden ? '<span class="hidden-tag">(oculto)</span>'
                 : st.disabled ? '<span class="hidden-tag">(bloqueado)</span>' : "";
  const labelHtml = `<div class="field-head"><label>${escapeHtml(field.label)}${field.required ? '<span class="req">*</span>' : ""}${stateTag}</label>${tools}</div>`;
  const helpHtml = field.help ? `<div class="field-help">${escapeHtml(field.help)}</div>` : "";
  const errHtml = `<div class="field-error">${escapeHtml(err)}</div>`;
  const val = field.type === "mirror" ? "" : (inst.values[field.id] != null ? inst.values[field.id] : "");

  if (field.type === "mirror") {
    // Solo visible en modo edición: no se llena, copia otro campo en el output.
    return `<div class="field mirror-field" data-field="${escapeHtml(field.id)}">
      ${labelHtml}
      <div class="mirror-note">= copia del campo «${escapeHtml(field.source || "?")}» (solo aparece en el output)</div>
    </div>`;
  }
  if (field.type === "textarea") {
    return `<div class="field${invalid}" data-field="${escapeHtml(field.id)}">
      ${labelHtml}
      <textarea data-bind="${escapeHtml(field.id)}" rows="${field.rows || 3}"${dis}>${escapeHtml(val)}</textarea>
      ${errHtml}${helpHtml}
    </div>`;
  }
  if (field.type === "autocomplete") {
    return `<div class="field autocomplete${invalid}" data-field="${escapeHtml(field.id)}">
      ${labelHtml}
      <div class="autocomplete-input-wrap">
        <input type="text" data-bind="${escapeHtml(field.id)}" data-ac="${escapeHtml(field.id)}" value="${escapeHtml(val)}"${dis} />
        <span class="autocomplete-arrow" data-ac-toggle title="Ver todas las opciones">▼</span>
      </div>
      <div class="autocomplete-list"></div>
      ${errHtml}${helpHtml}
    </div>`;
  }
  if (field.type === "keywords") {
    const kws = Array.isArray(val) ? val : [];
    return `<div class="field" data-field="${escapeHtml(field.id)}">
      ${labelHtml}
      <div class="chips${err ? " invalid" : ""}" data-kw-chips="${escapeHtml(field.id)}">
        ${kws.map(k => `<span class="chip">${escapeHtml(k)}<button data-kw-remove="${escapeHtml(k)}" title="Quitar">×</button></span>`).join("")}
        <input type="text" data-kw-input="${escapeHtml(field.id)}" placeholder="Escribe y presiona Enter..."${dis} />
      </div>
      ${err ? `<div class="chips-error">${escapeHtml(err)}</div>` : ""}
      ${helpHtml}
    </div>`;
  }
  // text (default)
  return `<div class="field${invalid}" data-field="${escapeHtml(field.id)}">
    ${labelHtml}
    <input type="text" data-bind="${escapeHtml(field.id)}" value="${escapeHtml(val)}"${dis} />
    ${errHtml}${helpHtml}
  </div>`;
}

function wireFormEvents(inst, form) {
  const panel = $("formPanel");

  // ---- Inputs normales: escribir solo actualiza el modelo; el
  //      trabajo pesado (validar, output, guardar) ocurre en blur. ----
  panel.querySelectorAll("[data-bind]").forEach(el => {
    const name = el.dataset.bind;
    el.addEventListener("input", () => {
      inst.values[name] = el.value;
      clearDependents(form, name, inst, panel);
      markInstanceDirty(inst);
    });
    el.addEventListener("blur", () => {
      revalidate(inst);
      renderOutput();
      renderMediaPanel();
      saveAll();
      setSaveIndicator("saved");
      // Si alguna condición mostró/ocultó/bloqueó campos, re-pintar.
      // Va al final: el usuario ya salió del campo, no roba el foco.
      rerenderIfRulesChanged(form, inst);
    });
    el.addEventListener("change", () => {
      inst.values[name] = el.value;
      clearDependents(form, name, inst, panel);
      revalidate(inst);
      renderOutput();
      renderMediaPanel();
      markInstanceDirty(inst);
      saveAll();
      setSaveIndicator("saved");
      rerenderIfRulesChanged(form, inst);
    });
  });

  // ---- Autocompletes ----
  panel.querySelectorAll("input[data-ac]").forEach(input => {
    const found = getField(form, input.dataset.ac);
    if (found) wireAutocomplete(input, inst, form, found.field);
  });

  // ---- Palabras clave ----
  panel.querySelectorAll("[data-kw-chips]").forEach(chips => {
    wireKeywords(chips, inst, form);
  });

  // ---- Controles del modo edición ----
  $("addSectionBtn").addEventListener("click", () => showSectionEditor(form, null));
  panel.querySelectorAll("[data-sec-add]").forEach(b => b.addEventListener("click", () =>
    showFieldEditor(form, getSection(form, b.dataset.secAdd), null)));
  panel.querySelectorAll("[data-sec-up]").forEach(b => b.addEventListener("click", () =>
    moveSection(form, b.dataset.secUp, -1)));
  panel.querySelectorAll("[data-sec-down]").forEach(b => b.addEventListener("click", () =>
    moveSection(form, b.dataset.secDown, +1)));
  panel.querySelectorAll("[data-sec-edit]").forEach(b => b.addEventListener("click", () =>
    showSectionEditor(form, getSection(form, b.dataset.secEdit))));
  panel.querySelectorAll("[data-sec-del]").forEach(b => b.addEventListener("click", () =>
    deleteSection(form, b.dataset.secDel)));
  panel.querySelectorAll("[data-fld-up]").forEach(b => b.addEventListener("click", () =>
    moveField(form, b.dataset.fldUp, -1)));
  panel.querySelectorAll("[data-fld-down]").forEach(b => b.addEventListener("click", () =>
    moveField(form, b.dataset.fldDown, +1)));
  panel.querySelectorAll("[data-fld-edit]").forEach(b => b.addEventListener("click", () => {
    const found = getField(form, b.dataset.fldEdit);
    if (found) showFieldEditor(form, found.sec, found.field);
  }));
  panel.querySelectorAll("[data-fld-del]").forEach(b => b.addEventListener("click", () =>
