      const target = isNew ? { id: uniqueFieldId(form, slugify(label)) } : field;
      target.label = label;
      target.type = $("fe_type").value;
      // Solo guardamos las propiedades con contenido para que el
      // schema (y el CSV) queden limpios y legibles.
      const setOrDel = (key, val, emptyVal) => {
        if (val === emptyVal || val === "" || val == null) delete target[key];
        else target[key] = val;
      };
      setOrDel("size", $("fe_size").value, "full");
      setOrDel("source", $("fe_source").disabled ? "" : $("fe_source").value, "");
      setOrDel("default", $("fe_default").value, "");
      setOrDel("rows", parseInt($("fe_rows").value, 10) || 3, 3);
      setOrDel("help", $("fe_help").value.trim(), "");
      setOrDel("template", $("fe_template").value, "{value}");
      // Separador: el checkbox "pegado" fuerza sep = "" (sin separador);
      // si no, texto no vacío = separador propio; vacío = usar el de la sección.
      if ($("fe_glue").checked) target.sep = "";
      else setOrDel("sep", $("fe_sep").value, "");
      setOrDel("emptyAs", $("fe_emptyAs").value.trim(), "");
      setOrDel("omitValue", $("fe_omitValue").value.trim(), "");
      if ($("fe_joinPrev").checked) target.joinPrev = true; else delete target.joinPrev;
      if ($("fe_perLine").checked) target.perLine = true; else delete target.perLine;
      if ($("fe_required").checked) target.required = true; else delete target.required;
      if ($("fe_hidden").checked) target.hidden = true; else delete target.hidden;
      setOrDel("regex", regexTxt, "");
      setOrDel("regexMsg", $("fe_regexMsg").value.trim(), "");
      setOrDel("kwCount", $("fe_kwCount").value.trim(), "");
      if ($("fe_kwOverlap").checked) target.kwOverlap = true; else delete target.kwOverlap;
      if (target.type !== "keywords") { delete target.kwCount; delete target.kwOverlap; }
      if (target.type === "mirror") { delete target.required; delete target.regex; }
      if (isNew) sec.fields.push(target);
      state.instances.forEach(ensureInstanceFields);
      renderForm();
      scheduleSave();
      return true;
    }
  });
}

/* ================================================================
   [10] VALIDACIÓN, CONDICIONES ENTRE CAMPOS Y TILES DE ESTADO
   ================================================================
   Validaciones por campo (editables en RULES):
     - required: no puede quedar vacío
     - regex: expresión regular literal o @regla de DATA
   Palabras clave (por campo): cantidad exacta (kwCount, acepta
   @regla), unicidad, y opcionalmente que no aparezcan en el cuerpo
   del bug (kwOverlap).

   CONDICIONES ENTRE CAMPOS (form.rules, editables en RULES):
     { when: { field, op, value }, then: { action, field, value } }
     op:     empty | notEmpty | equals | notEquals | matches (regex/@regla)
     action: show | hide | disable | setDefault
   Ejemplos: si map está vacío o es "global" → ocultar/bloquear POI;
   si shortDescription cumple la regex LOD → mostrar el campo
   "LOD number" (creado con "Oculto por defecto") en Notas. */
function getFormRules(form) {
  return form.rules || [];
}

function evalCondition(when, inst) {
  const v = String(inst.values[when.field] == null ? "" : inst.values[when.field]).trim();
  const target = String(when.value == null ? "" : when.value).trim();
  switch (when.op) {
    case "empty":     return !v;
    case "notEmpty":  return !!v;
    case "equals":    return v.toLowerCase() === target.toLowerCase();
    case "notEquals": return v.toLowerCase() !== target.toLowerCase();
    case "matches":
      try { return new RegExp(resolveRef(target), "i").test(v); }
      catch (e) { return false; }
    // target = id de otro campo; solo cuenta si ambos tienen valor
    case "equalsField": {
      const other = String(inst.values[target] == null ? "" : inst.values[target]).trim();
      return !!v && !!other && v.toLowerCase() === other.toLowerCase();
    }
    case "notEqualsField": {
      const other = String(inst.values[target] == null ? "" : inst.values[target]).trim();
      return !!v && !!other && v.toLowerCase() !== other.toLowerCase();
    }
    default: return false;
  }
}

// Estado efectivo de cada campo según las condiciones del formulario.
// Devuelve { fieldId: { hidden, disabled } }. La acción setDefault
// rellena el campo destino solo si está vacío.
function evalFieldRules(form, inst) {
  const fx = {};
  allFields(form).forEach(({ field }) => {
    fx[field.id] = { hidden: !!field.hidden, disabled: false };
  });
  getFormRules(form).forEach(r => {
    if (!r.when || !r.then || !fx[r.then.field]) return;
    if (!evalCondition(r.when, inst)) return;
    const t = fx[r.then.field];
    if (r.then.action === "show") t.hidden = false;
    else if (r.then.action === "hide") t.hidden = true;
    else if (r.then.action === "disable") t.disabled = true;
    else if (r.then.action === "setDefault") {
      const cur = inst.values[r.then.field];
      if (!String(cur == null ? "" : cur).trim()) {
        inst.values[r.then.field] = resolveRef(r.then.value || "");
      }
    }
  });
  return fx;
}

function revalidate(inst) {
  inst.errors = {};
  const form = getForm(inst.formId);
  if (!form) return;
  const fx = evalFieldRules(form, inst);

  // Cuerpo del bug: todos los campos de texto, para el chequeo de keywords
  const bodyText = allFields(form)
    .filter(({ field }) => field.type === "text" || field.type === "textarea")
    .map(({ field }) => String(inst.values[field.id] || ""))
    .join(" ")
    .toLowerCase();

  allFields(form).forEach(({ field }) => {
    if (field.type === "mirror") return;
    // Un campo oculto o bloqueado por condición no puede exigirse
    if (fx[field.id].hidden || fx[field.id].disabled) return;

    if (field.type === "keywords") {
      const arr = inst.values[field.id] || [];
      const want = parseInt(resolveRef(field.kwCount || ""), 10) || 0;
      if (want && arr.length !== want) {
        inst.errors[field.id] = `Se necesitan exactamente ${want} (hay ${arr.length})`;
      } else if (new Set(arr.map(k => k.toLowerCase())).size !== arr.length) {
        inst.errors[field.id] = "Los valores deben ser únicos";
      } else if (field.kwOverlap) {
        const conflict = arr.find(k => bodyText.includes(k.toLowerCase()));
        if (conflict) inst.errors[field.id] = `«${conflict}» aparece en el cuerpo del bug`;
      }
      return;
    }

    const v = String(inst.values[field.id] || "");
    if (field.required && !v.trim()) {
      inst.errors[field.id] = "Obligatorio";
      return;
    }
    if (v.trim() && field.regex) {
      try {
        const re = new RegExp(resolveRef(field.regex));
        if (!re.test(v.trim())) {
          inst.errors[field.id] = field.regexMsg || "Formato inválido";
        }
      } catch (e) { /* regex rota: se ignora, se corrige en RULES */ }
    }
  });

  // Condiciones con acción "marcar error" (ej. BSP CL igual a CL).
  // No aplican sobre campos ocultos o bloqueados.
  getFormRules(form).forEach(r => {
    if (!r.when || !r.then || r.then.action !== "error") return;
    const st = fx[r.then.field];
    if (!st || st.hidden || st.disabled) return;
    if (evalCondition(r.when, inst)) {
      inst.errors[r.then.field] = r.then.value || "Valor inválido";
    }
  });

  reflectErrors(inst);
  renderTiles(inst);
}

// Pinta los errores en los campos sin re-renderizar el formulario.
function reflectErrors(inst) {
  const panel = $("formPanel");
  panel.querySelectorAll(".field").forEach(el => {
    const name = el.dataset.field;
    if (!name) return;
    const err = inst.errors[name] || "";
    const chips = el.querySelector("[data-kw-chips]");
    if (chips) {
      chips.classList.toggle("invalid", !!err);
      let msg = el.querySelector(".chips-error");
      if (err) {
        if (!msg) {
          msg = document.createElement("div");
          msg.className = "chips-error";
          chips.after(msg);
        }
        msg.textContent = err;
      } else if (msg) {
        msg.remove();
      }
      return;
    }
    el.classList.toggle("invalid", !!err);
    const errEl = el.querySelector(".field-error");
    if (errEl) errEl.textContent = err;
  });
}

// Tiles de colores arriba: verde si todo bien, rojos por cada campo
// con error. Click en un tile = saltar a ese campo.
function renderTiles(inst) {
  const bar = $("tilesBar");
  if (!inst || !getForm(state.topTab)) { bar.innerHTML = ""; return; }
  const form = getForm(inst.formId);
  const errs = Object.entries(inst.errors);
  if (!errs.length) {
    bar.innerHTML = `<span class="tile ok">✓ Sin errores — listo para copiar</span>`;
    return;
  }
  const MAX_TILES = 10;
  bar.innerHTML = errs.slice(0, MAX_TILES).map(([id, msg]) => {
    const found = getField(form, id);
    const label = found ? found.field.label : id;
    return `<span class="tile err" data-tile="${escapeHtml(id)}" title="${escapeHtml(msg)}">${escapeHtml(label)}</span>`;
  }).join("") + (errs.length > MAX_TILES
    ? `<span class="tile more">+${errs.length - MAX_TILES} más</span>` : "");
  bar.querySelectorAll("[data-tile]").forEach(t => {
    t.addEventListener("click", () => {
      const el = document.querySelector(`#formPanel .field[data-field="${t.dataset.tile}"]`);
      if (el) {
        el.scrollIntoView({ block: "center", behavior: "smooth" });
        const inp = el.querySelector("input, textarea");
        if (inp) inp.focus({ preventScroll: true });
      }
    });
  });
}

/* ================================================================
   [11] GENERADOR DE OUTPUT
   ================================================================
   Recorre las secciones en el orden del formulario (el orden visual
   ES el orden del output) y aplica las plantillas de cada campo.
   Nada del texto está fijo en el código: todo sale del schema. */

// Texto de un campo listo para el output, o null si se omite.
function fieldOutputPart(field, inst) {
  let raw;
  if (field.type === "mirror") raw = inst.values[field.source];
  else raw = inst.values[field.id];

  if (field.type === "keywords") {
    const arr = Array.isArray(raw) ? raw : [];
    if (!arr.length) return null;
    raw = arr.join(", ");
  }
  let value = String(raw == null ? "" : raw);
  if (!value.trim()) {
    if (field.emptyAs) value = field.emptyAs;
    else return null;
  }
  if (field.omitValue && value.trim() === field.omitValue) return null;

  // \n y <br> en la plantilla se convierten en saltos de línea reales
  const tpl = unescapeNl(field.template || "{value}");
  if (field.perLine) {
    const lines = value.split("\n").map(l => l.trim()).filter(Boolean);
    if (!lines.length) return null;
    return lines.map(l => tpl.replace("{value}", l));
  }
  return tpl.replace("{value}", value);
}

function buildOutput(inst) {
  const form = getForm(inst.formId);
  if (!form) return { full: "", summary: "" };
  const blocks = [];
  let summaryLine = "";
  // Campos ocultos por condición: fuera del output
  const fx = evalFieldRules(form, inst);

  form.sections.forEach(sec => {
    const lines = [];
    if (sec.mode === "joined") {
      // Todo en una sola línea, con separadores por campo
      let line = "";
      sec.fields.forEach(field => {
        if (fx[field.id] && fx[field.id].hidden) return;
        const part = fieldOutputPart(field, inst);
        if (part == null) return;
        const text = Array.isArray(part) ? part.join(" ") : part;
        if (!line) {
          line = text;
        } else {
          const sep = unescapeNl(field.sep != null ? field.sep : (sec.sep != null ? sec.sep : " - "));
          line += sep + text;
        }
      });
      if (line) {
        lines.push(line);
        if (!summaryLine) summaryLine = line;
      }
    } else {
      // Cada campo aporta su(s) línea(s)
      sec.fields.forEach(field => {
        if (fx[field.id] && fx[field.id].hidden) return;
        const part = fieldOutputPart(field, inst);
        if (part == null) return;
        const arr = Array.isArray(part) ? part : [part];
        if (field.joinPrev) {
          // Continúa en la línea anterior; si no hay línea previa
          // (p. ej. timestamp vacío) no se imprime suelto.
          if (!lines.length) return;
          const sep = unescapeNl(field.sep != null ? field.sep : " ");
          lines[lines.length - 1] += sep + arr[0];
          arr.slice(1).forEach(l => lines.push(l));
        } else {
          arr.forEach(l => lines.push(l));
        }
      });
      if (lines.length && sec.heading) lines.unshift(unescapeNl(sec.heading));
    }
    if (lines.length) blocks.push({ lines, noGap: !!sec.noGap });
  });

  const out = [];
  blocks.forEach((b, i) => {
    out.push(...b.lines);
    if (i < blocks.length - 1 && !b.noGap) out.push("");
  });

  // Chunks para los botones de copia:
  //   summary     = la línea de la PRIMERA sección (la unida por guiones)
  //   description = todas las demás secciones
  const isSummaryFirst = blocks.length > 0 && !!summaryLine
                      && blocks[0].lines.length === 1
                      && blocks[0].lines[0] === summaryLine;
  const rest = [];
  blocks.forEach((b, i) => {
    if (isSummaryFirst && i === 0) return;
    rest.push(...b.lines);
    if (i < blocks.length - 1 && !b.noGap) rest.push("");
  });
  while (rest.length && rest[rest.length - 1] === "") rest.pop();
  return {
    full: out.join("\n"),
    summary: isSummaryFirst ? summaryLine : "",
    description: rest.join("\n")
  };
}

function renderOutput() {
  const inst = getActiveInstance();
  if (!inst || !getForm(state.topTab)) return;
  const chunks = buildOutput(inst);

  // Si el tester editó el textarea a mano se respeta su versión;
  // "Regenerar" vuelve a la versión automática.
  const ta = $("outputTextarea");
  if (!inst.output || !inst.outputEdited) {
    inst.output = chunks.full;
    inst.outputEdited = false;
  }
  ta.value = inst.output;

  const actions = $("outputActions");
  actions.innerHTML = "";
  addBtn(actions, "Copiar todo", () => copyToClipboard(inst.output), "primary");
  if (chunks.summary) {
    addBtn(actions, "Copiar summary", () => copyToClipboard(chunks.summary));
  }
  if (chunks.description) {
    addBtn(actions, "Copiar description", () => copyToClipboard(chunks.description));
  }
  addBtn(actions, "Regenerar", () => {
    inst.outputEdited = false;
    inst.output = "";
    renderOutput();
    scheduleSave();
  });
  addBtn(actions, "Limpiar campos", () => {
    showConfirmModal({
      title: "Limpiar instancia",
      body: `¿Vaciar todos los campos de "${escapeHtml(inst.title)}"? Esto no se puede deshacer.`,
      confirmText: "Limpiar",
      confirmClass: "danger",
      onConfirm: () => {
        const blank = makeInstance(inst.formId);
        inst.values = blank.values;
        inst.ticketKey = "";
        inst.output = "";
        inst.outputEdited = false;
        markInstanceDirty(inst);
        scheduleSave();
        renderForm();
        renderMediaPanel();
      }
    });
  }, "danger");
}

function addBtn(container, label, fn, cls) {
  const b = document.createElement("button");
  b.textContent = label;
  if (cls) b.classList.add(cls);
  b.addEventListener("click", fn);
  container.appendChild(b);
}

/* ================================================================
   [12] PANEL DE MEDIA
   ================================================================
   Los nombres se generan SOLOS a partir de la regla `media_fmt`
   (editable en DATA/RULES — cada cliente puede tener su formato):

     {type}     → el tipo de media de la fila (lista mediaTypes)
     {key}      → la Key del ticket (el textbox de arriba)
     {platform} → plataforma(cliente) combinados, sin duplicar parens
     {loQueSea} → el valor de cualquier campo del formulario por id
                  (ej. {cl}, {map}, {bugType})

   Los tipos de fila salen de la lista `mediaTypes` en DATA. */
function mediaTypes() {
  return config.data.lists.mediaTypes || ["Vid", "Pic", "ConsoleLog", "DxDiag"];
}

function mediaFormat() {
  return config.data.rules.media_fmt || "{type}_{key}_{platform}_{cl}_(1)";
}

function getPlatformForMedia(inst) {
  const plat = String(inst.values.platform || "").trim();
  const client = String(inst.values.client || "").trim();
  if (!plat) return "";
  if (plat.includes("(") || !client) return plat;
  return `${plat}(${client})`;
}

// Devuelve { name, missing: [placeholders sin valor] }
function buildMediaName(mediaType, inst) {
  const missing = [];
  const name = mediaFormat().replace(/\{([A-Za-z0-9_]+)\}/g, (m, ph) => {
    let v = "";
    if (ph === "type") v = mediaType;
    else if (ph === "key") v = String(inst.ticketKey || "").trim();
    else if (ph === "platform") v = getPlatformForMedia(inst);
    else v = String(inst.values[ph] == null ? "" : inst.values[ph]).trim();
    if (!v) missing.push(ph);
    return v;
  });
  return { name, missing };
}

function renderMediaPanel() {
  const inst = getActiveInstance();
  if (!inst) return;
  if (inst.ticketKey === undefined) inst.ticketKey = "";
  $("mediaFmtHint").textContent = "Formato (regla media_fmt): " + mediaFormat();
  const keyInput = $("mediaTicketKey");
  if (document.activeElement !== keyInput) keyInput.value = inst.ticketKey;

  // Filas generadas desde la lista mediaTypes (solo lectura + copiar)
  const rows = $("mediaRows");
  rows.innerHTML = mediaTypes().map(t => {
    const { name, missing } = buildMediaName(t, inst);
    const ok = !missing.length;
    return `<div class="media-row">
      <span class="media-type">${escapeHtml(t)}</span>
      <input type="text" readonly value="${ok ? escapeHtml(name) : ""}"
        placeholder="${ok ? "" : "falta: " + escapeHtml(missing.join(", "))}" />
      <button data-media-copy="${escapeHtml(t)}"${ok ? "" : " disabled"}
        title="${ok ? "Copiar " + escapeHtml(name) : "Faltan datos: " + escapeHtml(missing.join(", "))}">Copiar</button>
    </div>`;
  }).join("");
  rows.querySelectorAll("[data-media-copy]").forEach(btn => {
    btn.addEventListener("click", () => {
      const { name, missing } = buildMediaName(btn.dataset.mediaCopy, getActiveInstance());
      if (missing.length) { flashBanner("Faltan datos: " + missing.join(", "), true); return; }
      copyToClipboard(name);
    });
  });
}

let _mediaPanelWired = false;
function wireMediaPanel() {
  if (_mediaPanelWired) return;
  _mediaPanelWired = true;
  const keyInput = $("mediaTicketKey");
  keyInput.addEventListener("input", () => {
    const inst = getActiveInstance();
    if (!inst) return;
    inst.ticketKey = keyInput.value;
    markInstanceDirty(inst);
    // Solo refrescar las filas generadas, sin pisar el input activo
    renderMediaPanel();
  });
  keyInput.addEventListener("blur", () => {
    saveAll();
    setSaveIndicator("saved");
  });
}

/* ================================================================
   [13] PESTAÑA DATA
   ================================================================
   Edita config.data (listas, mapas, POIs, tiers, reglas). Los
   cambios quedan en el DOM/localStorage al momento; para
   compartirlos: exportar bug_data.csv o exportar la herramienta. */
function dataCategories() {
  const cats = Object.keys(config.data.lists).map(k =>
    ({ id: "list:" + k, label: k, kind: "list", key: k }));
  cats.push({ id: "maps",  label: "Mapas",        kind: "maps" });
  cats.push({ id: "pois",  label: "POIs por mapa", kind: "pois" });
  cats.push({ id: "tiers", label: "Tiers",         kind: "tiers" });
  cats.push({ id: "rules", label: "Reglas",        kind: "rules" });
  return cats;
}

function renderDataTab() {
  const cats = dataCategories();
  if (!cats.find(c => c.id === state.dataTab.selectedCategory)) {
    state.dataTab.selectedCategory = cats[0].id;
  }
  renderDataSidebar();
  renderDataTable();
}

function renderDataSidebar() {
  const sb = $("dataSidebar");
  sb.innerHTML = "";
  dataCategories().forEach(c => {
    const el = document.createElement("div");
    el.className = "item" + (state.dataTab.selectedCategory === c.id ? " active" : "");
    el.style.display = "flex";
    el.innerHTML = `<span style="flex:1">${escapeHtml(c.label)}</span>` +
      (c.kind === "list" ? `<button class="row-del" data-dellist="${escapeHtml(c.key)}" title="Borrar esta lista">✕</button>` : "");
    el.addEventListener("click", (e) => {
      if (e.target.closest("[data-dellist]")) return;
      state.dataTab.selectedCategory = c.id;
      renderDataTab();
      scheduleSave();
    });
    sb.appendChild(el);
  });
  sb.querySelectorAll("[data-dellist]").forEach(btn => {
    btn.addEventListener("click", () => deleteList(btn.dataset.dellist));
  });
}

function deleteList(key) {
  // Avisar si algún campo usa esta lista como fuente
  const users = [];
  getForms().forEach(form => allFields(form).forEach(({ field }) => {
    if (field.source === key) users.push(form.label + " → " + field.label);
  }));
  showConfirmModal({
    title: "Borrar lista",
    body: `¿Borrar definitivamente la lista «${escapeHtml(key)}» con todos sus valores?` +
      (users.length ? `<br /><br /><strong>Ojo:</strong> la usan estos campos:<br />${users.map(escapeHtml).join("<br />")}` : ""),
    confirmText: "Borrar",
    confirmClass: "danger",
    onConfirm: () => {
      delete config.data.lists[key];
      state.dataTab.selectedCategory = "";
      renderDataTab();
      scheduleSave();
    }
  });
}

function renderDataTable() {
  const wrap = $("dataTableWrap");
  const sel = dataCategories().find(c => c.id === state.dataTab.selectedCategory);
  if (!sel) { wrap.innerHTML = ""; return; }

  let cols, rowsHtml;
  const delBtn = (attr, val) =>
    `<button class="row-del" ${attr}="${escapeHtml(val)}" title="Borrar fila">✕</button>`;

  if (sel.kind === "list") {
    cols = ["#", "Valor", ""];
    const arr = config.data.lists[sel.key] || [];
    rowsHtml = arr.map((v, i) => `<tr>
      <td>${i + 1}</td>
      <td><input type="text" data-list-idx="${i}" value="${escapeHtml(v)}" /></td>
      <td>${delBtn("data-list-del", String(i))}</td>
    </tr>`).join("");
  } else if (sel.kind === "maps") {
    cols = ["#", "Mapa", ""];
    rowsHtml = config.data.maps.map((m, i) => `<tr>
      <td>${i + 1}</td>
      <td><input type="text" data-map-idx="${i}" value="${escapeHtml(m)}" /></td>
      <td>${delBtn("data-map-del", String(i))}</td>
    </tr>`).join("");
  } else if (sel.kind === "pois") {
    cols = ["#", "Mapa", "POI", ""];
    let i = 0;
    rowsHtml = Object.entries(config.data.pois).map(([map, pois]) => {
      const isOrphan = !config.data.maps.includes(map);
      return pois.map((p, j) => {
        i++;
        return `<tr>
          <td>${i}</td>
          <td class="${isOrphan ? "orphan" : ""}">${escapeHtml(map)}${isOrphan ? " (huérfano)" : ""}</td>
          <td><input type="text" data-poi-edit="${escapeHtml(map)}|${j}" value="${escapeHtml(p)}" /></td>
          <td>${delBtn("data-poi-del", map + "|" + j)}</td>
        </tr>`;
      }).join("");
    }).join("");
  } else if (sel.kind === "tiers") {
    cols = ["#", "Código", "Nombre", ""];
    rowsHtml = Object.entries(config.data.tiers).map(([k, v], i) => `<tr>
      <td>${i + 1}</td>
      <td>${escapeHtml(k)}</td>
      <td><input type="text" data-tier-key="${escapeHtml(k)}" value="${escapeHtml(v)}" /></td>
      <td>${delBtn("data-tier-del", k)}</td>
    </tr>`).join("");
  } else { // rules
    cols = ["#", "Regla", "Valor", ""];
    rowsHtml = Object.entries(config.data.rules).map(([k, v], i) => `<tr>
      <td>${i + 1}</td>
      <td>${escapeHtml(k)}</td>
      <td><input type="text" data-rule-key="${escapeHtml(k)}" value="${escapeHtml(v)}" /></td>
      <td>${delBtn("data-rule-del", k)}</td>
    </tr>`).join("");
  }

  wrap.innerHTML = `<table class="data-table">
    <thead><tr>${cols.map(c => `<th>${c}</th>`).join("")}</tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table>`;

  // ---- Ediciones en vivo ----
  wrap.querySelectorAll("[data-list-idx]").forEach(inp => {
    inp.addEventListener("input", () => {
      config.data.lists[sel.key][+inp.dataset.listIdx] = inp.value;
      scheduleSave();
    });
  });
  wrap.querySelectorAll("[data-map-idx]").forEach(inp => {
    inp.addEventListener("change", () => {
      const i = +inp.dataset.mapIdx;
      const oldName = config.data.maps[i];
      const newName = inp.value.trim();
      if (oldName !== newName && newName) {
        if (config.data.pois[oldName]) {
          config.data.pois[newName] = config.data.pois[oldName];
          delete config.data.pois[oldName];
        }
        config.data.maps[i] = newName;
        renderDataTable();
        scheduleSave();
      }
    });
  });
  wrap.querySelectorAll("[data-poi-edit]").forEach(inp => {
    inp.addEventListener("input", () => {
      const [map, j] = inp.dataset.poiEdit.split("|");
      config.data.pois[map][+j] = inp.value;
      scheduleSave();
    });
  });
  wrap.querySelectorAll("[data-tier-key]").forEach(inp => {
    inp.addEventListener("input", () => {
      config.data.tiers[inp.dataset.tierKey] = inp.value;
      scheduleSave();
    });
  });
  wrap.querySelectorAll("[data-rule-key]").forEach(inp => {
    inp.addEventListener("input", () => {
      config.data.rules[inp.dataset.ruleKey] = inp.value;
      scheduleSave();
    });
  });

  // ---- Borrado de filas (con confirmación) ----
  const confirmRowDelete = (desc, doIt) => showConfirmModal({
    title: "Borrar fila",
    body: `¿Borrar definitivamente ${desc}?`,
    confirmText: "Borrar",
    confirmClass: "danger",
    onConfirm: () => { doIt(); renderDataTable(); scheduleSave(); }
  });
  wrap.querySelectorAll("[data-list-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = +btn.dataset.listDel;
      confirmRowDelete(`«${escapeHtml(config.data.lists[sel.key][i])}»`,
        () => config.data.lists[sel.key].splice(i, 1));
    });
  });
  wrap.querySelectorAll("[data-map-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = +btn.dataset.mapDel;
      confirmRowDelete(`el mapa «${escapeHtml(config.data.maps[i])}» (sus POIs quedarán huérfanos)`,
        () => config.data.maps.splice(i, 1));
    });
  });
  wrap.querySelectorAll("[data-poi-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      const [map, j] = btn.dataset.poiDel.split("|");
      confirmRowDelete(`el POI «${escapeHtml(config.data.pois[map][+j])}» de ${escapeHtml(map)}`,
        () => config.data.pois[map].splice(+j, 1));
    });
  });
  wrap.querySelectorAll("[data-tier-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      const k = btn.dataset.tierDel;
      confirmRowDelete(`el tier «${escapeHtml(k)}»`, () => delete config.data.tiers[k]);
    });
  });
  wrap.querySelectorAll("[data-rule-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      const k = btn.dataset.ruleDel;
      confirmRowDelete(`la regla «${escapeHtml(k)}» (revisa que ningún campo use @${escapeHtml(k)})`,
        () => delete config.data.rules[k]);
    });
  });
}

function addDataRow() {
  const sel = dataCategories().find(c => c.id === state.dataTab.selectedCategory);
  if (!sel) return;
  if (sel.kind === "list") {
    config.data.lists[sel.key] = config.data.lists[sel.key] || [];
    config.data.lists[sel.key].push("nuevo_valor");
  } else if (sel.kind === "maps") {
    config.data.maps.push("NuevoMapa");
    if (!config.data.pois["NuevoMapa"]) config.data.pois["NuevoMapa"] = [];
  } else if (sel.kind === "pois") {
    showPromptModal({
      title: "Nuevo POI",
      body: "¿A qué mapa pertenece? Mapas: " + config.data.maps.join(", "),
      placeholder: "Nombre del mapa",
      confirmText: "Agregar",
      onConfirm: (m) => {
        m = (m || "").trim();
        if (!config.data.maps.includes(m)) { flashBanner("Ese mapa no existe.", true); return; }
        config.data.pois[m] = config.data.pois[m] || [];
        config.data.pois[m].push("NuevoPOI");
        renderDataTable();
        scheduleSave();
      }
    });
    return;
  } else if (sel.kind === "tiers") {
    let n = 1;
    while (config.data.tiers["T" + n]) n++;
    config.data.tiers["T" + n] = "Nuevo tier";
  } else if (sel.kind === "rules") {
    showPromptModal({
      title: "Nueva regla",
      body: "Nombre de la regla (sin espacios). Los campos pueden usarla escribiendo @nombre.",
      placeholder: "mi_regla",
      confirmText: "Agregar",
      onConfirm: (k) => {
        k = (k || "").trim();
        if (!k) return;
        if (config.data.rules[k] != null) { flashBanner("Esa regla ya existe.", true); return; }
        config.data.rules[k] = "";
        renderDataTable();
        scheduleSave();
      }
    });
    return;
  }
  renderDataTable();
  scheduleSave();
}

function addNewList() {
  showPromptModal({
    title: "Nueva lista",
    body: "Nombre de la lista (será la fuente que eligen los campos dropdown).",
    placeholder: "p. ej. weapons",
    confirmText: "Crear",
    onConfirm: (name) => {
      const key = slugify(name);
      if (!key) return;
      if (config.data.lists[key]) { flashBanner("Esa lista ya existe.", true); return; }
      config.data.lists[key] = [];
      state.dataTab.selectedCategory = "list:" + key;
      renderDataTab();
      scheduleSave();
    }
  });
}

/* ================================================================
   [14] PESTAÑA RULES
   ================================================================
   Vista técnica y legible de TODAS las validaciones: por campo
   (obligatorio, REGEX, mensaje, default) y las reglas globales de
   DATA. Todo editable en vivo. */
// Operadores y acciones de las condiciones entre campos
const COND_OPS = [
  ["empty",          "está vacío"],
  ["notEmpty",       "no está vacío"],
  ["equals",         "es igual a"],
  ["notEquals",      "no es igual a"],
  ["matches",        "cumple REGEX"],
  // Comparan contra el VALOR de otro campo (el valor es el id del campo).
  // Solo aplican cuando ambos campos tienen algo escrito.
  ["equalsField",    "es igual al campo (id)"],
  ["notEqualsField", "es distinto del campo (id)"]
];
const COND_ACTIONS = [
  ["show",       "mostrar el campo"],
  ["hide",       "ocultar el campo"],
  ["disable",    "bloquear el campo"],
  ["setDefault", "poner default si está vacío"],
  ["error",      "marcar error (mensaje)"]
];

function renderRulesTab() {
  const c = $("rulesContainer");
  let fieldRows = "";
  getForms().forEach(form => {
    form.sections.forEach(sec => {
      sec.fields.forEach(f => {
        if (f.type === "mirror") return;
        const key = form.id + "|" + f.id;
        fieldRows += `<tr>
          <td class="rules-form-cell">${escapeHtml(form.label)} · ${escapeHtml(sec.label)}</td>
          <td>${escapeHtml(f.label)}</td>
          <td style="text-align:center"><input type="checkbox" data-rr-req="${escapeHtml(key)}"${f.required ? " checked" : ""} /></td>
          <td><input type="text" data-rr-rx="${escapeHtml(key)}" value="${escapeHtml(f.regex || "")}" placeholder="regex o @regla" /></td>
          <td><input type="text" data-rr-msg="${escapeHtml(key)}" value="${escapeHtml(f.regexMsg || "")}" /></td>
          <td><input type="text" data-rr-def="${escapeHtml(key)}" value="${escapeHtml(f.default || "")}" /></td>
        </tr>`;
      });
    });
  });

  const globalRows = Object.entries(config.data.rules).map(([k, v]) => `<tr>
    <td>@${escapeHtml(k)}</td>
    <td><input type="text" data-rr-global="${escapeHtml(k)}" value="${escapeHtml(v)}" /></td>
  </tr>`).join("");

  // ---- Condiciones entre campos ----
  const condsHtml = getForms().map(form => {
    const fieldOpts = (sel) => allFields(form)
      .filter(x => x.field.type !== "mirror")
      .map(x => `<option value="${escapeHtml(x.field.id)}"${sel === x.field.id ? " selected" : ""}>${escapeHtml(x.field.label)}</option>`)
      .join("");
    const rows = getFormRules(form).map((r, i) => {
      const opOpts = COND_OPS.map(([v, l]) =>
        `<option value="${v}"${r.when.op === v ? " selected" : ""}>${l}</option>`).join("");
      const actOpts = COND_ACTIONS.map(([v, l]) =>
        `<option value="${v}"${r.then.action === v ? " selected" : ""}>${l}</option>`).join("");
      const needsWhenVal = !["empty", "notEmpty"].includes(r.when.op);
      const whenPh = ["equalsField", "notEqualsField"].includes(r.when.op)
        ? "id del otro campo (ej. cl)"
        : r.when.op === "matches" ? "regex o @regla" : "valor";
      const needsThenVal = ["setDefault", "error"].includes(r.then.action);
      const thenPh = r.then.action === "error" ? "mensaje de error" : "valor o @regla";
      const k = form.id + "|" + i;
      return `<tr>
        <td class="cond-then">Si</td>
        <td><select data-cr="${k}|when.field">${fieldOpts(r.when.field)}</select></td>
        <td><select data-cr="${k}|when.op">${opOpts}</select></td>
        <td><input type="text" data-cr="${k}|when.value" value="${escapeHtml(r.when.value || "")}"
             placeholder="${needsWhenVal ? whenPh : "(no aplica)"}"${needsWhenVal ? "" : " disabled"} /></td>
        <td class="cond-then">entonces</td>
        <td><select data-cr="${k}|then.action">${actOpts}</select></td>
        <td><select data-cr="${k}|then.field">${fieldOpts(r.then.field)}</select></td>
        <td><input type="text" data-cr="${k}|then.value" value="${escapeHtml(r.then.value || "")}"
             placeholder="${needsThenVal ? thenPh : "(no aplica)"}"${needsThenVal ? "" : " disabled"} /></td>
        <td><button class="row-del" data-cr-del="${k}" title="Borrar condición">✕</button></td>
      </tr>`;
    }).join("");
    return `<h4 style="margin:10px 0 4px;font-size:12px;">${escapeHtml(form.label)}</h4>
      <table class="data-table cond-table">
        <tbody>${rows || `<tr><td style="color:#9ca3af;font-style:italic;">Sin condiciones todavía.</td></tr>`}</tbody>
      </table>
      <button data-cr-add="${escapeHtml(form.id)}" style="margin-top:6px;">+ Agregar condición a ${escapeHtml(form.label)}</button>`;
  }).join("");

  c.innerHTML = `
    <div class="rules-block">
      <h3>Validaciones por campo</h3>
      <p class="rules-intro">
        Cada campo puede ser <strong>obligatorio</strong> y/o validarse con una
        <strong>REGEX</strong> (expresión regular de JavaScript). En la columna REGEX
        puedes escribir la expresión directa (ej. <code>^\\d+$</code> para números) o
        <code>@nombre</code> para usar una regla global de la tabla de abajo
        (ej. <code>@coord_re</code>). El campo se marca en rojo cuando no cumple y
        aparece un tile arriba del formulario.
      </p>
      <table class="data-table">
        <thead><tr><th>Formulario · Sección</th><th>Campo</th><th>Oblig.</th><th>Regex</th><th>Mensaje de error</th><th>Default</th></tr></thead>
        <tbody>${fieldRows}</tbody>
      </table>
    </div>
    <div class="rules-block">
      <h3>Reglas globales (viven en DATA → Reglas)</h3>
      <p class="rules-intro">
        Se comparten entre campos y se editan aquí o en la pestaña Data. Las
        reglas especiales que usa la herramienta: <code>kw_count</code> (cantidad de
        palabras clave), <code>default_tz</code> y <code>default_executable</code>
        (valores por defecto via @).
      </p>
      <table class="data-table" style="max-width:760px">
        <thead><tr><th>Regla</th><th>Valor</th></tr></thead>
        <tbody>${globalRows}</tbody>
      </table>
    </div>
    <div class="rules-block">
      <h3>Condiciones entre campos</h3>
      <p class="rules-intro">
        Reglas del tipo <em>si el campo A ... entonces el campo B ...</em>. Con
        "cumple REGEX" el valor acepta una expresión o <code>@regla</code>.
        Para campos exclusivos de un tipo de issue (ej. "LOD number"): crea el
        campo con <strong>"Oculto por defecto"</strong> y agrega aquí una condición
        que lo muestre (ej. si Descripción corta cumple REGEX <code>LOD</code> →
        mostrar LOD number). "Poner default si está vacío" rellena el campo
        destino sin pisar lo ya escrito. Las condiciones se aplican al salir de
        cada campo.
      </p>
      ${condsHtml}
    </div>
    <div class="rules-future">
      Próximamente: tiles personalizados definidos por el usuario y más acciones
      para los nombres de media. La estructura ya lo soporta; se agregará sin
      romper tus datos. El formato de media ya es editable: regla
      <code>media_fmt</code> (placeholders {type}, {key}, {platform} y cualquier
      id de campo) y la lista <code>mediaTypes</code> en Data.
    </div>`;

  const findTarget = (key) => {
    const [formId, fieldId] = key.split("|");
    const form = getForm(formId);
    return form ? getField(form, fieldId) : null;
  };
  c.querySelectorAll("[data-rr-req]").forEach(el => el.addEventListener("change", () => {
    const t = findTarget(el.dataset.rrReq);
    if (!t) return;
    if (el.checked) t.field.required = true; else delete t.field.required;
    scheduleSave();
  }));
  c.querySelectorAll("[data-rr-rx]").forEach(el => {
    el.addEventListener("input", () => {
      const t = findTarget(el.dataset.rrRx);
      if (!t) return;
      if (el.value.trim()) t.field.regex = el.value.trim(); else delete t.field.regex;
      scheduleSave();
    });
    el.addEventListener("blur", () => {
      const v = el.value.trim();
      if (!v) return;
      try { new RegExp(resolveRef(v)); }
      catch (e) { flashBanner("REGEX inválida: " + e.message, true); }
    });
  });
  c.querySelectorAll("[data-rr-msg]").forEach(el => el.addEventListener("input", () => {
    const t = findTarget(el.dataset.rrMsg);
    if (!t) return;
    if (el.value.trim()) t.field.regexMsg = el.value.trim(); else delete t.field.regexMsg;
    scheduleSave();
  }));
  c.querySelectorAll("[data-rr-def]").forEach(el => el.addEventListener("input", () => {
    const t = findTarget(el.dataset.rrDef);
    if (!t) return;
    if (el.value) t.field.default = el.value; else delete t.field.default;
    scheduleSave();
  }));
  c.querySelectorAll("[data-rr-global]").forEach(el => el.addEventListener("input", () => {
    config.data.rules[el.dataset.rrGlobal] = el.value;
    scheduleSave();
  }));

  // ---- Wiring de las condiciones entre campos ----
  c.querySelectorAll("[data-cr]").forEach(el => {
    el.addEventListener("change", () => {
      const [formId, idx, path] = el.dataset.cr.split("|");
      const form = getForm(formId);
      const rule = form && getFormRules(form)[+idx];
      if (!rule) return;
      const [part, prop] = path.split(".");
      rule[part][prop] = el.value;
      scheduleSave();
      // Cambiar el operador/acción habilita o deshabilita los inputs de valor
      if (prop === "op" || prop === "action") renderRulesTab();
    });
  });
  c.querySelectorAll("[data-cr-add]").forEach(btn => {
    btn.addEventListener("click", () => {
      const form = getForm(btn.dataset.crAdd);
      if (!form) return;
      const first = allFields(form).find(x => x.field.type !== "mirror");
      if (!first) { flashBanner("El formulario no tiene campos.", true); return; }
      form.rules = form.rules || [];
      form.rules.push({
        when: { field: first.field.id, op: "equals", value: "" },
        then: { action: "hide", field: first.field.id, value: "" }
      });
      renderRulesTab();
      scheduleSave();
    });
  });
  c.querySelectorAll("[data-cr-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      const [formId, idx] = btn.dataset.crDel.split("|");
      showConfirmModal({
        title: "Borrar condición",
        body: "¿Borrar definitivamente esta condición?",
        confirmText: "Borrar",
        confirmClass: "danger",
        onConfirm: () => {
          const form = getForm(formId);
          if (form && form.rules) form.rules.splice(+idx, 1);
          renderRulesTab();
          scheduleSave();
        }
      });
    });
  });
}

/* ================================================================
   [15] CSV: bug_data.csv Y bug_fields.csv
   ================================================================ */
// Parser: soporta comillas dobles y comas dentro de comillas.
// Lo escrito entre comillas NO se recorta (los separadores como
// " - " importan en bug_fields.csv).
function parseCsvLine(line) {
  const out = [];
  let cur = "", inQ = false, wasQuoted = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
      else if (ch === '"') inQ = false;
      else cur += ch;
    } else {
      if (ch === ",") { out.push(wasQuoted ? cur : cur.trim()); cur = ""; wasQuoted = false; }
      else if (ch === '"') { inQ = true; wasQuoted = true; }
      else cur += ch;
    }
  }
  out.push(wasQuoted ? cur : cur.trim());
  return out;
}

function csvEscape(v) {
  v = String(v == null ? "" : v);
  if (/[",\n]/.test(v) || v !== v.trim()) return `"${v.replace(/"/g, '""')}"`;
  return v;
}

function csvTruthy(v) {
  return ["1", "true", "yes", "si", "sí", "x"].includes(String(v || "").trim().toLowerCase());
}

// ---- bug_data.csv (mismo formato de siempre: category,key,value) ----
function exportDataCsv() {
  const rows = [["category", "key", "value"]];
  Object.entries(config.data.lists).forEach(([k, arr]) => {
    arr.forEach(v => rows.push(["list", k, v]));
  });
  config.data.maps.forEach(m => rows.push(["map", "-", m]));
  Object.entries(config.data.pois).forEach(([m, pois]) => {
    pois.forEach(p => rows.push(["poi", m, p]));
  });
  Object.entries(config.data.tiers).forEach(([k, v]) => rows.push(["tier", k, v]));
  Object.entries(config.data.rules).forEach(([k, v]) => rows.push(["rule", k, v]));
  downloadFile("bug_data.csv", rows.map(r => r.map(csvEscape).join(",")).join("\n"));
  flashBanner("bug_data.csv descargado. Ponlo en el sharefolder para compartirlo.");
}

function importDataCsv(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.startsWith("#"));
  if (!lines.length) throw new Error("Archivo vacío");
  const header = parseCsvLine(lines[0]).map(s => s.toLowerCase());
  if (header.join(",") !== "category,key,value") {
    throw new Error("El encabezado debe ser: category,key,value");
  }
  const data = { lists: {}, maps: [], pois: {}, tiers: {}, rules: {} };
  for (let i = 1; i < lines.length; i++) {
    const row = parseCsvLine(lines[i]);
    if (row.length < 3) continue;
    const [cat, key, value] = row;
    if (cat === "list") {
      data.lists[key] = data.lists[key] || [];
      data.lists[key].push(value);
    } else if (cat === "map") {
      data.maps.push(value);
    } else if (cat === "poi") {
      data.pois[key] = data.pois[key] || [];
      data.pois[key].push(value);
    } else if (cat === "tier") {
      data.tiers[key] = value;
    } else if (cat === "rule") {
      data.rules[key] = value;
    }
  }
  config.data = data;
  refreshAll();
  scheduleSave();
}

// ---- bug_fields.csv (schema de formularios) ----
const FIELDS_CSV_HEADER = [
  "form", "section", "field", "label", "type", "source", "size", "template",
  "sep", "joinprev", "perline", "rows", "required", "regex", "regexmsg",
  "default", "emptyas", "omitvalue", "nogap", "help",
  "hidden", "kwcount", "kwoverlap"
];
// En la columna sep, la palabra NONE significa "sin separador"
// (pegar al campo anterior); vacío significa "usar el de la sección".
const SEP_NONE = "NONE";
// Las condiciones entre campos viajan como filas type="cond" con este
// mapeo de columnas (documentado en bug_fields.README.md):
//   source=campo condición · template=operador · default=valor condición
//   regex=acción · regexmsg=campo destino · emptyas=valor de la acción

function exportFieldsCsv() {
  const rows = [FIELDS_CSV_HEADER.slice()];
  const empty = () => new Array(FIELDS_CSV_HEADER.length).fill("");
  const sepOut = (sep) => sep == null ? "" : (sep === "" ? SEP_NONE : sep);

  getForms().forEach(form => {
    const fr = empty();
    fr[0] = form.id; fr[3] = form.label; fr[4] = "form";
    rows.push(fr);
    form.sections.forEach(sec => {
      const sr = empty();
      sr[0] = form.id; sr[1] = sec.id; sr[3] = sec.label; sr[4] = "section";
      sr[5] = sec.mode || "lines";
      sr[7] = sec.heading || "";
      sr[8] = sepOut(sec.sep);
      sr[18] = sec.noGap ? "yes" : "";
      rows.push(sr);
      sec.fields.forEach(f => {
        rows.push([
          form.id, sec.id, f.id, f.label, f.type || "text", f.source || "",
          f.size || "", f.template || "", sepOut(f.sep),
          f.joinPrev ? "yes" : "", f.perLine ? "yes" : "", f.rows || "",
          f.required ? "yes" : "", f.regex || "", f.regexMsg || "",
          f.default || "", f.emptyAs || "", f.omitValue || "", "", f.help || "",
          f.hidden ? "yes" : "", f.kwCount || "", f.kwOverlap ? "yes" : ""
        ]);
      });
    });
    // Condiciones entre campos del formulario (type="cond")
    getFormRules(form).forEach(r => {
      const cr = empty();
      cr[0] = form.id; cr[4] = "cond";
      cr[5] = r.when.field; cr[7] = r.when.op; cr[15] = r.when.value || "";
      cr[13] = r.then.action; cr[14] = r.then.field; cr[16] = r.then.value || "";
      rows.push(cr);
    });
  });
  downloadFile("bug_fields.csv", rows.map(r => r.map(csvEscape).join(",")).join("\n"));
  flashBanner("bug_fields.csv descargado. Ponlo en el sharefolder para compartirlo.");
}

function importFieldsCsv(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.startsWith("#"));
  if (!lines.length) throw new Error("Archivo vacío");
  const header = parseCsvLine(lines[0]).map(s => s.toLowerCase());
  if (header.join(",") !== FIELDS_CSV_HEADER.join(",")) {
    throw new Error("El encabezado no coincide. Debe ser: " + FIELDS_CSV_HEADER.join(","));
  }
  const errors = [];
  const forms = [];
  const sepIn = (v) => v === "" ? null : (v === SEP_NONE ? "" : v);

  for (let i = 1; i < lines.length; i++) {
    const r = parseCsvLine(lines[i]);
    while (r.length < FIELDS_CSV_HEADER.length) r.push("");
    const [formId, secId, fieldId, label, type, source, size, template,
           sep, joinprev, perline, rowsN, required, regex, regexmsg,
           def, emptyas, omitvalue, nogap, help,
           hidden, kwcount, kwoverlap] = r;
    const lineNo = i + 1;

    if (type === "form") {
      if (!formId) { errors.push(`Línea ${lineNo}: fila form sin id`); continue; }
      if (forms.find(f => f.id === formId)) { errors.push(`Línea ${lineNo}: formulario «${formId}» repetido`); continue; }
      forms.push({ id: formId, label: label || formId, sections: [] });
    } else if (type === "cond") {
      // Condición entre campos: source=campo, template=op, default=valor,
      // regex=acción, regexmsg=campo destino, emptyas=valor de la acción
      const form = forms.find(f => f.id === formId);
      if (!form) { errors.push(`Línea ${lineNo}: condición sin formulario «${formId}» previo`); continue; }
      if (!COND_OPS.some(([v]) => v === template)) {
        errors.push(`Línea ${lineNo}: operador desconocido «${template}»`); continue;
      }
      if (!COND_ACTIONS.some(([v]) => v === regex)) {
        errors.push(`Línea ${lineNo}: acción desconocida «${regex}»`); continue;
      }
      form.rules = form.rules || [];
      form.rules.push({
        when: { field: source, op: template, value: def || "" },
        then: { action: regex, field: regexmsg, value: emptyas || "" }
      });
    } else if (type === "section") {
      const form = forms.find(f => f.id === formId);
      if (!form) { errors.push(`Línea ${lineNo}: sección sin formulario «${formId}» previo`); continue; }
      if (!secId) { errors.push(`Línea ${lineNo}: sección sin id`); continue; }
      if (form.sections.find(s => s.id === secId)) { errors.push(`Línea ${lineNo}: sección «${secId}» repetida`); continue; }
      const sec = { id: secId, label: label || secId, mode: source === "joined" ? "joined" : "lines", fields: [] };
      if (template) sec.heading = template;
      const s = sepIn(sep);
      if (s != null) sec.sep = s;
      if (csvTruthy(nogap)) sec.noGap = true;
      form.sections.push(sec);
    } else {
      // fila de campo
      const form = forms.find(f => f.id === formId);
      if (!form) { errors.push(`Línea ${lineNo}: campo sin formulario «${formId}»`); continue; }
      const sec = form.sections.find(s => s.id === secId);
      if (!sec) { errors.push(`Línea ${lineNo}: campo sin sección «${secId}»`); continue; }
      const knownTypes = FIELD_TYPES.map(t => t.id);
      if (!knownTypes.includes(type)) { errors.push(`Línea ${lineNo}: tipo desconocido «${type}»`); continue; }
      const id = fieldId || slugify(label);
      if (form.sections.some(s => s.fields.some(f => f.id === id))) {
        errors.push(`Línea ${lineNo}: campo «${id}» repetido en «${formId}»`);
        continue;
      }
      const f = { id, label: label || id, type };
      if (source) f.source = source;
      if (size && size !== "full") f.size = size;
      if (template && template !== "{value}") f.template = template;
      const s = sepIn(sep);
      if (s != null) f.sep = s;
      if (csvTruthy(joinprev)) f.joinPrev = true;
      if (csvTruthy(perline)) f.perLine = true;
      const rn = parseInt(rowsN, 10);
      if (rn && rn !== 3) f.rows = rn;
      if (csvTruthy(required)) f.required = true;
      if (regex) {
        try { new RegExp(regex.startsWith("@") ? ".*" : regex); f.regex = regex; }
        catch (e) { errors.push(`Línea ${lineNo}: regex inválida (${e.message})`); }
      }
      if (regexmsg) f.regexMsg = regexmsg;
      if (def) f.default = def;
      if (emptyas) f.emptyAs = emptyas;
      if (omitvalue) f.omitValue = omitvalue;
      if (help) f.help = help;
      if (csvTruthy(hidden)) f.hidden = true;
      if (type === "keywords") {
        if (kwcount) f.kwCount = kwcount;
        if (csvTruthy(kwoverlap)) f.kwOverlap = true;
      }
      sec.fields.push(f);
    }
  }

  // Las condiciones deben apuntar a campos que existan en su formulario
  forms.forEach(form => {
    getFormRules(form).forEach((r, i) => {
      const has = (id) => form.sections.some(s => s.fields.some(f => f.id === id));
      if (!has(r.when.field)) errors.push(`Condición ${i + 1} de «${form.id}»: el campo «${r.when.field}» no existe`);
      if (!has(r.then.field)) errors.push(`Condición ${i + 1} de «${form.id}»: el campo destino «${r.then.field}» no existe`);
    });
  });

  if (!forms.length || !forms.some(f => f.sections.length)) {
    errors.push("El archivo no define ningún formulario con secciones.");
  }
  if (errors.length) {
    showConfirmModal({
      title: "Errores en bug_fields.csv",
      body: "No se aplicó nada. Corrige y vuelve a cargar:<br /><br />" +
            errors.slice(0, 15).map(escapeHtml).join("<br />") +
            (errors.length > 15 ? `<br />(+${errors.length - 15} más)` : ""),
      confirmText: "Entendido",
      onConfirm: () => {}
    });
    return;
  }

  showConfirmModal({
    title: "Reemplazar formularios",
    body: `Esto reemplaza TODOS los formularios actuales por los del CSV (${forms.map(f => escapeHtml(f.label)).join(", ")}). Lo escrito en las instancias abiertas se conserva donde los ids coincidan. ¿Continuar?`,
    confirmText: "Reemplazar",
    confirmClass: "danger",
    onConfirm: () => {
      config.schema.forms = forms;
      state.instances = state.instances.filter(i => forms.some(f => f.id === i.formId));
      state.instances.forEach(ensureInstanceFields);
      if (!getForm(state.topTab) && state.topTab !== "data" && state.topTab !== "rules") {
        state.topTab = forms[0].id;
      }
      if (getForm(state.topTab) && !state.instances.some(i => i.formId === state.topTab)) {
        const inst = makeInstance(state.topTab);
        state.instances.push(inst);
        state.activeInstanceId = inst.id;
      }
      refreshAll();
      scheduleSave();
      flashBanner("Formularios actualizados desde bug_fields.csv.");
    }
  });
}

/* ================================================================
   [16] EXPORTAR HERRAMIENTA (HTML AUTOCONTENIDO)
   ================================================================
   Toma la copia prístina del archivo y reemplaza el bloque
   #vanillaConfig por la config actual (campos + datos + reglas).
   El archivo descargado se pone en el sharefolder y listo: quien lo
   abra tendrá todo integrado, sin cargar ningún CSV. */
function exportToolHtml() {
  // JSON.stringify nunca genera la secuencia <\/script porque
  // escapamos "</" — así el bloque no rompe el HTML.
  const json = JSON.stringify(config, null, 2).replace(/<\//g, "<\\/");
  const marker = 'id="vanillaConfig">';
  const start = PRISTINE_HTML.indexOf(marker);
  if (start < 0) { flashBanner("No se encontró el bloque de config. Archivo dañado.", true); return; }
  const end = PRISTINE_HTML.indexOf(SCRIPT_END, start);
  const out = PRISTINE_HTML.slice(0, start + marker.length)
            + "\n" + json + "\n"
            + PRISTINE_HTML.slice(end);
  downloadFile("bug_tool.html", out);
  // Lo exportado pasa a ser la nueva "vanilla": ya no hay diferencia
  vanilla = deepClone(config);
  updateConfigChip();
  flashBanner("bug_tool.html descargado con tu config integrada. Muévelo al sharefolder para distribuirlo.");
}

/* ================================================================
   [17] SESIÓN, MODALES, BANNER Y MENÚS
   ================================================================ */
function saveSessionToFile() {
  const snap = {
    exportedAt: new Date().toISOString(),
    config: config,
    session: {
      topTab: state.topTab,
      instances: state.instances,
      activeInstanceId: state.activeInstanceId
    }
  };
  downloadFile("bug_session_" + isoStamp() + ".json", JSON.stringify(snap, null, 2));
}

function loadSessionFromFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const snap = JSON.parse(e.target.result);
      if (!snap.session) throw new Error("El archivo no tiene 'session'");
      const apply = () => {
        if (snap.config && snap.config.schema && snap.config.data) config = snap.config;
        state.instances = snap.session.instances || [];
        state.activeInstanceId = snap.session.activeInstanceId
          || (state.instances[0] ? state.instances[0].id : null);
        state.topTab = snap.session.topTab || (getForms()[0] && getForms()[0].id);
        state.instances = state.instances.filter(i => getForm(i.formId));
        state.instances.forEach(ensureInstanceFields);
        if (getForm(state.topTab) && !state.instances.some(i => i.formId === state.topTab)) {
          const inst = makeInstance(state.topTab);
          state.instances.push(inst);
          state.activeInstanceId = inst.id;
        }
        refreshAll();
        scheduleSave();
        flashBanner("Sesión cargada.");
      };
      if (state.instances.some(i => i.dirty)) {
        showConfirmModal({
          title: "¿Cargar sesión?",
          body: "Cargar una sesión reemplaza las instancias abiertas y tienes cambios sin guardar.",
          confirmText: "Reemplazar",
          confirmClass: "danger",
          onConfirm: apply
        });
      } else {
        apply();
      }
    } catch (err) {
      flashBanner("Error al cargar la sesión: " + err.message, true);
    }
  };
  reader.readAsText(file);
}

// ---- Modales ----
function showConfirmModal({ title, body, confirmText, cancelText, confirmClass, showDontAsk, onConfirm }) {
  $("modalBox").classList.remove("wide");
  $("modalTitle").textContent = title || "Confirmar";
  $("modalBody").innerHTML = body || "";
  const actions = $("modalActions");
  actions.innerHTML = "";
  if (showDontAsk) {
    const lbl = document.createElement("label");
    lbl.className = "checkbox";
    lbl.style.marginRight = "auto";
    lbl.innerHTML = `<input type="checkbox" id="modalDontAsk" /> No volver a preguntar`;
    actions.appendChild(lbl);
  }
  const cancel = document.createElement("button");
  cancel.textContent = cancelText || "Cancelar";
  cancel.addEventListener("click", closeModal);
  actions.appendChild(cancel);
  const ok = document.createElement("button");
  ok.textContent = confirmText || "OK";
  if (confirmClass) ok.classList.add(confirmClass);
  ok.addEventListener("click", () => {
    const dontAsk = document.getElementById("modalDontAsk");
    closeModal();
    onConfirm(dontAsk ? dontAsk.checked : false);
  });
  actions.appendChild(ok);
  $("modal").classList.add("open");
}

function showPromptModal({ title, body, placeholder, confirmText, onConfirm }) {
  $("modalBox").classList.remove("wide");
  $("modalTitle").textContent = title || "Escribe un valor";
  $("modalBody").innerHTML =
    (body ? `<div style="margin-bottom:8px;">${escapeHtml(body)}</div>` : "")
    + `<input type="text" id="modalPromptInput" placeholder="${escapeHtml(placeholder || "")}" />`;
  const actions = $("modalActions");
  actions.innerHTML = "";
  const cancel = document.createElement("button");
  cancel.textContent = "Cancelar";
  cancel.addEventListener("click", closeModal);
  actions.appendChild(cancel);
  const ok = document.createElement("button");
  ok.textContent = confirmText || "OK";
  ok.classList.add("primary");
  const submit = () => {
    const v = $("modalPromptInput").value;
    closeModal();
    onConfirm(v);
  };
  ok.addEventListener("click", submit);
  actions.appendChild(ok);
  $("modal").classList.add("open");
  setTimeout(() => {
    const inp = $("modalPromptInput");
    inp.focus();
    inp.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
  }, 50);
}

// Modal genérico para los editores de sección/campo.
// onConfirm devuelve false para mantener el modal abierto (error).
function showEditorModal({ title, bodyHtml, wide, onOpen, onConfirm }) {
  $("modalBox").classList.toggle("wide", !!wide);
  $("modalTitle").textContent = title || "";
  $("modalBody").innerHTML = bodyHtml || "";
  const actions = $("modalActions");
  actions.innerHTML = "";
  const cancel = document.createElement("button");
  cancel.textContent = "Cancelar";
  cancel.addEventListener("click", closeModal);
  actions.appendChild(cancel);
  const ok = document.createElement("button");
  ok.textContent = "Guardar";
  ok.classList.add("primary");
  ok.addEventListener("click", () => {
    if (onConfirm() !== false) closeModal();
  });
  actions.appendChild(ok);
  $("modal").classList.add("open");
  if (onOpen) onOpen();
}

function closeModal() {
  $("modal").classList.remove("open");
  $("modalBox").classList.remove("wide");
}

// ---- Banner ----
let bannerTimer = null;
function flashBanner(text, isError) {
  const b = $("banner");
  $("bannerText").textContent = text;
  $("bannerDismiss").style.display = isError ? "inline-block" : "none";
  b.classList.remove("hidden", "error");
  if (isError) b.classList.add("error");
  if (bannerTimer) clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => b.classList.add("hidden"), isError ? 6000 : 3000);
}

/* ================================================================
   [18] BOOT Y CONEXIÓN DE CONTROLES FIJOS
   ================================================================ */
function wireStaticControls() {
  // Pestañas fijas Data / Rules
  document.querySelectorAll("#topTabs [data-tab]").forEach(el => {
    el.addEventListener("click", () => {
      state.topTab = el.dataset.tab;
      refreshAll();
      scheduleSave();
    });
  });

  // Menús desplegables
  document.querySelectorAll(".menu-wrap").forEach(wrap => {
    const trigger = wrap.querySelector(":scope > button");
    trigger.addEventListener("click", (e) => {
      e.stopPropagation();
      const wasOpen = wrap.classList.contains("open");
      document.querySelectorAll(".menu-wrap.open").forEach(w => w.classList.remove("open"));
      if (!wasOpen) wrap.classList.add("open");
    });
    wrap.querySelectorAll(".menu-pop button").forEach(b =>
      b.addEventListener("click", () => wrap.classList.remove("open")));
  });
  document.addEventListener("mousedown", (e) => {
    if (!e.target.closest(".menu-wrap")) {
      document.querySelectorAll(".menu-wrap.open").forEach(w => w.classList.remove("open"));
    }
    if (!e.target.closest(".autocomplete")) {
      document.querySelectorAll(".autocomplete.open").forEach(el => el.classList.remove("open"));
    }
  });

  // Botón de modo edición
  $("editToggle").addEventListener("click", () => {
    state.editMode = !state.editMode;
    renderForm();
  });
  $("addSectionTopBtn").addEventListener("click", () => {
    const form = getForm(state.topTab);
    if (form) showSectionEditor(form, null);
  });

  // Exportar herramienta / CSVs / sesión
  $("exportToolBtn").addEventListener("click", exportToolHtml);
  $("exportDataBtn").addEventListener("click", exportDataCsv);
  $("exportFieldsBtn").addEventListener("click", exportFieldsCsv);
  $("dataExportBtn").addEventListener("click", exportDataCsv);
  $("importDataBtn").addEventListener("click", () => $("dataCsvInput").click());
  $("dataImportBtn").addEventListener("click", () => $("dataCsvInput").click());
  $("importFieldsBtn").addEventListener("click", () => $("fieldsCsvInput").click());
  $("saveSessionBtn").addEventListener("click", saveSessionToFile);
  $("loadSessionBtn").addEventListener("click", () => $("sessionFileInput").click());

  $("dataCsvInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        importDataCsv(ev.target.result);
        flashBanner(`${file.name} cargado. Datos actualizados.`);
      } catch (err) {
        flashBanner("Error en el CSV de datos: " + err.message, true);
      }
    };
    reader.readAsText(file);
  });
  $("fieldsCsvInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try { importFieldsCsv(ev.target.result); }
      catch (err) { flashBanner("Error en el CSV de campos: " + err.message, true); }
    };
    reader.readAsText(file);
  });
  $("sessionFileInput").addEventListener("change", (e) => {
    if (e.target.files[0]) loadSessionFromFile(e.target.files[0]);
    e.target.value = "";
  });

  // Restaurar vanilla / borrar todo
  $("resetVanillaBtn").addEventListener("click", () => {
    showConfirmModal({
      title: "Restaurar configuración del archivo",
      body: "Descarta tus cambios locales de campos, datos y reglas, y vuelve a lo que trae este bug_tool.html. Lo escrito en las instancias se conserva donde se pueda.",
      confirmText: "Restaurar",
      confirmClass: "danger",
      onConfirm: () => {
        config = deepClone(vanilla);
        state.instances = state.instances.filter(i => getForm(i.formId));
        state.instances.forEach(ensureInstanceFields);
        if (!getForm(state.topTab) && state.topTab !== "data" && state.topTab !== "rules") {
          state.topTab = getForms()[0].id;
        }
        refreshAll();
        scheduleSave();
      }
    });
  });
  $("clearLocalBtn").addEventListener("click", () => {
    showPromptModal({
      title: "Borrar todo lo local",
      body: "Borra el progreso y la configuración guardados en este navegador y vuelve al archivo original. Escribe BORRAR para confirmar.",
      placeholder: "Escribe BORRAR",
      confirmText: "Borrar todo",
      onConfirm: (v) => {
        if (v !== "BORRAR") { flashBanner("Cancelado.", true); return; }
        // Evitar que el guardado de beforeunload re-escriba lo borrado
        suppressSave = true;
        if (saveTimer) clearTimeout(saveTimer);
        localStorage.removeItem(CONFIG_KEY);
        localStorage.removeItem(SESSION_KEY);
        location.reload();
      }
    });
  });

  // Toolbar de la pestaña DATA
  $("addRowBtn").addEventListener("click", addDataRow);
  $("addListBtn").addEventListener("click", addNewList);

  // Output editable a mano
  $("outputTextarea").addEventListener("input", (e) => {
    const inst = getActiveInstance();
    if (!inst) return;
    inst.output = e.target.value;
    inst.outputEdited = true;
    markInstanceDirty(inst);
  });
  $("outputTextarea").addEventListener("blur", () => {
    saveAll();
    setSaveIndicator("saved");
  });

  // Modal: click fuera o Escape para cerrar
  $("modal").addEventListener("click", (e) => {
    if (e.target.id === "modal") closeModal();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
  });
  $("bannerDismiss").addEventListener("click", () => $("banner").classList.add("hidden"));

  // Última oportunidad de guardar al cerrar la ventana
  window.addEventListener("beforeunload", () => saveAll());
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") saveAll();
  });
}

function boot() {
  try {
    loadVanillaConfig();
  } catch (e) {
    document.body.innerHTML = `<div style="padding:40px;font-family:sans-serif;">
      <h2>Config dañada</h2>
      <p>El bloque JSON #vanillaConfig no se pudo leer: ${escapeHtml(e.message)}</p>
      <p>Recupera una copia buena del sharefolder o revisa el JSON con un editor de texto.</p>
    </div>`;
    return;
  }
  loadConfig();
  loadSession();

  // Sanear la sesión restaurada contra el schema actual
  state.instances = state.instances.filter(i => getForm(i.formId));
  state.instances.forEach(ensureInstanceFields);
  if (!getForm(state.topTab) && state.topTab !== "data" && state.topTab !== "rules") {
    state.topTab = getForms()[0].id;
  }
  if (getForm(state.topTab)) {
    const mine = state.instances.filter(i => i.formId === state.topTab);
    if (!mine.length) {
      const inst = makeInstance(state.topTab);
      state.instances.push(inst);
      state.activeInstanceId = inst.id;
    } else if (!mine.some(i => i.id === state.activeInstanceId)) {
      state.activeInstanceId = mine[0].id;
    }
  }

  wireStaticControls();
  wireMediaPanel();
  refreshAll();
}

boot();
</script>
